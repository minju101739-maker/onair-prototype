<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ON AIR · 업무 조율</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --blue:#3182F6;--blue-d:#2272EB;--blue-s:#E8F3FF;--blue-l:#C9E2FF;
  --attention:#FF5A5F;--attention-d:#C92F3A;--attention-s:#FFF0F1;--attention-l:#FFD2D6;
  --free-s:#F5FAFF;--free-l:#D9EAFF;
  --mint:#0FC9A6;--mint-d:#06A88B;--mint-s:#E3F8F2;--mint-l:#BFEEE2;
  --blue-p:#1B64DA;
  --warn:#B25E09;--warn-s:#FFF3E0;--danger:#C0392B;--danger-s:#FDECEE;
  --ink:#191F28;--strong:#333D4B;--muted:#4E5968;--faint:#8B95A1;--faintest:#B0B8C1;
  --line:#E5E8EB;--line2:#F2F4F6;--bg:#F2F4F6;--panel:#FFFFFF;--panel2:#F7F8FA;
  /* type scale */
  --fs-3xl:40px;--fs-2xl:28px;--fs-xl:22px;--fs-lg:18px;
  --fs-md:15px;--fs-sm:13px;--fs-xs:12px;--fs-2xs:11px;
  /* shape */
  --r:18px;--rs:13px;--rx:9px;--rp:999px;
  /* 3D card shadows — layered for depth. 이벤트 카드 그림자는 검정 대신 진한 파랑(--sh-evt) */
  --sh-evt:0 1px 2px rgba(23,60,150,.13),0 4px 12px rgba(23,60,150,.16);
  --sh-evt-h:0 2px 6px rgba(23,60,150,.20),0 10px 22px rgba(23,60,150,.22);
  --sh-card:0 0 0 1px rgba(0,27,55,.05),0 2px 6px rgba(0,27,55,.07),0 12px 28px rgba(0,27,55,.1);
  --sh-card-blue:0 0 0 1px rgba(49,130,246,.12),0 3px 10px rgba(49,130,246,.16),0 14px 32px rgba(49,130,246,.14);
  --sh-card-gray:0 0 0 1px rgba(0,27,55,.04),0 2px 6px rgba(0,27,55,.05),0 10px 24px rgba(0,27,55,.07);
  --sh-lg:0 16px 48px rgba(0,27,55,.18);
  --font:"Pretendard",-apple-system,"Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
  --mono:"Pretendard",-apple-system,monospace;
  --tb:56px;
  --page-x:18px;--page-head-h:58px;--title-sub-gap:6px;--row-line:1.45;
  /* 캘린더 카테고리 — 저채도 통일 팔레트 (bg L≈96 · fg L≈40 · dot 중간) */
  --cat-teal-bg:#E9F5F0;--cat-teal-fg:#1D7D62;--cat-teal-dot:#27A583;
  --cat-violet-bg:#F0EFFB;--cat-violet-fg:#5D51B8;--cat-violet-dot:#8377E0;
  --cat-amber-bg:#FAF1E5;--cat-amber-fg:#9A6B24;--cat-amber-dot:#E5A54E;
  --cat-rose-bg:#F9EFF1;--cat-rose-fg:#A15A6B;--cat-rose-dot:#DB93A4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:var(--font);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:var(--fs-md);font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
svg{display:block;flex:none}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}
.workspace{display:flex;flex:1;min-height:0;overflow:hidden}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR (replaces sidebar — brand + nav + actions) ── */
.topbar{
  height:var(--tb);flex:none;
  background:var(--panel);border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 24px;gap:12px;
}
.tb-brand{display:flex;align-items:center;gap:10px;flex:none}
.tb-logoname{font-size:18px;font-weight:850;color:var(--ink);letter-spacing:0}
.tb-divider{width:1px;height:22px;background:var(--line);flex:none;margin:0 2px}
/* Nav tabs inline */
.tb-nav{display:flex;gap:2px;flex:none}
.tb-tab{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--rx);
  font-size:var(--fs-sm);font-weight:600;color:var(--muted);
  line-height:1
}
.tb-tab:hover{background:var(--line2);color:var(--ink)}
.tb-tab.on{background:var(--blue-s);color:var(--blue-d)}
.tb-tab .bdg{font-size:var(--fs-xs);font-weight:800;background:var(--blue);color:#fff;border-radius:var(--rp);padding:1px 7px;margin-left:2px}
/* Stats */
.tb-stats{display:flex;gap:6px;align-items:center}
.tb-stat{display:flex;align-items:center;gap:5px;font-size:var(--fs-xs);font-weight:600;color:var(--faint);padding:3px 10px;border-radius:var(--rp);border:1px solid var(--line);background:var(--panel)}
.tb-stat .dot{width:5px;height:5px;border-radius:50%}
.tb-stat b{color:var(--ink);font-weight:700}
/* Spacer */
.tb-spacer{flex:1}
/* Icon buttons */
.tb-icon{width:34px;height:34px;border-radius:var(--rx);display:grid;place-items:center;color:var(--faint)}
.tb-icon:hover{background:var(--line2);color:var(--muted)}
.tb-icon svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* User avatar */
.tb-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:grid;place-items:center;font-size:var(--fs-xs);font-weight:800;color:#fff;flex:none;cursor:pointer}

/* ── CONTENT ── */
.content{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}

/* ── HOME 2-panel ── */
.home{display:grid;grid-template-columns:1fr 296px;flex:1;min-height:0;overflow:hidden}
.hp{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.hp+.hp{border-left:1px solid var(--line)}

/* Calendar panel header */
.hp-h{
  position:relative;
  padding:16px 20px 12px;flex:none;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--line2);background:var(--panel)
}
.hp-h h2{font-size:var(--fs-2xs);font-weight:700;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;flex:1}

/* Right panel scrollable area — bg = app bg so cards "float" */
.rp-scroll{
  flex:1;min-height:0;overflow-y:auto;
  background:var(--panel);
  padding:16px 16px;
  display:flex;flex-direction:column;gap:8px
}
.rp-scroll::-webkit-scrollbar{width:4px}
.rp-scroll::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.rp-scroll.scrolling::-webkit-scrollbar-thumb{background:var(--line)}

/* 3D floating cards — the core visual grouping */
.rp-card{
  background:var(--panel);
  border-radius:var(--r);
  box-shadow:var(--sh-card);
  padding:16px 16px 18px;
  position:relative;
  overflow:hidden
}
/* subtle inner top highlight = "light source from above" = 3D */
.rp-card::before{
  content:"";
  position:absolute;inset:0;
  border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.7) 0,rgba(255,255,255,0) 60px);
  pointer-events:none
}
/* Blue vote card */
.rp-card-vote{
  background:var(--blue-s);
  box-shadow:var(--sh-card-blue)
}
.rp-card-vote::before{
  background:linear-gradient(180deg,rgba(255,255,255,.5) 0,rgba(255,255,255,0) 60px)
}
/* Gray prefs card */
.rp-card-gray{
  background:var(--panel2);
  box-shadow:var(--sh-card-gray)
}

/* Section label */
.rp-lbl{
  font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);
  letter-spacing:.09em;text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:6px
}
.rp-lbl svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}

/* ── ATOMS ── */
.av{border-radius:50%;display:grid;place-items:center;font-weight:700;flex:none;color:#fff}
.av::before{content:attr(data-initial)}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:var(--fs-xs);font-weight:700;padding:3px 10px;border-radius:var(--rp);white-space:nowrap}
.pill-d{background:var(--line2);color:var(--faint);border:1px solid var(--line)}
.pill-b{background:var(--blue-s);color:var(--blue-d);border:1px solid var(--blue-l)}
.pill-m{background:var(--mint-s);color:var(--mint-d);border:1px solid var(--mint-l)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--rs);font-size:var(--fs-sm);font-weight:700;padding:9px 18px;line-height:1;cursor:pointer;white-space:nowrap}
.btn:disabled{opacity:.4;pointer-events:none}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--blue-d)}
.btn-g{background:var(--panel);color:var(--ink);border:1px solid var(--line)}.btn-g:hover{background:var(--line2)}
.btn-p:active{background:var(--blue-p)}
.btn-g:active{background:var(--line)}
.btn:focus-visible,.chip:focus-visible,.seg:focus-visible{outline:2px solid var(--blue-l);outline-offset:2px}
.btn-sm{padding:6px 12px;font-size:var(--fs-xs)}
.grade{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:800;font-size:var(--fs-xs);color:#fff;flex:none}
.grade-S{background:var(--blue)}.grade-A{background:var(--mint)}.grade-B{background:var(--faint)}
.priv{display:flex;gap:7px;align-items:flex-start;background:var(--blue-s);border:1px solid var(--blue-l);border-radius:var(--rx);padding:8px 11px}
.priv svg{width:11px;height:11px;flex:none;margin-top:2px;stroke:var(--blue-d);stroke-width:2;fill:none}
.priv p{font-size:var(--fs-sm);color:var(--blue-d);line-height:1.5}
.priv strong{font-weight:700}

/* ── WEEKLY CALENDAR ── */
.wc{display:flex;flex-direction:column;flex:1;min-height:0}
.wc-head{display:flex;flex:none;border-bottom:1px solid var(--line)}
.wc-gutter{width:36px;flex:none;border-right:1px solid var(--line2)}
.wc-dh{flex:1;text-align:center;padding:7px 3px;border-right:1px solid var(--line2);cursor:default}
.wc-dh:last-child{border-right:none}
.wc-dh.today{background:var(--blue-s)}
.wc-dn{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);line-height:1}
.wc-dh.today .wc-dn{color:var(--blue-d)}
.wc-dd{font-size:20px;font-weight:800;color:var(--ink);line-height:1.2;margin-top:3px}
.wc-dh.today .wc-dd{color:var(--blue)}
.wc-body{flex:1;min-height:0;overflow:hidden;display:flex}
.wc-times{width:36px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line2)}
.wc-hr-lbl{flex:1;min-height:0;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);text-align:right;padding-right:6px;padding-top:2px;line-height:1;border-top:1px solid var(--line2)}
.wc-hr-lbl:first-child{border-top:none}
.wc-days{flex:1;display:flex;overflow:hidden}
.wc-day{flex:1;position:relative;display:flex;flex-direction:column;border-right:1px solid var(--line2);overflow:hidden}
.wc-day:last-child{border-right:none}
.wc-day.today{background:rgba(49,130,246,.025)}
.wc-slot{flex:1;min-height:0;border-top:1px solid var(--line2)}
.wc-slot:first-child{border-top:none}
.wc-slot.alt{background:rgba(15,23,42,.018)}
.wc-evt{position:absolute;left:3px;right:3px;border-radius:7px;padding:4px 8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,27,55,.08)}
.wc-evt.busy{background:#D6DCE3;border:1px solid #C2CAD3}
.wc-evt.confirmed{background:var(--blue);border:1px solid var(--blue-d)}
.wc-evt-t{font-size:var(--fs-xs);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;color:var(--strong)}
.wc-evt.confirmed .wc-evt-t{color:#fff}
.wc-evt-s{font-size:var(--fs-2xs);color:var(--muted);line-height:1.15;font-weight:600}
.wc-evt.confirmed .wc-evt-s{color:rgba(255,255,255,.88)}
.wc-now{position:absolute;left:0;right:0;pointer-events:none;z-index:2}
.wc-now-dot{position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--blue)}
.wc-now-line{border-top:2px solid var(--blue)}
.avail-bar{display:flex;border-top:1px solid var(--line);flex:none}
.avail-gutter{width:36px;flex:none}
.avail-cell{flex:1;padding:5px 4px;border-right:1px solid var(--line2);font-size:var(--fs-2xs);font-weight:700;color:var(--faint);text-align:center;line-height:1.4}
.avail-cell:last-child{border-right:none}
.avail-cell .ah{font-size:var(--fs-sm);font-weight:800;display:block}
.avail-cell.good .ah{color:var(--mint-d)}
.avail-cell.ok .ah{color:var(--blue-d)}

/* ── RIGHT PANEL COMPONENTS ── */

/* Week strip */
.rp-ws{display:flex;gap:4px}
.rp-ws-d{flex:1;text-align:center;padding:7px 3px;border-radius:var(--rx);border:1px solid var(--line);background:var(--panel)}
.rp-ws-d.td{background:var(--blue-s);border-color:var(--blue-l)}
.rp-ws-dn{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);line-height:1}
.rp-ws-d.td .rp-ws-dn{color:var(--blue-d)}
.rp-ws-dd{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1;margin:3px 0}
.rp-ws-d.td .rp-ws-dd{color:var(--blue)}
.rp-ws-dots{display:flex;gap:2px;justify-content:center;min-height:6px}
.rp-ws-dots span{width:4px;height:4px;border-radius:50%}

/* Vote card content */
.vc-tag{font-size:var(--fs-xs);font-weight:700;color:var(--blue-d);margin-bottom:5px}
.vc-title{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1.25;margin-bottom:5px}
.vc-who{font-size:var(--fs-sm);color:var(--muted);margin-bottom:14px}
.vc-pg{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.vc-bar{flex:1;height:4px;background:var(--blue-l);border-radius:var(--rp);overflow:hidden}
.vc-fill{height:100%;border-radius:var(--rp);background:var(--blue)}
.vc-pct{font-size:var(--fs-sm);font-weight:700;color:var(--blue-d)}
.vc-btn{width:100%;background:var(--blue);color:#fff;border-radius:var(--rs);padding:11px;font-size:var(--fs-sm);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;box-shadow:0 2px 8px rgba(49,130,246,.3)}
.vc-btn:hover{background:var(--blue-d)}
.vc-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.2;fill:none}

/* Upcoming rows */
.mr{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-top:1px solid var(--line2)}
.mr:first-child{border-top:none;padding-top:0}
.mr-t{min-width:48px;flex:none}
.mr-dy{font-size:var(--fs-2xs);color:var(--faint);font-weight:600;line-height:1;margin-bottom:3px}
.mr-hm{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.04em;line-height:1}
.mr-i{flex:1;min-width:0;padding-top:4px}
.mr-title{font-size:16px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.mr-who{font-size:var(--fs-sm);color:var(--faint);margin-top:3px}

/* Prefs rows */
.pf{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line2)}
.pf:first-child{border-top:none;padding-top:0}
.pf-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-l);flex:none}
.pf-t{flex:1;font-size:var(--fs-md);font-weight:500;color:var(--ink)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(9,16,28,.42);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:28px 16px;z-index:40;overflow-y:auto}
.modal-wrap{width:100%;max-width:680px;max-height:calc(100vh - 56px);display:flex;flex-direction:column;background:rgba(255,255,255,.98);border:1px solid rgba(229,232,235,.9);border-radius:28px;box-shadow:0 28px 80px rgba(15,23,42,.24),0 2px 8px rgba(15,23,42,.08);overflow:hidden}
@keyframes modalPop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
/* 모달 상단 = 조용한 내비게이션 존 (타이틀은 라벨 크기, 위계 정점은 본문의 단계 질문) */
.modal-bar{display:flex;align-items:center;gap:10px;padding:18px 24px 4px;flex:none;position:relative}
.modal-bar h2{font-size:var(--fs-xs);font-weight:850;color:var(--faint);letter-spacing:.04em;text-transform:uppercase;flex:1}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);color:var(--faint);font-size:20px;display:grid;place-items:center;cursor:pointer;flex:none}
.modal-close:hover{background:var(--line);color:var(--ink)}
/* 본문만 내부 스크롤 — 모달은 뷰포트를 넘지 않음 */
#flow,.modal-wrap>.mc{flex:1;min-height:0;overflow-y:auto}
#flow{display:flex;flex-direction:column}
/* ── 구성 단계: 모달 스크롤 대신 두-패널(추가 | 명단) 각자 내부 스크롤 ── */
.mc-fill{flex:1;min-height:0;display:flex;flex-direction:column}
.mc-fill>.mc-b{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.compose{flex:1;min-height:0;display:grid;grid-template-columns:10fr 11fr;gap:14px;overflow:hidden}
.pane{display:flex;flex-direction:column;min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel)}
.pane-h{padding:10px 14px;border-bottom:1px solid var(--line);font-size:var(--fs-xs);font-weight:800;color:var(--strong);display:flex;align-items:center;gap:8px;flex:none}
.pane-s{padding:9px 12px;border-bottom:1px solid var(--line2);flex:none}
.pane-b{flex:1;min-height:0;overflow-y:auto}
.pane-b::-webkit-scrollbar{width:4px}
.pane-b::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.pane-b.scrolling::-webkit-scrollbar-thumb{background:var(--line)}
.pane-f{padding:9px 12px;border-top:1px solid var(--line2);font-size:var(--fs-2xs);color:var(--faint);flex:none;display:flex;align-items:center;gap:6px;line-height:1.5}
@media(max-width:919px){.compose{grid-template-columns:1fr}.compose .pane-b{max-height:34vh}.create-body{grid-template-columns:minmax(0,1fr) 210px}}
.stepper{display:flex;gap:2px;padding:8px 16px 10px;flex:none;border-bottom:1px solid var(--line2)}
.stp{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 8px;border-radius:var(--rs);cursor:default}
.stp .sn{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:var(--fs-xs);font-weight:800;background:var(--line2);color:var(--faint);border:1.5px solid var(--line)}
.stp .sl{font-size:var(--fs-sm);font-weight:700;color:var(--faint);white-space:nowrap}
.stp .sl small{display:none}
.stp.done .sn{background:var(--mint-s);color:var(--mint-d);border-color:var(--mint-l)}
.stp.done .sn svg{width:11px;height:11px;stroke:currentColor;stroke-width:3;fill:none}
.stp.active{background:var(--blue-s)}
.stp.active .sn{background:var(--blue);color:#fff;border-color:var(--blue)}
.stp.active .sl{color:var(--blue-d)}
.stp.clickable{cursor:pointer}
.stp.clickable:hover{background:var(--line2)}
.mc{background:none;border-radius:0;box-shadow:none}
/* 단계 질문 = 모달 안 위계의 정점. 보더 없이 크기·여백으로만 구분 */
.mc-h{padding:20px 24px 4px;display:flex;align-items:center;gap:10px}
.mc-h h3{font-size:21px;font-weight:850;color:var(--ink);letter-spacing:0;flex:1;line-height:1.25}
.mc-b{padding:14px 24px 22px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}
.field>label{display:flex;align-items:center;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);letter-spacing:.04em;margin-bottom:7px}
.field>label .hint{margin-left:auto;font-size:var(--fs-xs);color:var(--blue-d);font-weight:700;letter-spacing:0}
.inp{width:100%;padding:10px 13px;border:1.5px solid transparent;border-radius:var(--rx);background:var(--panel2);font-size:var(--fs-sm);font-family:inherit;color:var(--ink);outline:none;font-weight:500}
.inp:focus{border-color:var(--blue);background:var(--panel);box-shadow:0 0 0 3px var(--blue-s)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.range-preview{border-radius:var(--rx);padding:12px 14px;background:var(--panel2);font-size:var(--fs-sm);line-height:1.55;color:var(--muted)}
.range-preview b{color:var(--ink)}
.range-preview.warn{background:var(--warn-s);color:var(--warn)}
.agenda-input{min-height:92px;resize:vertical;line-height:1.55;font-size:var(--fs-md)}
.agenda-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.agenda-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rx);background:var(--panel2)}
.agenda-row b{flex:none;color:var(--blue-d);font-size:var(--fs-xs)}
.agenda-row span{flex:1;min-width:0;color:var(--ink);font-size:var(--fs-sm);font-weight:600}
.summary-card{border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);padding:13px 14px;margin-top:10px}
.summary-title{font-size:var(--fs-md);font-weight:800;color:var(--ink);line-height:1.35;letter-spacing:-.01em}
.summary-empty{font-size:var(--fs-sm);font-weight:600;color:var(--faintest);line-height:1.5}
.summary-line{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-top:1px solid var(--line2);font-size:var(--fs-sm)}
.summary-line:first-of-type{border-top:none}
.summary-line span:first-child{flex:none;width:44px;color:var(--faintest);font-size:var(--fs-2xs);font-weight:800}
.summary-line b{font-weight:700;color:var(--strong)}
.summary-agendas{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.summary-agendas div{font-size:var(--fs-xs);color:var(--muted);line-height:1.45}
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 13px;border:1.5px solid transparent;border-radius:var(--rx);font-size:var(--fs-sm);font-weight:600;color:var(--muted);background:var(--panel2);cursor:pointer}
.chip:hover{background:var(--blue-s);color:var(--blue-d)}.chip.on{background:var(--blue-s);color:var(--blue-d);border-color:var(--blue-l);font-weight:700}
.chip:disabled,.chip.off{opacity:.42;cursor:not-allowed;background:var(--panel2);color:var(--faint);text-decoration:line-through;text-decoration-thickness:1px;text-decoration-color:var(--faint)}
.chip:disabled:hover,.chip.off:hover{background:var(--panel2);color:var(--faint)}
.lnk-rhythm{display:block;width:100%;text-align:left;margin-top:14px;padding:11px 13px;background:var(--panel2);border:none;border-radius:var(--rx);font-size:var(--fs-sm);color:var(--muted);cursor:pointer;font-weight:600}
.lnk-rhythm:hover{background:var(--blue-s);color:var(--blue-d)}.lnk-rhythm b{color:var(--blue-d)}
.range-row{display:flex;align-items:center;gap:7px}
.range-seg{flex:1;border:1.5px solid transparent;border-radius:var(--rx);background:var(--panel2);padding:8px 12px}
.range-seg .rk{font-size:var(--fs-2xs);color:var(--faint);font-weight:700}
.range-seg .rv{font-size:var(--fs-sm);font-weight:700;color:var(--ink);margin-top:3px}
.ppl-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:20px;margin-bottom:8px}
.ppl-chip{display:flex;align-items:center;gap:6px;padding:5px 8px 5px 5px;border-radius:var(--rp);background:var(--blue-s);border:1px solid var(--blue-l);font-size:var(--fs-xs);font-weight:700;color:var(--blue-d);cursor:pointer}
.ppl-chip:hover{background:var(--blue-l)}
.ppl-chip svg{width:9px;height:9px;stroke:var(--blue-d);stroke-width:2.5;fill:none}
.ppl-search{display:flex;align-items:center;gap:8px;border:1.5px solid transparent;border-radius:var(--rx);padding:10px 13px;background:var(--panel2);margin-bottom:8px}
.ppl-search svg{width:15px;height:15px;stroke:var(--faint);stroke-width:1.8;fill:none}
.ppl-search input{flex:1;border:none;background:none;outline:none;font-size:var(--fs-sm);color:var(--ink);font-family:inherit}
.ppl-search input::placeholder{color:var(--faintest)}
.contact-list{background:var(--panel2);border-radius:var(--rx);overflow:hidden;max-height:216px;overflow-y:auto}
.contact-list::-webkit-scrollbar{width:4px}
.contact-list::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.contact-list.scrolling::-webkit-scrollbar-thumb{background:var(--line)}
.cr{display:flex;align-items:center;gap:10px;padding:9px 13px;border-top:1px solid var(--line2);background:var(--panel);cursor:pointer}
.cr:first-child{border-top:none}
.cr:hover{background:var(--line2)}.cr.sel{background:var(--blue-s)}
.chk{width:18px;height:18px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.cr.sel .chk{background:var(--blue);border-color:var(--blue)}
.chk svg{width:10px;height:10px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
.cr.sel .chk svg{opacity:1}
.cr-nm{font-size:var(--fs-sm);font-weight:700;color:var(--ink)}
.cr-rl{font-size:var(--fs-xs);color:var(--faint)}
/* ── 조직도 그룹 (참석자 선택) ── */
.og-dept{padding:9px 13px 4px;font-size:var(--fs-2xs);font-weight:800;color:var(--faintest);letter-spacing:.07em;background:var(--panel2)}
.og-team{display:flex;align-items:center;gap:6px;padding:5px 13px;background:var(--panel2);border-top:1px solid var(--line2);font-size:var(--fs-xs);font-weight:700;color:var(--faint)}
.og-add{margin-left:auto;font-size:var(--fs-2xs);font-weight:700;color:var(--blue-d);background:var(--blue-s);border:1px solid var(--blue-l);border-radius:var(--rp);padding:2px 9px;cursor:pointer;line-height:1.4}
.og-add:hover{background:var(--blue-l)}
.og-add.off{color:var(--faint);background:var(--line2);border-color:var(--line)}
.rk-pill{font-size:var(--fs-2xs);font-weight:700;color:var(--faint);background:var(--line2);border:1px solid var(--line);border-radius:var(--rp);padding:1px 7px;margin-left:5px;vertical-align:1px}
.rk-pill.lead{color:var(--blue-d);background:var(--blue-s);border-color:var(--blue-l)}
.rank-badge{display:inline-flex;align-items:center;font-size:var(--fs-2xs);font-weight:800;color:#fff;background:var(--blue);border-radius:var(--rp);padding:3px 10px;flex:none}
.resp-list{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.resp-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1.5px solid var(--line);border-radius:var(--rx);background:var(--panel);cursor:pointer}
.resp-row:hover{border-color:var(--blue-l)}
.resp-row .resp-nm{flex:1;font-size:var(--fs-sm);font-weight:700;color:var(--ink)}
.resp-row .resp-state{font-size:var(--fs-xs);font-weight:800;color:var(--faint)}
.resp-row.voted{border-color:var(--mint-l);background:var(--mint-s)}
.resp-row.voted .resp-state{color:var(--mint-d)}
.resp-row.declined{border-color:#F3B4B4;background:var(--danger-s)}
.resp-row.declined .resp-state{color:var(--danger)}
.warn-box{background:var(--warn-s);border-radius:var(--rx);padding:11px 13px;margin-bottom:10px;font-size:var(--fs-sm);color:var(--warn);line-height:1.55}
/* ── 참석 구성 보드 (로스터) ── */
.roster{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.ro-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel)}
.ro-row.me{background:var(--blue-s);border-color:var(--blue-l)}
.ro-id{flex:1;min-width:0}
.ro-nm{font-size:var(--fs-sm);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro-sub{font-size:var(--fs-2xs);color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro-btn{font-size:var(--fs-2xs);font-weight:700;border-radius:var(--rp);padding:4px 11px;border:1px solid var(--line);background:var(--panel2);color:var(--strong);cursor:pointer;flex:none;line-height:1.3}

.ro-btn.req{background:var(--blue-s);border-color:var(--blue-l);color:var(--blue-d)}
.ro-btn.opt{color:var(--faint)}
.ro-btn.fyi{background:var(--line2);color:var(--faintest)}
.ro-btn.att{background:var(--mint-s);border-color:var(--mint-l);color:var(--mint-d)}
.ro-btn.att.remote{background:var(--cat-violet-bg);border-color:transparent;color:var(--cat-violet-fg)}
.ro-btn[disabled]{cursor:default;opacity:.8}
.ro-controls{display:flex;gap:5px;flex:none;align-items:center}
.ro-seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--rp);overflow:hidden;background:var(--panel)}
.ro-seg button{font-size:var(--fs-2xs);font-weight:800;color:var(--faint);padding:5px 9px;border-left:1px solid var(--line);line-height:1}
.ro-seg button:first-child{border-left:none}
.ro-seg button.on.req{background:var(--blue-s);color:var(--blue-d)}
.ro-seg button.on.opt{background:var(--line2);color:var(--strong)}
.ro-seg button.on.fyi{background:var(--panel2);color:var(--faint)}
.ro-seg button.on.onsite{background:var(--mint-s);color:var(--mint-d)}
.ro-seg button.on.remote{background:var(--cat-violet-bg);color:var(--cat-violet-fg)}
.ro-sum{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);padding:0 2px 8px}
/* ── 발의 섹션 박스 — 각 영역이 무엇인지 명시 ── */
.sec{border:1px solid var(--line);border-radius:var(--rs);margin-bottom:12px;background:var(--panel);overflow:hidden}
.sec-h{padding:10px 14px;border-bottom:1px solid var(--line2);font-size:var(--fs-xs);font-weight:800;color:var(--strong);display:flex;align-items:center;gap:8px;background:var(--panel2)}
.sec-h .sec-no{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;flex:none}
.sec-h .hint{margin-left:auto;font-size:var(--fs-2xs);color:var(--blue-d);font-weight:700}
.sec-b{padding:12px 14px}
/* ── 조직도 드릴다운(메뉴트리) — 한 레벨씩만 보인다 ── */
.crumb{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--panel2);border-bottom:1px solid var(--line2);font-size:var(--fs-xs);font-weight:700;color:var(--faintest);position:sticky;top:0;z-index:1}
.crumb-btn{color:var(--blue-d);font-weight:800;cursor:pointer}
.crumb-btn:hover{text-decoration:underline}
.crumb-cur{color:var(--strong)}
.tr-row{display:flex;align-items:center;gap:10px;padding:13px 14px;border-top:1px solid var(--line2);background:var(--panel);cursor:pointer}
.tr-row:hover{background:var(--line2)}
.tr-nm{font-size:var(--fs-sm);font-weight:700;color:var(--ink)}
.tr-meta{margin-left:auto;font-size:var(--fs-xs);color:var(--faint)}
.tr-act{padding:10px 14px;border-top:1px solid var(--line2);background:var(--panel2);text-align:right}
.org-scope{padding:12px 14px;border-bottom:1px solid var(--line2);background:var(--panel);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.org-scope b{font-size:var(--fs-sm);color:var(--ink)}
.org-scope span{font-size:var(--fs-xs);font-weight:700;color:var(--faint)}
.org-more{padding:12px 14px;border-top:1px solid var(--line2);background:var(--panel2);font-size:var(--fs-sm);font-weight:700;color:var(--faint);line-height:1.45}
.org-more b{color:var(--blue-d)}
/* ── 연속성 요약 바 (모달 스텝 아래) ── */
/* ── 만들기 모달 레이아웃 — 좌: 단계 콘텐츠 / 우: "만들어지는 회의" 요약(결과 영역) / 하단: 고정 CTA + inline validation ── */
.modal-wrap.create{max-width:960px;height:min(810px,calc(100vh - 40px));border-radius:28px;box-shadow:0 32px 80px rgba(25,31,40,.28)}
.modal-wrap.create .modal-bar{padding:24px 32px 10px}
.modal-wrap.create .modal-bar h2{font-size:20px;font-weight:850;color:var(--ink);letter-spacing:0}
.create-body{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr);grid-template-rows:auto auto minmax(0,1fr) auto;background:var(--panel)}
.create-body>.stepper{grid-column:1;grid-row:1}
.create-aside{grid-column:1;grid-row:2;border-left:none;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);background:linear-gradient(180deg,#fff,var(--panel2));padding:12px 32px;overflow:visible;min-height:0}
.create-flow{grid-column:1;grid-row:3;min-height:0;overflow-y:auto;display:flex;flex-direction:column}
.create-foot{grid-column:1;grid-row:4;display:flex;align-items:center;gap:10px;padding:18px 32px;border-top:1px solid var(--line2);background:rgba(255,255,255,.96);box-shadow:0 -12px 32px rgba(0,27,55,.04);flex:none}
.foot-why{flex:1;min-width:0;font-size:var(--fs-xs);font-weight:600;color:var(--warn);text-align:right;line-height:1.4}
.sum-head{display:flex;align-items:center;gap:6px;width:100%;border:none;background:none;font:inherit;font-size:var(--fs-xs);font-weight:800;color:var(--strong);letter-spacing:0;cursor:pointer;padding:0;text-align:left}
.sum-cnt{margin-left:auto;color:var(--faint);letter-spacing:0}
.sum-caret{display:inline;color:var(--faintest)}
.sum-body{display:none;padding-top:10px}
.sum-body.open{display:block}
.sum-row{display:flex;gap:8px;padding:7px 0;border-top:1px solid var(--line2);font-size:var(--fs-sm);align-items:baseline}
.sum-k{flex:none;width:58px;font-size:var(--fs-2xs);font-weight:700;color:var(--faintest)}
.sum-v{flex:1;min-width:0;font-weight:700;color:var(--ink);line-height:1.45;display:flex;gap:8px;flex-wrap:wrap}
.sum-row.off .sum-v{color:var(--faintest);font-weight:600}
.sum-note{margin-top:10px;font-size:var(--fs-2xs);color:var(--faintest);line-height:1.5}
/* 선택 영역(사람 담기) ↔ 결과 영역(참석 명단)의 시각 구분 — 결과는 면 톤이 다르다 */
.pane.result{background:var(--panel2)}
.cr-i{flex:1;min-width:0}
.cr-add{flex:none;margin-left:auto;font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d);white-space:nowrap}
.cr-add.is{color:var(--mint-d)}
.pane-tabs{display:none;gap:6px;margin-bottom:10px;flex:none}
.ptab{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel2);font:inherit;font-size:var(--fs-sm);font-weight:700;color:var(--faint);cursor:pointer}
.ptab.on{background:var(--blue-s);color:var(--blue-d);border-color:var(--blue-l)}
.modal-wrap.create .stepper{gap:10px;padding:10px 32px 18px;border-bottom:1px solid var(--line2)}
.modal-wrap.create .stp{height:44px;border-radius:22px;padding:0 14px;gap:10px;transition:background .16s ease}
.modal-wrap.create .stp .sn{width:24px;height:24px;border-radius:50%;font-size:var(--fs-xs)}
.modal-wrap.create .stp .sl{font-size:var(--fs-sm);letter-spacing:0}
.modal-wrap.create .stp.active{background:#EDF6FF}
.modal-wrap.create .stp.done .sn{background:var(--mint-s);color:var(--mint-d);border-color:var(--mint-l)}
.modal-wrap.create .mc-h{padding:28px 32px 4px}
.modal-wrap.create .mc-h h3{font-size:24px;font-weight:850;letter-spacing:0;line-height:1.25}
.modal-wrap.create .mc-b{padding:16px 32px 32px}
.modal-wrap.create .pane,.modal-wrap.create .summary-card{border-radius:18px}
.time-scope{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#fff 0%,#F9FBFD 100%);box-shadow:var(--sh-card-gray);padding:18px;margin-bottom:18px}
.scope-head{display:flex;align-items:flex-start;gap:16px;border-bottom:1px solid var(--line2);padding-bottom:15px;margin-bottom:16px}
.scope-eyebrow{font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d);margin-bottom:3px}
.scope-title{font-size:22px;font-weight:850;color:var(--ink);letter-spacing:0;line-height:1.25}
.scope-value{margin-left:auto;max-width:46%;font-size:var(--fs-sm);font-weight:800;color:var(--strong);text-align:right;line-height:1.45;word-break:keep-all}
.scope-grid{display:flex;flex-direction:column;gap:14px}
.scope-block{display:flex;flex-direction:column;gap:8px}
.scope-label{font-size:var(--fs-2xs);font-weight:800;color:var(--faintest)}
.date-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}
.date-chip{min-width:0;padding:10px 4px;border-radius:14px;background:var(--panel2);border:1px solid transparent;color:var(--faint);text-align:center;cursor:pointer}
.date-chip b{display:block;font-size:var(--fs-xs);font-weight:850;color:inherit;line-height:1}
.date-chip span{display:block;font-size:var(--fs-2xs);font-weight:700;margin-top:5px;color:inherit;line-height:1}
.date-chip.in{background:#F0F7FF;color:var(--blue-d)}
.date-chip.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 8px 18px rgba(49,130,246,.2)}
.date-chip:disabled{opacity:.32;cursor:not-allowed}
.time-range-grid{display:grid;grid-template-columns:1fr 1fr minmax(210px,.9fr);gap:10px}
.time-field{min-width:0;display:flex;flex-direction:column;gap:7px}
.time-field>span{font-size:var(--fs-2xs);font-weight:800;color:var(--faintest)}
.time-select{height:44px;width:100%;border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:0 13px;font:inherit;font-size:var(--fs-sm);font-weight:800;color:var(--ink);outline:none}
.time-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-s)}
.dur-seg{height:44px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;border-radius:14px;background:var(--panel2);border:1px solid var(--line)}
.dur-seg button{border-radius:10px;font-size:var(--fs-xs);font-weight:850;color:var(--faint);background:transparent}
.dur-seg button.on{background:var(--panel);color:var(--blue-d);box-shadow:0 2px 8px rgba(0,27,55,.08)}
.section-title-row{display:flex;align-items:flex-end;justify-content:space-between;margin:12px 2px 10px}
.section-title-row b{display:block;font-size:var(--fs-sm);font-weight:850;color:var(--ink)}
.section-title-row span{display:block;font-size:var(--fs-xs);font-weight:650;color:var(--faint);margin-top:2px}
.candidate-list.refined{gap:10px}
.time-cand{width:100%;display:grid;grid-template-columns:18px 34px minmax(0,1fr) auto;align-items:center;gap:12px;padding:16px 18px;border-radius:18px;border:1px solid transparent;background:var(--panel2);text-align:left;color:inherit;cursor:pointer;transition:background .16s ease,border-color .16s ease,box-shadow .16s ease}
.time-cand:hover{background:#F2F8FF;border-color:var(--blue-l)}
.time-cand.sel{background:var(--blue-s);border-color:var(--blue);box-shadow:var(--sh-card-blue)}
.pick-dot{width:18px;height:18px;border-radius:7px;border:2px solid var(--line);background:var(--panel);display:block}
.time-cand.sel .pick-dot,.room-choice.sel .pick-dot{border-color:var(--blue);background:var(--blue);box-shadow:inset 0 0 0 4px var(--blue)}
.time-rank{width:34px;height:24px;border-radius:999px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-size:var(--fs-2xs);font-weight:850;color:var(--blue-d)}
.time-cand-main{min-width:0;display:block}
.time-cand-main b{display:block;font-size:18px;font-weight:850;color:var(--ink);letter-spacing:0;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.time-cand-main small{display:block;font-size:var(--fs-xs);font-weight:650;color:var(--faint);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.time-cand-main small.danger{color:var(--danger)}
.time-status{font-size:var(--fs-xs);font-weight:850;color:var(--faint);white-space:nowrap}
.time-status.on,.time-status.ok{color:var(--mint-d)}
.time-status.mid{color:var(--blue-d)}
.crit-tag.warn{background:var(--warn-s);color:var(--warn)}
.empty-candidate{padding:22px 18px;border:1.5px dashed var(--line);border-radius:18px;text-align:center;color:var(--faint);font-size:var(--fs-sm);font-weight:650;background:var(--panel2)}
.room-pick{margin-top:14px;border:1px solid var(--line);border-radius:20px;background:var(--panel);overflow:hidden}
.room-pick-head{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line2)}
.room-pick-head b{font-size:var(--fs-sm);font-weight:850;color:var(--ink)}
.room-pick-head span{margin-left:auto;font-size:var(--fs-xs);font-weight:700;color:var(--faint);text-align:right}
.room-pick-body{display:flex;flex-direction:column;gap:8px;padding:12px}
.room-choice{width:100%;display:grid;grid-template-columns:18px minmax(0,1fr) auto;align-items:center;gap:12px;border-radius:15px;border:1px solid transparent;background:var(--panel2);padding:13px 14px;text-align:left;color:inherit}
.room-choice:hover{background:var(--blue-s);border-color:var(--blue-l)}
.room-choice.sel{background:var(--blue-s);border-color:var(--blue)}
.room-choice b{display:block;font-size:var(--fs-sm);font-weight:850;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-choice small{display:block;font-size:var(--fs-xs);font-weight:650;color:var(--faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-choice em{font-style:normal;font-size:var(--fs-xs);font-weight:850;color:var(--mint-d);white-space:nowrap}
.online-box{display:flex;flex-direction:column;gap:4px;padding:14px 16px;border-radius:16px;background:var(--blue-s);border:1px solid var(--blue-l)}
.online-box b{font-size:var(--fs-sm);font-weight:850;color:var(--blue-d)}
.online-box span{font-size:var(--fs-xs);font-weight:650;color:var(--muted)}
/* 받은 초대 카드(내 차례) — 1차 정보: 제목·상태 / 시간·장소 / 주최·역할·의무·형태 / 성립 조건 + 즉시 응답 */
.inv-card{border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);padding:10px 12px;margin:0 0 8px;cursor:pointer}
.inv-card:hover{border-color:var(--blue-l)}
.ic-top{display:flex;align-items:center;gap:8px}
.ic-t{flex:1;min-width:0;font-size:var(--fs-sm);font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-status{flex:none;font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d)}
.ic-line{font-size:var(--fs-xs);color:var(--strong);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-line.dim{color:var(--faint)}
.ic-foot{display:flex;align-items:center;gap:8px;margin-top:8px}
.ic-cond{flex:1;min-width:0;font-size:var(--fs-2xs);color:var(--faintest);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-btns{display:flex;gap:6px;flex:none}
.ic-btn{border:1px solid var(--line);background:var(--panel);border-radius:var(--rp);padding:5px 13px;font:inherit;font-size:var(--fs-2xs);font-weight:800;color:var(--strong);cursor:pointer}
.ic-btn:hover{background:var(--line2)}
.ic-btn.yes{background:var(--blue);border-color:var(--blue);color:#fff}
.ic-btn.no{color:var(--danger)}
.co-s.ok{color:var(--mint-d)}
/* 프라이버시 한 줄(초대 상세) — 개인 축은 전달되지 않는다는 안심 */
.priv-line{display:flex;align-items:center;gap:7px;font-size:var(--fs-2xs);font-weight:600;color:var(--blue-d);padding:7px 2px 2px}
/* 후보 없음 → 조정 액션 */
.adjust-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;padding:11px 13px;background:var(--panel2);border-radius:var(--rx)}
.adjust-lbl{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);margin-right:2px}
.fs-sep{color:var(--faintest);font-size:11px;line-height:1}
/* ── 조직도 아코디언 (팀 접기) ── */
.og-team{display:flex;align-items:center;gap:6px;padding:8px 13px;background:var(--panel2);border-top:1px solid var(--line2);font-size:var(--fs-xs);font-weight:700;color:var(--muted);cursor:pointer;user-select:none}
.og-team:hover{background:var(--line2)}
.og-caret{width:12px;height:12px;flex:none;color:var(--faintest);stroke:currentColor;stroke-width:2.4;fill:none}
.og-team.open .og-caret{transform:rotate(90deg)}
.og-add{margin-left:auto;font-size:var(--fs-2xs);font-weight:700;color:var(--blue-d);background:var(--blue-s);border:1px solid var(--blue-l);border-radius:var(--rp);padding:3px 10px;cursor:pointer;line-height:1.4}
.og-add:hover{background:var(--blue-l)}
.og-add.off{color:var(--faint);background:var(--line2);border-color:var(--line)}
/* ── 최근 함께한 사람 빠른 추가 ── */
.qa-lbl{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);letter-spacing:.04em;margin:2px 0 6px}
.qa-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.qa-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;border:1px solid var(--line);border-radius:var(--rp);background:var(--panel);cursor:pointer;font-size:var(--fs-xs);font-weight:700;color:var(--strong)}
.qa-chip:hover{border-color:var(--blue-l);background:var(--blue-s)}
.qa-chip.on{background:var(--blue-s);border-color:var(--blue);color:var(--blue-d)}
.qa-chip .qa-rk{font-weight:600;opacity:.7;font-size:var(--fs-2xs)}
/* ── 설정 접기 요약 ── */
.set-sum{display:flex;align-items:center;gap:8px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--rx);background:var(--panel2);cursor:pointer;font-size:var(--fs-sm);color:var(--strong)}
.set-sum:hover{background:var(--line2)}
.set-sum b{font-weight:700}
.set-sum .caret{margin-left:auto;color:var(--faint);font-size:12px}
.set-lbl{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);flex:none}
/* ── 파생 인라인 편집 (목적 등) ── */
.derive-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.link-btn{font-size:var(--fs-xs);font-weight:700;color:var(--blue-d);cursor:pointer;background:none;padding:2px 0}
.link-btn:hover{text-decoration:underline}
.ppl-foot{display:flex;align-items:center;gap:6px;padding:9px 13px;background:var(--panel2);border-top:1px solid var(--line);font-size:var(--fs-xs);color:var(--faint)}
.ppl-foot strong{color:var(--blue-d)}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mat-table{width:100%;border-collapse:collapse}
.mat-table th{font-size:var(--fs-sm);font-weight:700;color:var(--faint);padding:0 3px 9px;text-align:center}
.mat-table th.td{color:var(--blue)}
.mat-table td{padding:2px}
.mat-pl{width:30px;padding-right:6px}
.mat-cell{height:30px;border-radius:6px;background:var(--line2);border:1px solid var(--line);position:relative;overflow:hidden}
.mat-cell .mf{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0}
.me-row .mat-cell{border-color:var(--blue-l)}
.mat-sum{height:30px;border-radius:6px;display:grid;place-items:center;font-size:var(--fs-sm);font-weight:800;border:1px solid var(--line);background:var(--line2);color:var(--faint)}
.mat-sum.all{background:var(--mint-s);color:var(--mint-d);border-color:var(--mint-l)}
.mat-sum.most{background:var(--blue-s);color:var(--blue-d);border-color:var(--blue-l)}
.rec-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-top:1px solid var(--line2)}
.rec-row:first-child{border-top:none}
.funnel{display:flex;background:var(--panel2);border-radius:var(--rx);overflow:hidden;margin-bottom:12px}
.fs{flex:1;padding:11px 8px;text-align:center}
.fs+.fs{border-left:1px solid var(--line)}
.fs .fn{font-size:var(--fs-xl);font-weight:800;color:var(--muted);letter-spacing:-.03em}
.fs .fl{font-size:var(--fs-2xs);color:var(--faint);margin-top:3px}
.fs.active .fn{color:var(--blue)}.fs.active{background:var(--blue-s)}
.cand-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid transparent;border-radius:var(--rx);margin-bottom:7px;background:var(--panel2);cursor:pointer}
.cand-card:hover{border-color:var(--blue-l);background:var(--blue-s)}
.cand-card.sel{background:var(--blue-s);border-color:var(--blue)}
.cand-chk{width:18px;height:18px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.cand-card.sel .cand-chk{background:var(--blue);border-color:var(--blue)}
.cand-chk svg{width:11px;height:11px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
.cand-card.sel .cand-chk svg{opacity:1}
.cand-info{flex:1}
.cand-when{font-size:var(--fs-md);font-weight:800;color:var(--ink);letter-spacing:-.01em}
.cand-room{font-size:var(--fs-xs);color:var(--faint);margin-top:3px}
.cand-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.candidate-hero{border:1.5px solid var(--blue-l);border-radius:var(--rs);background:var(--blue-s);padding:16px 18px;margin-bottom:10px}
.candidate-hero .cand-when{font-size:22px}
.candidate-list{display:grid;grid-template-columns:1fr;gap:8px}
.candidate-room-pick{margin-top:12px;border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);overflow:hidden}
.candidate-room-head{padding:12px 14px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px;font-size:var(--fs-sm);font-weight:800;color:var(--ink)}
.candidate-room-body{padding:10px 12px 12px}
.candidate-room-note{font-size:var(--fs-xs);font-weight:600;color:var(--faint);margin-left:auto}
.cov-bar{width:44px;height:4px;background:var(--line);border-radius:var(--rp);overflow:hidden}
.cov-fill{height:100%;border-radius:var(--rp);background:var(--blue)}
.cov-full .cov-fill{background:var(--mint)}
.voter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.voter{display:flex;align-items:center;gap:6px;padding:6px 13px 6px 6px;border-radius:var(--rp);border:1.5px solid var(--line);background:var(--panel);font-size:var(--fs-sm);font-weight:600;color:var(--muted)}
.voter.voted{border-color:var(--mint-l);background:var(--mint-s);color:var(--mint-d)}
.voter.pending{cursor:pointer}
.voter.pending:hover{border-color:var(--blue-l);background:var(--blue-s);color:var(--blue-d)}
.vopt{padding:12px 14px;border:1.5px solid transparent;border-radius:var(--rx);margin-bottom:7px;background:var(--panel2)}
.vopt.lead{background:var(--blue-s);border-color:var(--blue-l)}
.vopt-top{display:flex;align-items:center;gap:11px}
.vopt-info{flex:1}
.vopt-when{font-size:var(--fs-md);font-weight:800;letter-spacing:-.01em;color:var(--ink)}
.vopt-sub{font-size:var(--fs-xs);color:var(--faint);margin-top:3px}
.vopt-cnt{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1}
.vopt-cnt small{font-size:var(--fs-sm);color:var(--faint);font-weight:600}
.vopt-tag{font-size:var(--fs-xs);font-weight:800;color:#fff;background:var(--blue);padding:4px 11px;border-radius:var(--rp)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:var(--line2);border-radius:var(--rp);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--rp);background:var(--blue)}
.prog-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--muted)}
.vopt-bar{height:3px;background:var(--line2);border-radius:var(--rp);margin-top:10px;overflow:hidden}
.vopt-bar-fill{height:100%;border-radius:var(--rp);background:var(--mint)}
.vopt.lead .vopt-bar{background:var(--blue-l)}
.vopt.lead .vopt-bar-fill{background:var(--blue)}
.confirm-wrap{text-align:center;padding:14px 0 10px}
.confirm-icon{width:46px;height:46px;border-radius:50%;background:var(--mint-s);border:2px solid var(--mint-l);display:grid;place-items:center;margin:0 auto 12px}
.confirm-icon svg{width:23px;height:23px;stroke:var(--mint-d);stroke-width:2.5;fill:none}
.confirm-time{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.03em;color:var(--ink)}
.confirm-sub{font-size:var(--fs-sm);color:var(--faint);margin:6px 0 14px}
.confirm-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.rchip{font-size:var(--fs-sm);font-weight:700;padding:6px 13px;border-radius:var(--rp);background:var(--line2);color:var(--faint);border:1px solid var(--line)}
.rchip.win{background:var(--blue-s);color:var(--blue-d);border-color:var(--blue-l)}
.rcv-box{background:var(--panel2);border-radius:var(--rs);overflow:hidden;margin-bottom:12px}
.rcv-hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;font-size:var(--fs-sm);font-weight:700;color:var(--strong)}
.rcv-hd svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.rcv-bd{padding:12px 16px}
.invite-sheet{border:1px solid var(--line);border-radius:var(--rs);background:var(--panel);overflow:hidden;margin-top:10px}
.invite3-head{padding:20px 20px 14px;border-bottom:1px solid var(--line2)}
.invite3-title{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.03em;line-height:1.2}
.invite3-agenda{font-size:var(--fs-sm);color:var(--muted);line-height:1.5;margin-top:6px}
.invite3-grid{display:flex;flex-direction:column;padding:6px 20px 14px}
.invite3-row{display:grid;grid-template-columns:72px minmax(0,1fr);gap:14px;padding:13px 0;border-top:1px solid var(--line2)}
.invite3-row:first-child{border-top:none}
.invite3-k{font-size:var(--fs-xs);font-weight:800;color:var(--faint);letter-spacing:0;line-height:1.45}
.invite3-v{font-size:var(--fs-md);font-weight:800;color:var(--ink);line-height:1.42;word-break:keep-all;overflow-wrap:normal}
.invite3-sub{font-size:var(--fs-xs);font-weight:600;color:var(--faint);line-height:1.45;margin-top:3px;word-break:keep-all}
.invite3-alt{padding:0 20px 16px;font-size:var(--fs-xs);font-weight:700;color:var(--faint);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.att-mini{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.att-mini-row{display:flex;align-items:center;gap:8px;font-size:var(--fs-sm);font-weight:600;color:var(--strong)}
.att-mini-row .pill{padding:2px 8px;font-size:var(--fs-2xs)}
.rcv-row{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:var(--fs-sm);color:var(--ink);font-weight:500}
.rcv-row svg{width:15px;height:15px;stroke:var(--faint);stroke-width:1.8;fill:none}
.rcv-ft{display:flex;align-items:center;gap:7px;padding:11px 16px;border-top:1px solid var(--line);font-size:var(--fs-sm);color:var(--faint)}
.rcv-ft svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.room-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rx);margin-bottom:6px;padding:11px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.room-nm{font-size:var(--fs-sm);font-weight:700;color:var(--ink)}
.room-meta{font-size:var(--fs-xs);color:var(--faint);margin-top:2px}
.rtl{display:flex;height:12px;border-radius:4px;overflow:hidden;border:1px solid var(--line);flex:1;min-width:60px}
.rtl span{flex:1;border-right:1px solid var(--line2)}
.rtl span:last-child{border-right:none}
.rtl span.busy{background:#E8EDF8}.rtl span.free{background:var(--blue-s)}
.toast{position:fixed;bottom:20px;left:50%;translate:-50% 0;background:var(--ink);color:#fff;padding:10px 20px;border-radius:var(--rs);box-shadow:var(--sh-lg);font-size:var(--fs-sm);opacity:0;pointer-events:none;z-index:60;max-width:90vw}
.toast.show{opacity:1}
.toast strong{color:#93C5FD}

/* ── attendee grade toggle (stage1) ── */
.gr-tog{font-size:var(--fs-2xs);font-weight:800;padding:2px 8px;border-radius:var(--rp);border:1px solid var(--blue-l);background:#fff;color:var(--blue-d);line-height:1;cursor:pointer;flex:none}
.gr-tog.opt{border-color:var(--line);background:var(--line2);color:var(--faint)}

.chip-x{display:grid;place-items:center;width:15px;height:15px;border-radius:50%;cursor:pointer;color:var(--blue-d);flex:none}
.chip-x svg{width:8px;height:8px;stroke:currentColor;stroke-width:2.6;fill:none}
.chip-x:hover{background:var(--blue-l)}
/* ── role badges (stage2 matrix) ── */
.rl-badge{display:block;font-size:9px;font-weight:800;line-height:1;margin-top:2px;text-align:center;letter-spacing:-.02em}
.rl-badge.me{color:var(--blue)}.rl-badge.req{color:var(--strong)}.rl-badge.opt{color:var(--faintest)}
tr.opt-row .mat-cell{opacity:.6}
tr.opt-row .mat-cell .mf{opacity:.85}
/* ── funnel caption ── */
.funnel-cap{font-size:var(--fs-2xs);color:var(--faintest);margin:-6px 0 12px;letter-spacing:-.01em;line-height:1.5}
.funnel-cap b{color:var(--faint);font-weight:700}
/* ── candidate coverage detail ── */
.cand-req{font-size:var(--fs-2xs);color:var(--faint);font-weight:600;margin-top:2px}
/* ── preference profile (home card) ── */
.pf-meta{display:flex;flex-direction:column;gap:3px;margin:12px 0 12px}
.pf-hours{display:flex;align-items:center;gap:5px;font-size:var(--fs-xs);font-weight:700;color:var(--muted)}
.pf-hours svg{width:11px;height:11px;stroke:var(--muted);stroke-width:2;fill:none}
.pf-derive{display:flex;align-items:center;gap:5px;font-size:var(--fs-2xs);color:var(--faint)}
.pf-derive svg{width:10px;height:10px;stroke:var(--mint-d);stroke-width:2.4;fill:none}
.pf-ic{width:30px;height:20px;border-radius:7px;display:grid;place-items:center;flex:none;font-size:10px;font-weight:900;line-height:1}
.pf-ic.avoid{background:var(--line2);color:var(--faint)}
.pf-ic.prefer{background:var(--mint-s);color:var(--mint-d)}
.pf-t .pf-sub{font-size:var(--fs-2xs);color:var(--faintest);font-weight:500;margin-top:1px}
.pf-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--line2)}
.pf-section:first-of-type{margin-top:0;padding-top:0;border-top:none}
.pf-section-title{font-size:var(--fs-2xs);font-weight:800;color:var(--faintest);letter-spacing:.04em;margin-bottom:4px}
.pf-context{background:var(--warn-s);border:1px solid rgba(178,94,9,.14);border-radius:var(--rx);padding:8px 10px;margin:8px 0 2px}
.pf-context .pf{border-top-color:rgba(178,94,9,.12)}
.pf-context .pf:first-child{border-top:none;padding-top:0}
.pf-context .pf:last-child{padding-bottom:0}
.crit-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.crit-tag{font-size:var(--fs-2xs);font-weight:800;border-radius:var(--rp);padding:2px 7px;background:var(--line2);color:var(--faint)}
.crit-tag.good{background:var(--mint-s);color:var(--mint-d)}
.crit-tag.today{background:var(--warn-s);color:var(--warn)}
.invite3-context{margin:0 14px 14px;padding:10px 12px;border-radius:var(--rx);background:var(--warn-s);color:var(--warn);font-size:var(--fs-xs);font-weight:700;line-height:1.45}
.pf-cnt{margin-left:auto;font-size:var(--fs-2xs);font-weight:800;color:var(--faint)}
/* ── rooms legend ── */
.rooms-legend{display:flex;gap:14px;margin-bottom:14px;font-size:var(--fs-xs);color:var(--faint)}
.rooms-legend span{display:flex;align-items:center;gap:5px}
.rooms-legend i{width:14px;height:9px;border-radius:2px;display:inline-block}
/* ── calendar header — 보드명이 아니라 현재 날짜·기간을 첫 정보로 둔다 ── */
.hp-h h2.wc-title-h{font-size:20px;font-weight:850;color:var(--ink);text-transform:none;letter-spacing:0;flex:0 1 auto;max-width:calc(50% - 112px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hp-sub{font-size:var(--fs-sm);font-weight:500;color:var(--faint);margin-left:10px;letter-spacing:0}
.wc-legend{display:flex;gap:13px;font-size:var(--fs-xs);font-weight:600;color:var(--muted)}
.wc-legend span{display:flex;align-items:center;gap:5px}
.wc-legend i{width:13px;height:13px;border-radius:4px;display:inline-block;flex:none}
.wc-legend .lg-busy{background:#D6DCE3;border:1px solid #C2CAD3}
.wc-legend .lg-conf{background:var(--blue)}
.wc-legend .lg-free{background:#fff;border:1px solid var(--line)}
/* ── right rail section headers ── */
.rp-sec-h{font-size:var(--fs-md);font-weight:800;color:var(--strong);letter-spacing:-.01em;margin:2px 2px 0;display:flex;align-items:center;gap:7px}
.rp-sec-h svg{width:15px;height:15px;stroke:var(--muted);stroke-width:2;fill:none}
.rp-sec-n{margin-left:auto;font-size:var(--fs-2xs);font-weight:800;color:#fff;background:var(--blue);border-radius:var(--rp);padding:2px 9px;min-width:22px;text-align:center}
.rp-sec-n.q{background:var(--line);color:var(--faint)}
/* ── sidebar shell ── */
.sidebar{width:288px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px 14px;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.sidebar.scrolling::-webkit-scrollbar-thumb{background:var(--line)}
.side-brand{display:flex;align-items:center;gap:10px;padding:2px 8px 18px}
.side-profile{display:flex;align-items:center;gap:11px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--rs);padding:11px 12px;margin-bottom:12px}
.side-av{width:38px;height:38px;border-radius:12px;background:var(--blue);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;flex:none}
.side-nm{font-size:var(--fs-md);font-weight:800;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-rl{font-size:var(--fs-xs);color:var(--faint)}
.side-lbl{display:flex;align-items:center;font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);letter-spacing:.07em;text-transform:uppercase;padding:0 8px 8px}
.side-cnt{margin-left:auto;font-size:var(--fs-2xs);font-weight:800;color:var(--muted);background:var(--line2);border-radius:var(--rp);padding:1px 8px;letter-spacing:0}
.side-nav{display:flex;flex-direction:column;gap:3px}
.side-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rs);font-size:var(--fs-md);font-weight:600;color:var(--muted);text-align:left;width:100%;cursor:pointer}
.side-item svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none;flex:none}
.side-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-item:hover{background:var(--line2);color:var(--ink)}
.side-item.on{background:var(--blue-s);color:var(--blue-d);font-weight:700}
.side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line2)}
.tb-title{font-size:var(--fs-lg);font-weight:800;color:var(--ink);letter-spacing:-.02em}
/* ── monthly calendar ── */
.mcal-nav{display:flex;gap:5px}
.mcal-arw{width:30px;height:30px;border-radius:var(--rx);border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:16px;display:grid;place-items:center;line-height:1;cursor:pointer}
.mcal-arw:hover{background:var(--line2);color:var(--ink)}
.mcal-today{height:30px;padding:0 12px;border-radius:var(--rx);border:1px solid var(--line);background:var(--panel);color:var(--blue-d);font-size:var(--fs-xs);font-weight:800;cursor:pointer;margin-right:2px}
.mcal-today:hover{background:var(--blue-s)}
.cal-hint{font-size:var(--fs-2xs);color:var(--faintest);font-weight:600;margin-right:6px;align-self:center}
.cal-legend{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
.cal-legend .cl-tag{font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d);background:var(--blue-s);border:1px solid var(--blue-l);border-radius:var(--rp);padding:2px 9px}
.cal-legend .cl-it{display:flex;align-items:center;gap:6px;font-size:var(--fs-xs);font-weight:600;color:var(--muted)}
.cal-legend i{width:16px;height:11px;border-radius:3px;flex:none}
.cal-legend .cl-avoid{background:rgba(139,149,161,.20)}
.cal-legend .cl-prefer{background:rgba(15,201,166,.24)}
.cal-legend .cl-free{background:var(--free-s);border:1px solid var(--free-l)}
.cal-legend .cl-invite{background:var(--panel);border:1.5px dashed var(--faintest)}
.cal-legend .cl-block{background:repeating-linear-gradient(-45deg,rgba(139,149,161,.28) 0 3px,rgba(139,149,161,.08) 3px 6px)}
.cal-legend .cl-spacer{flex:1}
.cal-legend .cl-feat{gap:7px}
.cal-legend .cl-feat>b{font-weight:800;color:var(--ink)}
.cal-legend .cl-only{display:inline-flex;align-items:center;gap:3px;font-size:var(--fs-2xs);font-weight:700;color:var(--blue-d)}
.cal-legend .cl-note-sp{flex:1}
.cl-cat{display:inline-flex;align-items:center;gap:5px;border:none;background:none;font:inherit;font-size:var(--fs-2xs);font-weight:600;color:var(--muted);cursor:pointer;padding:2px 5px;border-radius:var(--rp)}
.cl-cat i{width:8px;height:8px;border-radius:50%;flex:none}
.cl-cat:hover{background:var(--line2)}
.cl-cat.off{opacity:.35}
.cal-legend .cl-onair{background:var(--blue)}
.cal-legend .cl-soft{background:#E7ECF2;border:1px solid #D5DCE5}
.cal-legend .cl-sync{background:var(--cat-teal-bg);border:1px solid var(--line)}
.cal-legend .cl-me{background:var(--panel);border:1px solid var(--line)}
.cal-legend .cl-sep{width:1px;height:14px;background:var(--line);flex:none}
.cal-legend .cl-note{margin-left:auto;font-size:var(--fs-2xs);color:var(--faintest)}
@media(max-width:639px){.cal-legend .cl-note{display:none}}
.wc-legend .lg-mix{background:linear-gradient(135deg,#7C5CFC 0 34%,#0FC9A6 34% 67%,#FF922B 67% 100%)}
.mcal-shell{flex:1;min-height:0;overflow:hidden;background:var(--panel);overscroll-behavior:contain}
.mcal-shell.slide-up .mcal{animation:mcalUp .18s ease-out both}
.mcal-shell.slide-down .mcal{animation:mcalDown .18s ease-out both}
@keyframes mcalUp{from{opacity:.82;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes mcalDown{from{opacity:.82;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.mcal{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--panel);overscroll-behavior:contain}
.mcal-shell .mcal{height:100%;min-height:100%}
.mcal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line)}
.mcal-dow{padding:9px 12px;font-size:var(--fs-xs);font-weight:700;color:var(--faint)}
.mcal-dow.we{color:var(--faintest)}
.mcal-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr}
.mcal-cell{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:7px 8px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.mcal-cell:nth-child(7n){border-right:none}
.mcal-cell.outside{background:var(--panel2)}
.mcal-cell.today{background:var(--blue-s)}
.mcal-cell.dim{background:rgba(247,248,250,.68)}
.mcal-dn{font-size:var(--fs-sm);font-weight:700;color:var(--strong)}
.mcal-cell.today .mcal-dn{color:var(--blue);font-weight:800}
.mcal-cell.dim .mcal-dn{color:var(--faintest);opacity:.65}
.mcal-cell.outside .mcal-dn{color:var(--faintest);font-weight:600}
.mcal-evts{display:flex;flex-direction:column;gap:3px;overflow:hidden}
.mcal-evt{display:flex;align-items:center;gap:5px;font-size:var(--fs-2xs);font-weight:700;padding:3px 7px;border-radius:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.mcal-cell.dim .mcal-evt{opacity:.45;filter:saturate(.55)}
.mcal-evt.conf{box-shadow:0 1px 3px rgba(49,130,246,.35)}
/* 월간 칩도 주간과 같은 4분류 색 */
.mcal-evt.is-onair{background:var(--blue);color:#fff}
.mcal-evt.is-onair .mcal-dot{background:#fff;opacity:.9}
.mcal-evt.is-soft{background:#E7ECF2;border:1px solid #D5DCE5;color:var(--strong)}
.mcal-evt.is-soft .mcal-dot{background:var(--faintest)}
.mcal-evt.is-block{background:repeating-linear-gradient(-45deg,rgba(139,149,161,.16) 0 4px,rgba(139,149,161,.05) 4px 8px);border:none;color:var(--faint)}
.mcal-evt.is-block .mcal-dot{background:var(--faint)}
.mcal-evt.is-invite{background:var(--panel);border:1px dashed var(--faintest);color:var(--strong)}
.mcal-evt.is-invite .mcal-dot{background:var(--faintest)}
.mcal-dot{width:5px;height:5px;border-radius:50%;flex:none}
.mcal-more{font-size:var(--fs-2xs);font-weight:700;color:var(--faint);padding-left:2px}
.pf-route{display:flex;align-items:center;gap:12px;border:1px solid var(--blue-l);background:var(--blue-s);border-radius:var(--rs);padding:12px 13px;margin-top:10px}
.pf-route-i{flex:1;min-width:0}
.pf-route-t{font-size:var(--fs-sm);font-weight:800;color:var(--blue-d)}
.pf-route-s{font-size:var(--fs-xs);color:var(--muted);line-height:1.45;margin-top:2px}
.pf-actions{display:flex;align-items:center;gap:4px;flex:none}
.pf-action{padding:4px 7px;border-radius:7px;font-size:var(--fs-2xs);font-weight:750;color:var(--faint)}
.pf-action:hover{background:var(--line2);color:var(--ink)}
.pf-action.danger:hover{background:var(--danger-s);color:var(--danger)}
/* ── 기준 설정 모달 — 레퍼런스형 큰 제목·박스 입력·칩 그룹 ── */
.modal-wrap.criteria{max-width:660px;width:min(660px,94vw);border-radius:26px;background:#fff}
.criteria-head{display:flex;align-items:flex-start;gap:18px;padding:28px 30px 20px;border-bottom:1px solid var(--line2)}
.criteria-copy{flex:1;min-width:0}
.criteria-kicker{display:block;margin-bottom:7px;font-size:var(--fs-2xs);font-weight:850;color:var(--blue-d);letter-spacing:.06em;text-transform:uppercase}
.criteria-head h2{font-size:28px;font-weight:900;color:var(--ink);line-height:1.15;letter-spacing:0}
.criteria-head p{margin-top:7px;font-size:var(--fs-sm);font-weight:600;color:var(--faint);line-height:1.5}
.criteria-close{width:36px;height:36px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);display:grid;place-items:center;color:var(--faint);font-size:22px;line-height:1;cursor:pointer;flex:none}
.criteria-close:hover{background:var(--line2);color:var(--ink)}
.criteria-body{flex:1;min-height:0;overflow-y:auto;padding:20px 30px 28px}
.criteria-band{display:flex;align-items:center;gap:14px;border:1px solid var(--blue-l);border-radius:18px;background:linear-gradient(135deg,var(--blue-s),#fff 70%);padding:14px 16px;margin-bottom:14px}
.criteria-band svg{width:20px;height:20px;stroke:var(--blue-d);stroke-width:2;fill:none;flex:none}
.criteria-band b{display:block;font-size:var(--fs-sm);font-weight:900;color:var(--ink)}
.criteria-band span{display:block;margin-top:2px;font-size:var(--fs-xs);font-weight:650;color:var(--muted)}
.modal-wrap.criteria .pf-section{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}
.modal-wrap.criteria .pf-section:first-of-type{margin-top:0;padding:16px;border-top:1px solid var(--line)}
.modal-wrap.criteria .pf-section-title{font-size:var(--fs-sm);font-weight:900;color:var(--ink);letter-spacing:0;margin-bottom:10px}
.modal-wrap.criteria .pf-context{margin:0;background:var(--warn-s);border-radius:14px;padding:10px 12px}
.criteria-form{border:1px solid var(--blue-l);border-radius:18px;background:var(--free-s);padding:16px;margin-top:12px}
.criteria-form .f:last-child{margin-bottom:0}
.criteria-form-actions{display:flex;align-items:center;gap:10px;margin-top:8px}
.criteria-why{flex:1;text-align:right;font-size:var(--fs-xs);color:var(--faintest);font-weight:700}
.criteria-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
@media(max-width:700px){
  .modal-wrap.criteria{width:100%;max-width:none;max-height:100vh;border-radius:0}
  .criteria-head{padding:22px 18px 16px}
  .criteria-head h2{font-size:24px}
  .criteria-body{padding:16px 18px 22px}
  .criteria-band{align-items:flex-start}
  .criteria-form-actions,.criteria-actions{flex-wrap:wrap}
  .criteria-why{text-align:left;order:-1;flex-basis:100%}
}
/* 사이드바 — 좁은 화면에서는 숨기지 않고 드로어로 전환 (기능 접근성 유지) */
.tb-menu{display:none}
.scrim{position:fixed;inset:0;background:rgba(10,20,40,.4);z-index:44}
.scrim[hidden]{display:none}
@media(max-width:1023px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:45;transform:translateX(-105%);box-shadow:0 0 48px rgba(0,27,55,.25)}
  .sidebar.open{transform:none}
  .tb-menu{display:grid}
}
/* ── sidebar actions ── */
.side-cta{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:var(--rs);background:var(--blue);color:#fff;font-size:var(--fs-md);font-weight:700;cursor:pointer;margin-bottom:8px;box-shadow:0 2px 8px rgba(49,130,246,.3)}
.side-cta:hover{background:var(--blue-d)}
.side-cta svg{width:16px;height:16px;stroke:#fff;stroke-width:2.4;fill:none}
.side-ghost{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:var(--rs);background:var(--panel2);border:1px solid var(--line);color:var(--strong);font-size:var(--fs-md);font-weight:600;cursor:pointer}
.side-ghost:hover{background:var(--line2)}
.side-ghost svg{width:17px;height:17px;stroke:var(--muted);stroke-width:1.9;fill:none;flex:none}
.side-chip{margin-left:auto;font-size:var(--fs-2xs);font-weight:700;color:var(--faint)}
.side-start{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff 0,#F8FBFF 100%);padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,27,55,.03)}
.side-start-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.side-start-title{font-size:var(--fs-sm);font-weight:850;color:var(--ink);line-height:1.25}
.side-start-sub{font-size:var(--fs-2xs);font-weight:650;color:var(--faint);margin-top:1px}
.side-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.side-quick{display:flex;align-items:center;justify-content:center;gap:6px;min-height:36px;border-radius:12px;border:1px solid var(--line);background:var(--panel);font-size:var(--fs-xs);font-weight:850;color:var(--strong);cursor:pointer}
.side-quick:hover{background:var(--blue-s);border-color:var(--blue-l);color:var(--blue-d)}
.side-quick svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none}
/* ── topbar greeting — 이름만 강조, 나머지는 보조 톤 (위계 1단계) ── */
.tb-greet{font-size:var(--fs-md);font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tb-greet b{color:var(--ink);font-weight:800}
/* ── vote card ask line ── */
.vc-ask{font-size:var(--fs-sm);color:var(--blue-d);margin-bottom:12px;line-height:1.5}
.vc-ask b{font-weight:800}
/* ── upcoming item ── */
.mr-sub{display:flex;align-items:center;gap:7px;margin-top:5px;min-width:0}
.mr-avs{display:flex;flex:none}
.mr-avs .av{margin-right:-5px;border:1.5px solid var(--panel)}
.mr-loc{font-size:var(--fs-sm);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
/* ── left: schedule-management panel — 섹션은 헤어라인 + 라벨로 명확히 분리 ── */
.side-body{display:flex;flex-direction:column;flex:1;min-height:0}
.side-sec{margin-top:10px;padding-top:16px;border-top:1px solid var(--line2)}
.side-sec.first{margin-top:0;padding-top:0;border-top:none}
.mini-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mini-mon{font-size:var(--fs-sm);font-weight:800;color:var(--ink)}
.mini-nav{display:flex;gap:2px}
.mini-arw{width:22px;height:22px;border-radius:6px;color:var(--faint);font-size:13px;display:grid;place-items:center;cursor:pointer}
.mini-arw:hover{background:var(--line2);color:var(--ink)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-dowrow{margin-bottom:3px}
.mini-dow{font-size:9px;font-weight:700;color:var(--faintest);text-align:center;padding:2px 0}
.mini-c{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:var(--fs-2xs);font-weight:600;color:var(--strong);border-radius:7px}
.mini-c.empty{visibility:hidden}
.mini-c.today{background:var(--blue);color:#fff;font-weight:800}
.mini-dots{display:flex;gap:1.5px;position:absolute;bottom:3px}
.mini-dots i{width:3px;height:3px;border-radius:50%}
.mini-c.today .mini-dots i{background:#fff!important}
.filt-list{display:flex;flex-direction:column;gap:1px}
.filt-row{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:var(--rx);cursor:pointer;width:100%;text-align:left}
.filt-row:hover{background:var(--line2)}
.filt-chk{width:16px;height:16px;border-radius:5px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.filt-chk svg{width:9px;height:9px;stroke:#fff;stroke-width:3;fill:none}
.filt-row.off .filt-chk svg{opacity:0}
.filt-dot{width:8px;height:8px;border-radius:50%;flex:none}
.filt-nm{flex:1;font-size:var(--fs-sm);font-weight:600;color:var(--ink)}
.filt-row.off .filt-nm{color:var(--faintest)}
.filt-ct{font-size:var(--fs-2xs);font-weight:700;color:var(--faint)}
.up-list{display:flex;flex-direction:column;gap:2px}
.up-row{display:flex;gap:10px;padding:8px 6px;border-radius:var(--rx)}
.up-row:hover{background:var(--line2)}
.up-d{flex:none;width:46px;display:flex;flex-direction:column}
.up-d b{font-size:var(--fs-md);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.1}
.up-d span{font-size:9px;color:var(--faint);font-weight:600;margin-top:1px}
.up-i{min-width:0;flex:1}
.up-t{font-size:var(--fs-sm);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-s{display:flex;align-items:center;gap:6px;margin-top:3px;min-width:0}
.up-avs{display:flex;flex:none}
.up-avs .av{margin-right:-4px;border:1.5px solid var(--panel)}
.up-loc{font-size:var(--fs-2xs);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
/* ── view toggle ── */
.cal-seg{display:flex;align-items:center;height:26px;background:var(--line2);border-radius:8px;padding:2px;gap:1px;box-sizing:border-box}
.hp-h>.cal-seg{position:absolute;left:50%;transform:translateX(-50%)}
.seg{height:22px;display:inline-flex;align-items:center;padding:0 11px;border-radius:6px;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);cursor:pointer;line-height:1}
.seg:hover{color:var(--ink)}
.seg.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,27,55,.10)}
/* ── week time grid — 요일 헤더는 캘린더 타이틀보다 한 단계 아래 (위계), 오늘은 파란 원 하나로만 강조 ── */
.wk{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--panel);overflow:hidden}
/* padding-right 6px = 본문(.wk-body) 세로 스크롤바 폭 보정 — 없으면 헤더 열 경계선과 본문 열 경계선이 어긋난다 */
.wk-head{display:flex;border-bottom:1px solid var(--line2);flex:none;padding-right:6px}
.wk-gut{width:56px;flex:none}
.wk-dh{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 9px;border-left:1px solid var(--line2)}
.wk-dd{font-size:15px;font-weight:700;color:var(--strong);letter-spacing:-.02em;line-height:1;width:26px;height:26px;display:grid;place-items:center;border-radius:50%}
.wk-dh.today .wk-dd{background:var(--blue);color:#fff;font-weight:800}
.wk-dn{font-size:var(--fs-2xs);font-weight:700;color:var(--faint)}
.wk-dh.today .wk-dn{color:var(--blue-d)}
.wk-body{flex:1;min-height:0;overflow-y:auto;display:flex}
.wk-body::-webkit-scrollbar{width:6px}.wk-body::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.wk-body.scrolling::-webkit-scrollbar-thumb{background:var(--line)}
/* 시간 라벨·슬롯 모두 flex 균등 분배 — %-기반 이벤트 블록과 항상 같은 축척을 공유 (라벨-이벤트 어긋남 방지).
   height:max-content — 내용(15시간×64px)이 스크롤 컨테이너보다 클 때 열 박스가 내용 높이를 갖게 해 % 기준을 일치시킴 */
.wk-times{width:56px;flex:none;display:flex;flex-direction:column;height:max-content;min-height:100%}
.wk-hr{flex:1;min-height:64px;font-size:var(--fs-2xs);font-weight:600;color:var(--faintest);text-align:right;padding:5px 8px 0 0;border-top:1px solid var(--line2)}
.wk-hr:first-child{border-top:none}
.wk-cols{flex:1;display:flex;height:max-content;min-height:100%}
.wk-col{flex:1;position:relative;display:flex;flex-direction:column;border-left:1px solid var(--line2)}
.wk-col.today{background:rgba(49,130,246,.03)}
.wk-slot{flex:1;min-height:64px;border-top:1px solid var(--line2);background:var(--free-s)}
.wk-slot[data-slot]{cursor:pointer}
.wk-slot[data-slot]:hover{background:#EAF4FF}
.wk-slot.past{background:#F3F4F6;cursor:not-allowed;opacity:.58}
.wk-slot.past:hover{background:#F3F4F6}
.wk-slot.lowprio{position:relative;background:rgba(139,149,161,.07)}
.wk-slot.lowprio:hover{background:rgba(139,149,161,.11)}
.wk-slot:first-child{border-top:none}
/* 주말 열 — 조율 대상이 아님을 톤으로 구분 */
/* 주말 = 비활성이 아니라 톤만 다른 시간 영역 — 클릭·일정·내 기준 표시 전부 동작. 흐림은 과거 날짜(dim)에만 */
.wk-dh.we .wk-dn{color:var(--cat-rose-fg)}
.wk-col.we{background:rgba(242,244,246,.45)}
.wk-dh.dim{background:rgba(247,248,250,.72)}
.wk-dh.dim .wk-dn,.wk-dh.dim .wk-dd{color:var(--faintest);opacity:.55}
.wk-col.dim{background:rgba(247,248,250,.62)}
.wk-col.dim .wk-slot{border-top-color:rgba(229,232,235,.55)}
.wk-col.dim .wk-zone{opacity:.35}
.wk-col.dim .wk-evt{opacity:.42;filter:saturate(.55);box-shadow:none}
.wk-col.dim .wk-slot[data-slot]:hover{background:rgba(49,130,246,.025)}
/* 내 기준 존(우선순위 낮음) — 일정이 없는 빈 시간에만, 채도 낮춤 워시로. 블록 위에 겹치지 않는다 */
.wk-zone{position:absolute;left:0;right:0;pointer-events:none;z-index:1}
.wk-zone.avoid{background:rgba(139,149,161,.055);backdrop-filter:saturate(.25);-webkit-backdrop-filter:saturate(.25)}
.wk-zone.block{background:repeating-linear-gradient(-45deg,rgba(139,149,161,.18) 0 5px,rgba(139,149,161,.06) 5px 10px)}
/* 내 기준 토글 (캘린더 헤더) */
/* 내 기준 = 레이어 토글(미니 스위치) — 큰 버튼이 아니라 조용한 컨트롤 */
.lay-tog{display:inline-flex;align-items:center;gap:6px;border:none;background:none;padding:4px 6px;border-radius:var(--rx);font:inherit;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);cursor:pointer;white-space:nowrap;flex:none}
.lay-tog:hover{color:var(--muted)}
.lay-tog.on{color:var(--mint-d)}
.lt-sw{width:26px;height:15px;border-radius:999px;background:var(--line);position:relative;flex:none;transition:background .15s}
.lt-sw::after{content:"";position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,27,55,.25);transition:left .15s}
.lay-tog.on .lt-sw{background:var(--blue)}
.lay-tog.on .lt-sw::after{left:13px}
.criteria-toggle{display:inline-flex;align-items:center;gap:6px;border:none;background:none;padding:2px 4px;border-radius:var(--rx);font:inherit;font-size:var(--fs-2xs);font-weight:800;color:var(--faint);cursor:pointer;white-space:nowrap}
.criteria-toggle:hover{background:var(--line2);color:var(--muted)}
.criteria-toggle.on{color:var(--blue-d)}
.criteria-toggle .lt-sw{width:25px;height:14px;border-radius:var(--rp);background:var(--line);position:relative}
.criteria-toggle .lt-sw::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,27,55,.14)}
.criteria-toggle.on .lt-sw{background:var(--blue)}
.criteria-toggle.on .lt-sw::after{left:13px}
/* ── 캘린더 색 시스템(3계층) — 텍스트 라벨 대신 색이 말한다. 좌측 컬러바는 §8.1 금지 — 강조는 soft 배경+그림자로:
   ① 사건: 분류색 soft 배경 + 부드러운 그림자(팀 teal · 리뷰 violet · 외부 amber) / ON AIR 확정 blue / 응답 필요 = 흰 바탕 red 대시(아직 자리만 잡힘)
   ② 배경 판단: 우선순위 낮음(내 기준·근무시간 밖) = 채도 낮춤 연회색 — 면으로만, 사유는 hover·클릭
   ③ 상태 톤: 지난 날 dim · 개인 = 흰 카드 · 막음(회의 막기·절대 불가) = 빗금 채움 블록(카드 아님 — 호버·그림자 없음) ── */
.wk-evt{position:absolute;left:4px;right:4px;border-radius:10px;padding:7px 10px 8px;overflow:hidden;display:flex;flex-direction:column;gap:2px;min-height:62px;z-index:2;box-shadow:inset 0 0 0 1px rgba(255,255,255,.55),var(--sh-evt);transition:transform .14s,box-shadow .14s}
.wk-evt:hover{transform:translateY(-1px);box-shadow:inset 0 0 0 1px rgba(255,255,255,.55),var(--sh-evt-h)}
/* 카드 4분류 — ON AIR 확정(프라이머리 블루 솔리드) · 응답 필요(대시) · 막은 시간(빗금) · 우선순위 낮음(연회색).
   연동된 일정(google)은 무조건 '막은 시간'이다 — 회의처럼 파랗게 칠하지 않는다 */
.wk-evt.lay-onair{background:var(--blue)!important;color:#fff!important;box-shadow:0 1px 3px rgba(23,60,150,.28)}
.wk-evt.lay-onair:hover{background:var(--blue-d)!important}
.wk-evt.lay-onair .wk-evt-s{opacity:.85}
.wk-evt.lay-onair .wk-evt-loc{opacity:.75}
.wk-evt.lay-invite{background:var(--panel)!important;color:var(--strong)!important;border:1.5px dashed var(--faintest);box-shadow:var(--sh-evt);border-radius:10px}
