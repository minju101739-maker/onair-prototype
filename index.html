.wk-evt.lay-block{left:2px;right:2px;border-radius:6px;border:none;background:repeating-linear-gradient(-45deg,rgba(139,149,161,.15) 0 5px,rgba(139,149,161,.055) 5px 10px)!important;box-shadow:none!important;color:var(--faint)!important;padding:7px 11px}
.wk-evt.lay-block:hover{transform:none;box-shadow:none!important}
.wk-evt.lay-block .wk-evt-t{font-size:12px;font-weight:700}
.wk-evt.lay-soft{background:#E7ECF2!important;border:1px solid #D5DCE5;color:var(--strong)!important;box-shadow:none!important}
.wk-evt.lay-soft:hover{transform:none}
.wk-evt.lay-soft .wk-evt-t{color:var(--ink)}
.wk-evt.lay-soft .wk-evt-s{opacity:.75}
/* 카드 높이가 모자라면 제목이 flex-shrink로 짜부라져 잘린다 — 줄들은 고정 높이, 넘치면 아래(안건)부터 숨김 */
.wk-evt-t,.wk-evt-s,.wk-evt-meta,.wk-evt-ag{flex:none}
.wk-evt-ags{margin-top:3px;padding-top:4px;border-top:1px solid rgba(255,255,255,.28);display:flex;flex-direction:column;gap:1px;min-height:0;overflow:hidden}
.wk-evt-ag{font-size:10.5px;font-weight:600;line-height:1.5;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-evt-t{font-size:13px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.wk-inv-badge{display:inline-flex;align-items:center;margin-right:5px;padding:1px 4px;border-radius:4px;background:var(--line2);color:var(--muted);font-size:8px;font-weight:900;letter-spacing:0;vertical-align:1px}
.wk-evt-s{font-size:11.5px;font-weight:600;opacity:.78;line-height:1.35;font-feature-settings:"tnum"}
.wk-evt-meta{display:flex;align-items:center;gap:5px;margin-top:2px;min-width:0}
.wk-evt-loc{font-size:11px;font-weight:500;opacity:.62;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
/* ── right panel: calm, flat-white (matches left sidebar) ── */
.rp-lbl2{display:flex;align-items:center;font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);letter-spacing:.07em;text-transform:uppercase;padding:8px 4px 4px;margin-top:4px}
.rp-lbl2 .rp-sec-n{margin-left:auto}
.task-card{background:var(--blue-s);border:1px solid var(--blue-l);border-radius:var(--r);padding:16px 16px 18px}
/* 사이드바 행과 같은 문법: 13px/600 텍스트 · 17px 아이콘 · 9px 세로 리듬 (푸터만 커 보이지 않게) */
.act-row{display:flex;align-items:center;gap:10px;width:100%;padding:9px 6px;border-radius:var(--rx);background:none;color:var(--ink);font-size:var(--fs-sm);font-weight:600;cursor:pointer;text-align:left}
.act-row:hover{background:var(--line2)}
.act-row svg{width:17px;height:17px;stroke:var(--muted);stroke-width:1.8;fill:none;flex:none}
.act-row>span:not(.side-chip){flex:1}
/* right panel — fully flat to match left sidebar */
.rp-profile{display:flex;align-items:center;gap:11px;padding:2px 4px 8px}
.task-flat{padding:2px 4px 10px}
.rp-lbl2{margin-top:12px}
.act-row.primary{color:var(--blue-d);font-weight:700}
.act-row.primary svg{stroke:var(--blue)}
.act-row.primary:hover{background:var(--blue-s)}
/* ── compact to-do rows (secondary tasks) ── */
.todo{display:flex;align-items:center;gap:11px;width:100%;padding:9px 6px;border-radius:var(--rx);background:none;cursor:pointer;text-align:left}
.todo:hover{background:var(--line2)}
.todo-ic{width:32px;height:32px;border-radius:10px;flex:none;display:grid;place-items:center}
.todo-ic svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none}
.todo-i{flex:1;min-width:0}
.todo-t{font-size:var(--fs-sm);font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.todo-s{font-size:var(--fs-xs);color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tstage{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.02em;color:var(--blue-d);background:var(--blue-s);border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:1px}
.todo-go{flex:none;color:var(--faintest);font-size:17px;line-height:1;padding-right:2px}
.rp-note{display:flex;gap:8px;align-items:flex-start;padding:16px 4px 4px;margin-top:8px;font-size:var(--fs-sm);color:var(--faint);line-height:1.5}
.rp-note svg{width:14px;height:14px;flex:none;margin-top:2px;stroke:var(--blue-d);stroke-width:2;fill:none}
.rp-note strong{color:var(--blue-d);font-weight:700}
/* ── event detail (right panel) ── */
.wk-evt,.mcal-evt{cursor:pointer}


.ev-back{display:flex;align-items:center;gap:5px;font-size:var(--fs-sm);font-weight:700;color:var(--muted);cursor:pointer;padding:4px;margin-bottom:6px}
.ev-back:hover{color:var(--ink)}
.ev-back svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none}
.ev-tag{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:var(--fs-xs);font-weight:800;padding:5px 12px;border-radius:var(--rp);margin:2px 4px 0}
.ev-dot{width:7px;height:7px;border-radius:50%;flex:none}
.ev-title{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.2;padding:10px 4px 4px}
.ev-rows{display:flex;flex-direction:column;margin-top:10px}
.ev-row{display:flex;gap:12px;padding:14px 6px;border-top:1px solid var(--line2)}
.ev-row:first-child{border-top:none}
.ev-row>svg{width:19px;height:19px;stroke:var(--faint);stroke-width:1.8;fill:none;flex:none;margin-top:1px}
.ev-rk{font-size:var(--fs-xs);font-weight:700;color:var(--faint);margin-bottom:4px}
.ev-rv{font-size:var(--fs-md);font-weight:600;color:var(--ink)}
.ev-atts{display:flex;flex-wrap:wrap;gap:6px}
.ev-att{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;border-radius:var(--rp);background:var(--panel2);border:1px solid var(--line);font-size:var(--fs-sm);font-weight:600;color:var(--strong)}
.ev-att .att-tag{font-style:normal;font-size:var(--fs-2xs);font-weight:700;color:var(--faint)}
.ev-none{font-size:var(--fs-sm);color:var(--faint)}

/* ── 캘린더 카드 — 배경(--bg) 위에 뜨는 흰 면으로 영역을 분리 (여백 + 낮은 그림자, 원칙 D2·D4) ── */
.cal-wrap{flex:1;min-height:0;padding:16px 20px 20px;display:flex;flex-direction:column;gap:14px}
.cal-card{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;background:var(--panel);border-radius:16px;box-shadow:0 1px 2px rgba(0,27,55,.04),0 6px 20px rgba(0,27,55,.05);overflow:hidden}

/* ── 홈 통계 카드 — 잡힌 회의·응답·조율·정리가 몇 건인지 첫눈에. 카드 = 해당 목록으로 가는 실제 진입점 ── */
.stat-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;flex:none}
.stat-card{display:flex;align-items:center;gap:12px;text-align:left;background:var(--panel);border-radius:16px;padding:13px 16px;box-shadow:0 1px 2px rgba(0,27,55,.04),0 6px 20px rgba(0,27,55,.05);cursor:pointer;transition:box-shadow .15s,transform .15s;min-width:0}
.stat-card:hover{box-shadow:var(--sh-card-gray);transform:translateY(-1px)}
.stat-ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.stat-ic svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.stat-ic.b{background:var(--blue-s);color:var(--blue-d)}
.stat-ic.a{background:var(--attention-s);color:var(--attention-d)}
.stat-ic.m{background:var(--mint-s);color:var(--mint-d)}
.stat-ic.w{background:var(--cat-amber-bg);color:var(--cat-amber-fg)}
.stat-tx{display:flex;flex-direction:column;min-width:0;gap:1px}
.stat-lb{font-size:var(--fs-xs);font-weight:700;color:var(--faint);line-height:1.2;white-space:nowrap}
.stat-v{font-size:24px;font-weight:800;color:var(--ink);line-height:1.15;letter-spacing:-.01em;font-feature-settings:"tnum"}
.stat-v small{font-size:var(--fs-sm);font-weight:700;color:var(--muted);margin-left:1px}
.stat-sub{font-size:var(--fs-2xs);font-weight:600;color:var(--faintest);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-go{width:15px;height:15px;stroke:var(--faintest);stroke-width:2;fill:none;margin-left:auto;flex:none}
.stat-card:hover .stat-go{stroke:var(--muted)}
@media(max-width:900px){.stat-strip{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:700px){
  .cal-wrap{gap:0}
  .stat-strip{padding:10px 10px 12px;gap:8px;flex:none}
  .stat-card{padding:11px 12px;border-radius:14px;gap:10px}
  .stat-ic{width:34px;height:34px;border-radius:10px}
  .stat-v{font-size:20px}
  /* 모바일 월 뷰: 셀이 좁아 제목 칩 대신 분류색 점으로 축약 — 점을 누르면 동일하게 일정 모달 */
  .cal-legend .cl-it{white-space:nowrap;flex:none}
  .mcal-evts{flex-direction:row;flex-wrap:wrap;gap:2px}
  .mcal-evt{font-size:0;line-height:0;padding:3px;background:none!important;box-shadow:none;border-radius:50%}
  .mcal-evt .mcal-dot{width:7px;height:7px}
  .mcal-more{font-size:10px;line-height:1.2}
  .mcal-dow{padding:6px 0;text-align:center}
  .mcal-cell{padding:5px 4px;gap:2px}
  .mcal-dn{font-size:var(--fs-xs)}
}

/* 통계 카드 목록 모달 — 행을 누르면 일정·초대·동의 현황·종결 카드의 실제 화면이 열린다 */
.ml-list{display:flex;flex-direction:column}
.stat-list-modal{max-width:500px}
.stat-list-modal>.mc>.mc-b{padding:8px 18px 16px}
.ml-row{display:flex;align-items:center;gap:14px;min-height:68px;text-align:left;width:100%;padding:12px 8px;border-bottom:1px solid var(--line2);cursor:pointer}
.ml-row:hover{background:var(--free-s)}
.ml-when{flex:none;width:50px;min-height:50px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;padding:5px 0;border-radius:7px;background:var(--panel2)}
.ml-when b{font-size:12.5px;font-weight:800;color:var(--strong);line-height:1.25}
.ml-when span{font-size:10.5px;font-weight:600;color:var(--faint);line-height:1.25}
.ml-when.today{background:var(--blue-s)}
.ml-when.today b{color:var(--blue-d)}
.ml-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--title-sub-gap)}
.ml-tx b{font-size:13px;font-weight:750;color:var(--ink);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml-tx span{font-size:11px;color:var(--faint);font-weight:600;line-height:var(--row-line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml-tag{flex:none;font-size:var(--fs-2xs);font-weight:800;border-radius:var(--rp);padding:2px 8px}
.ml-tag.air{background:var(--attention-s);color:var(--attention-d)}
.ml-tag.blue{background:var(--blue-s);color:var(--blue-d)}
.ml-tag.onair{background:var(--blue-s);color:var(--blue-d);border:1px solid var(--blue-l);padding:2px 9px}
.ml-go{width:14px;height:14px;stroke:var(--faintest);stroke-width:2;fill:none;flex:none;margin-left:2px}
.ml-empty{padding:22px 8px;text-align:center;font-size:var(--fs-sm);color:var(--faint);line-height:1.6}

/* ── 구성원 뷰(그룹웨어 조회 레퍼런스) — 검색조건 바 + 조직도 트리 + 페이지 테이블.
   선택은 체크+틴트 2신호(Interaction Grammar B), 페이지·범위를 넘어 유지된다 ── */
.pp-wrap{gap:12px}
.pp-filter{flex:none;display:flex;flex-direction:row;align-items:center;gap:10px;padding:12px 16px;flex-wrap:wrap}
.ppf-lb{font-size:var(--fs-sm);font-weight:800;color:var(--strong);flex:none}
.ppf-sel{width:auto;min-width:104px;padding:9px 12px;font-size:var(--fs-sm)}
.ppf-q{flex:1;min-width:150px;max-width:340px;padding:9px 12px;font-size:var(--fs-sm)}
.ppf-go{display:inline-flex;align-items:center;gap:6px;padding:9px 18px}
.ppf-go svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.ppf-scope{display:none}
.ppf-scope-lb{display:none}
.pp-grid{flex:1;min-height:0;display:grid;grid-template-columns:212px minmax(0,1fr);gap:12px}
.pp-tree{display:flex;flex-direction:column;min-height:0}
.ppt-h{padding:13px 16px 8px;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;flex:none}
.ppt-body{flex:1;min-height:0;overflow-y:auto;padding:0 8px 8px;display:flex;flex-direction:column;gap:1px}
.ppt-node{display:flex;align-items:center;gap:6px;text-align:left;width:100%;padding:7px 10px;border-radius:var(--rx);font-size:var(--fs-sm);font-weight:600;color:var(--muted);cursor:pointer}
.ppt-node:hover{background:var(--line2);color:var(--ink)}
.ppt-node.on{background:var(--blue-s);color:var(--blue-d);font-weight:800}
.ppt-node .ppt-nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppt-node .ppt-n{flex:none;font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);font-feature-settings:"tnum"}
.ppt-node.on .ppt-n{color:var(--blue-d)}
.ppt-node.root{font-weight:800;color:var(--strong)}
.ppt-node.d{font-weight:700;margin-top:6px}
.ppt-node.t{padding-left:26px}
.ppt-sub{flex:none;display:flex;align-items:center;gap:8px;padding:11px 16px;border-top:1px solid var(--line2);font-size:var(--fs-xs);font-weight:700;color:var(--muted);cursor:pointer;text-align:left;width:100%}
.ppt-sub:hover{background:var(--panel2)}
.pp-table{display:flex;flex-direction:column;min-height:0;min-width:0}
.pl-bar{display:flex;align-items:center;gap:12px;padding:9px 18px;border-top:1px solid var(--line2);border-bottom:1px solid var(--line);background:var(--panel2);flex:none;min-height:54px}
.pl-bar.has{background:var(--blue-s);border-bottom-color:var(--blue-l)}
.pl-bar-n{font-size:var(--fs-sm);font-weight:600;color:var(--muted)}
.pl-bar-n b{font-weight:800;color:var(--ink)}
.pl-bar.has .pl-bar-n,.pl-bar.has .pl-bar-n b{color:var(--blue-d)}
.pl-avs{display:flex;padding-left:6px}
.pl-avs .av{margin-left:-7px;border:2px solid var(--panel)}
.pl-reason{font-size:var(--fs-xs);color:var(--faintest);font-weight:600}
.pl-head,.pl-row{display:grid;grid-template-columns:28px 24px minmax(150px,1.25fr) 80px minmax(130px,1fr) minmax(140px,1fr) 104px 66px;gap:10px;align-items:center;padding:9px 18px}
.pl-head{border-bottom:1px solid var(--line);font-size:var(--fs-2xs);font-weight:700;color:var(--faint);letter-spacing:.03em;flex:none;background:var(--panel)}
.pl-list{flex:1;min-height:0;overflow-y:auto}
.pl-row{padding:10px 18px;border-bottom:1px solid var(--line2);cursor:pointer;transition:background .12s}
.pl-row:hover{background:var(--free-s)}
.pl-row.sel{background:var(--blue-s)}
.pl-row.off{opacity:.55;cursor:not-allowed}
.pl-ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--faintest);display:grid;place-items:center;background:var(--panel);flex:none;transition:background .12s,border-color .12s}
.pl-ck svg{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
.pl-row.off .pl-ck{border-style:dashed;background:var(--line2)}
.pl-row.sel .pl-ck,.pl-all.on{background:var(--blue);border-color:var(--blue)}
.pl-row.sel .pl-ck svg,.pl-all.on svg{opacity:1}
.pl-name{display:flex;align-items:center;gap:10px;min-width:0}
.pl-nm{display:flex;flex-direction:column;min-width:0}
.pl-nm b{font-size:var(--fs-sm);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-eng{font-style:normal;font-size:var(--fs-2xs);font-weight:600;color:var(--faintest);margin-left:5px}
.pl-nm>span{font-size:var(--fs-2xs);color:var(--faint);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-rank{display:flex;flex-wrap:wrap;gap:3px;align-items:center;min-width:0}
.pl-rank .rk-pill{margin-left:0}
.pl-team,.pl-mail{font-size:var(--fs-xs);color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-mail{color:var(--faint);font-feature-settings:"tnum"}
.pl-hours{font-size:var(--fs-xs);color:var(--muted);font-weight:650;white-space:nowrap;font-feature-settings:"tnum"}
.pl-fav{width:24px;height:24px;display:grid;place-items:center;border-radius:5px;color:var(--faintest);font-size:17px;line-height:1}
.pl-fav:hover{background:var(--warn-s);color:var(--warn)}
.pl-fav.on{color:#D79A24}
.ppf-fav{height:36px;display:inline-flex;align-items:center;gap:6px;padding:0 11px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:var(--fs-xs);font-weight:750;color:var(--muted);white-space:nowrap}
.ppf-fav span{color:#D79A24}
.ppf-fav.on{background:var(--warn-s);border-color:#F0D9A8;color:var(--warn)}
.pl-st{font-size:var(--fs-2xs);font-weight:800;color:var(--mint-d);background:var(--mint-s);border-radius:var(--rp);padding:2px 8px;justify-self:start}
.pl-st.off{color:var(--faint);background:var(--line2)}
.pl-sub-m{display:none}
.pl-row .cr-add{justify-self:end;white-space:nowrap}
.pl-row .cr-add.off{color:var(--faintest);font-weight:700}
/* 페이저는 보조 내비게이션 — 컬럼 데이터(10.5px/550)보다 한 단계 낮은 위계를 유지한다 */
.pp-pager{flex:none;display:flex;align-items:center;gap:12px;padding:6px 18px;border-top:1px solid var(--line)}
.ppg-info{font-size:10px;font-weight:500;color:var(--faint)}
.ppg-btns{display:flex;gap:2px;margin-left:auto;align-items:center}
.ppg-n,.ppg-a{min-width:22px;height:22px;padding:0 5px;border-radius:5px;display:grid;place-items:center;font-size:10.5px;font-weight:600;color:var(--faint);cursor:pointer}
.ppg-n:hover,.ppg-a:hover{background:var(--line2);color:var(--ink)}
.ppg-n.on{background:var(--blue-s);color:var(--blue-p);font-weight:750}
.ppg-a:disabled{opacity:.35;cursor:default}
.ppg-a:disabled:hover{background:none;color:var(--muted)}
@media(max-width:1280px){
  .pl-head,.pl-row{grid-template-columns:28px 24px minmax(140px,1.25fr) 78px minmax(120px,1fr) minmax(120px,1fr) 96px 62px}
}
@media(max-width:1100px){
  .pl-head,.pl-row{grid-template-columns:28px 24px minmax(150px,1.3fr) 80px minmax(120px,1fr) 96px 62px}
  .pl-mail{display:none}
}
@media(max-width:919px){
  .pp-grid{grid-template-columns:minmax(0,1fr)}
  .pp-tree{display:none}
  .ppf-scope{display:block}
  .ppf-scope-lb{display:block}
}
@media(max-width:700px){
  .pp-wrap{gap:8px;padding:10px}
  .pp-filter{padding:10px 12px;gap:8px}
  .ppf-lb{display:none}
  .ppf-q{min-width:120px}
  .pl-head{display:none}
  .pl-row{grid-template-columns:28px 24px minmax(0,1fr) 66px;padding:11px 14px}
  .pl-team,.pl-mail,.pl-rank,.pl-hours{display:none}
  .pl-sub-m{display:block;font-size:var(--fs-2xs);color:var(--faintest);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-bar{padding:9px 14px;gap:8px}
  .pp-pager{padding:9px 12px}
  .ppg-info{display:none}
  .ppg-btns{margin-left:0;flex:1;overflow-x:auto;justify-content:center}
}

/* ── 생성 모달 v2(레퍼런스 16 메인) — 블루 솔리드 헤더 · 섹션 폼 · 언더라인 인풋 · pill CTA · 도트 진행(15) · 칩 인풋(14) ── */
.modal-wrap.create.v2{max-width:620px;width:min(620px,94vw);height:auto;max-height:min(800px,calc(100vh - 40px));display:flex;flex-direction:column;border-radius:24px;overflow:hidden;background:#fff}
.cm-head{flex:none;display:flex;align-items:center;background:var(--blue);padding:17px 18px 17px 28px}
.cm-head h2{flex:1;font-size:17px;font-weight:850;color:#fff;letter-spacing:0}
.cm-x{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:rgba(255,255,255,.86);font-size:19px;line-height:1;flex:none}
.cm-x:hover{background:rgba(255,255,255,.16);color:#fff}
.modal-wrap.create.v2 .create-flow{flex:1;min-height:0;overflow-y:auto;display:block;padding:4px 30px 18px}
.flow-context{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:18px 0 4px;padding:10px 12px;border:1px solid var(--line2);border-radius:16px;background:var(--panel2)}
.flow-context:empty{display:none}
.fc-item{display:inline-flex;align-items:center;gap:5px;max-width:100%;min-width:0;font-size:var(--fs-xs);font-weight:750;color:var(--strong)}
.fc-k{font-size:10px;font-weight:850;color:var(--faintest);letter-spacing:.04em;text-transform:uppercase}
.fc-v{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-dot{width:4px;height:4px;border-radius:50%;background:var(--faintest);flex:none}
.fc-more{font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d)}
.modal-wrap.create.v2 .mc{display:block}
.modal-wrap.create.v2 .mc-h{padding:20px 0 0}
.modal-wrap.create.v2 .mc-h h3{font-size:18px;font-weight:850;letter-spacing:0}
.modal-wrap.create.v2 .mc-b{padding:14px 0 8px}
.modal-wrap.create.v2 .create-foot{flex:none;display:flex;align-items:center;gap:12px;padding:14px 22px 18px;border-top:1px solid var(--line2);background:#fff;box-shadow:0 -10px 28px rgba(0,27,55,.035);grid-column:auto;grid-row:auto}
.foot-back{font-size:var(--fs-sm);font-weight:700;color:var(--muted);padding:9px 12px;border-radius:var(--rp);flex:none}
.foot-back:hover{background:var(--line2);color:var(--ink)}
.foot-dots{display:flex;gap:5px;align-items:center;margin:0 auto;flex:none}
.foot-dots i{width:6px;height:6px;border-radius:var(--rp);background:var(--line);transition:all .18s}
.foot-dots i.done{background:var(--blue-l)}
.foot-dots i.on{width:18px;background:var(--blue)}
.modal-wrap.create.v2 .foot-why{font-size:var(--fs-xs);font-weight:600;color:var(--faintest);text-align:right;max-width:190px;line-height:1.35;flex:none}
.btn-pill{border-radius:var(--rp);padding:11px 22px}
.sec-t{font-size:var(--fs-sm);font-weight:850;color:var(--ink);margin:18px 0 10px}
.sec-t small{font-weight:700;color:var(--faint);margin-left:5px}
.f{margin-bottom:14px}
.f>label{display:block;font-size:var(--fs-2xs);font-weight:800;color:var(--faint);margin-bottom:7px}
.f-line{display:block;width:100%;border:1px solid var(--line);border-radius:13px;padding:11px 13px;font:inherit;font-size:var(--fs-sm);color:var(--ink);outline:none;background:#fff}
.f-line::placeholder{color:var(--faintest)}
.f-line:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
textarea.f-line{resize:vertical;min-height:86px;line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
.opt-card{border:1px solid var(--line);border-radius:15px;padding:13px 14px;text-align:left;display:flex;flex-direction:column;gap:3px;cursor:pointer;background:#fff;transition:border-color .12s,background .12s,box-shadow .12s}
.opt-card:hover{border-color:var(--faintest)}
.opt-card.on{border-color:var(--blue);background:var(--blue-s);box-shadow:0 4px 14px rgba(49,130,246,.08)}
.opt-card b{font-size:var(--fs-sm);font-weight:800;color:var(--ink)}
.opt-card.on b{color:var(--blue-d)}
.opt-card span{font-size:var(--fs-2xs);font-weight:600;color:var(--faint);line-height:1.45}
.inv-box{border:1px solid var(--line);border-radius:15px;background:#fff;position:relative}
.inv-box:focus-within{border-color:var(--blue)}
.inv-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:9px 10px}
.inv-row input{flex:1;min-width:110px;border:none;outline:none;background:none;font:inherit;font-size:var(--fs-sm);padding:5px 4px;color:var(--ink)}
.inv-row input::placeholder{color:var(--faintest)}
.inv-chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--rp);padding:3px 7px 3px 4px;font-size:var(--fs-xs);font-weight:700;color:var(--strong)}
.ro-sel{border:1px solid var(--line);border-radius:9px;background:var(--panel);font:inherit;font-size:var(--fs-xs);font-weight:700;color:var(--muted);padding:5px 7px;cursor:pointer;flex:none}
.ro-sel:focus{outline:none;border-color:var(--blue)}
.ro-approve{border:1px solid var(--line);border-radius:999px;background:#fff;font:inherit;font-size:var(--fs-2xs);font-weight:850;color:var(--faint);padding:5px 9px;cursor:pointer;flex:none}
.ro-approve:hover{border-color:var(--blue-l);color:var(--blue-d);background:var(--blue-s)}
.ro-approve.on{border-color:var(--blue);background:var(--blue);color:#fff}
.ro-approve:disabled{opacity:.38;cursor:not-allowed;background:var(--panel2);color:var(--faintest)}
.approval-note{margin-top:10px;border:1px solid var(--blue-l);border-radius:14px;background:var(--blue-s);padding:10px 12px;font-size:var(--fs-xs);font-weight:700;color:var(--blue-d);line-height:1.45}
.approval-note b{color:var(--ink)}
.inv-drop{position:absolute;left:8px;right:8px;top:calc(100% + 6px);background:var(--panel);border-radius:14px;box-shadow:var(--sh-lg);border:1px solid var(--line2);z-index:6;max-height:228px;overflow-y:auto}
.inv-drop[hidden]{display:none}

/* ── 셀렉트 팝업 — 모든 <select>의 네이티브 OS 다크 메뉴를 밝은 카드 메뉴로 대체. 선택 신호는 체크+틴트 2개 ── */
.sel-pop{position:fixed;z-index:70;min-width:136px;max-height:264px;overflow-y:auto;background:var(--panel);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--sh-lg);padding:6px}
.sel-pop button{display:flex;align-items:center;gap:7px;width:100%;text-align:left;padding:8px 12px 8px 9px;border-radius:9px;font-size:var(--fs-sm);font-weight:600;color:var(--muted);line-height:1.4;white-space:nowrap}
.sel-pop button:hover{background:var(--panel2);color:var(--strong)}
.sel-pop button.on,.sel-pop button.on:hover{background:var(--blue-s);color:var(--blue-p);font-weight:750}
.sel-pop button[disabled]{color:var(--faintest);cursor:default;background:none}
.sel-pop .sp-ck{width:14px;height:14px;flex:none;display:grid;place-items:center}
.inv-opt{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;text-align:left;cursor:pointer}
.inv-opt:hover{background:var(--panel2)}
.inv-opt .io-t{flex:1;min-width:0}
.inv-opt .io-t b{display:block;font-size:var(--fs-sm);font-weight:700;color:var(--ink)}
.inv-opt .io-t>span{display:block;font-size:var(--fs-2xs);font-weight:600;color:var(--faint)}
.mem-list{border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:var(--panel)}
.mem-list .ro-row{border:none;border-bottom:1px solid var(--line2);border-radius:0;padding:9px 12px}
.mem-list .ro-row:last-child{border-bottom:none}
.mem-list .ro-row.me{background:var(--blue-s)}
@media(max-width:700px){
  .modal-wrap.create.v2{width:100%;max-width:none;height:100%;max-height:100vh;border-radius:0}
  .modal-wrap.create.v2 .create-flow{padding:2px 16px 12px}
  .f2{grid-template-columns:1fr;gap:0}
}

/* ── FAB — 이전 버전처럼 2개 액션(회의 생성 / 내 일정 추가)을 여는 스피드다이얼 ── */
.fab{position:fixed;right:48px;bottom:48px;width:56px;height:56px;border-radius:50%;background:var(--blue);display:grid;place-items:center;box-shadow:0 8px 20px rgba(49,130,246,.36),0 2px 6px rgba(0,27,55,.12);z-index:31}
.fab:hover{background:var(--blue-d)}
.fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2.2;fill:none}
.fab.open svg{transform:rotate(45deg)}
.fab-menu{position:fixed;right:48px;bottom:116px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;z-index:31}
.fab-menu[hidden]{display:none}
.fab-scrim{position:fixed;inset:0;background:rgba(10,20,40,.22);z-index:30}
.fab-item{display:flex;align-items:center;gap:11px;background:var(--panel);border-radius:16px;box-shadow:0 4px 16px rgba(0,27,55,.16),0 1px 3px rgba(0,27,55,.08);padding:11px 16px 11px 11px;color:var(--ink);cursor:pointer;text-align:left;min-width:250px}
.fab-item .fi-ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none}
.fab-item .fi-ic svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.fab-item .fi-tx{display:flex;flex-direction:column;gap:1px;min-width:0}
.fab-item .fi-tx b{font-size:var(--fs-sm);font-weight:800}
.fab-item .fi-tx span{font-size:var(--fs-2xs);color:var(--faint);font-weight:500}
.fab-item:hover{background:var(--panel2)}

/* ── 캘린더 연동 상태 (사이드바) ── */
.cx-row{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:var(--rx);width:100%;text-align:left;cursor:pointer}
.cx-row:hover{background:var(--line2)}
.cx-ic{width:28px;height:28px;border-radius:9px;background:var(--line2);display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--muted);flex:none}
.cx-i{flex:1;min-width:0;display:flex;flex-direction:column}
.cx-nm{font-size:var(--fs-sm);font-weight:600;color:var(--ink);line-height:1.3}
.cx-sub{font-size:var(--fs-2xs);color:var(--faint)}
.cx-st{font-size:var(--fs-2xs);font-weight:700;flex:none}
.cx-st.on{color:var(--mint-d)}
.cx-st.off{color:var(--blue-d)}
.cx-note{font-size:var(--fs-2xs);color:var(--faintest);line-height:1.5;padding:6px 6px 0}
.cx-note b{color:var(--faint);font-weight:700}
/* ── 분류 그룹 라벨 (회의 / 내 시간) ── */
.filt-grp{font-size:10px;font-weight:700;color:var(--faintest);letter-spacing:.05em;padding:8px 6px 3px}
.filt-list .filt-grp:first-child{padding-top:0}
/* ── 조율 현황 — 동의 게이지 (모니터링, 액션 아님) ── */
.co-row{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:var(--rx);width:100%;text-align:left;cursor:pointer}
.co-row:hover{background:var(--line2)}
.co-i{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.co-t{font-size:var(--fs-sm);font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-role{font-size:var(--fs-2xs);font-weight:700;color:var(--faint);background:var(--line2);border-radius:var(--rp);padding:1px 7px;margin-left:6px;vertical-align:1px}
.co-s{font-size:var(--fs-xs);color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-g{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:none}
.co-n{font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d)}
.co-bar{width:52px;height:4px;border-radius:var(--rp);background:var(--line2);overflow:hidden}
.co-bar i{display:block;height:100%;background:var(--blue);border-radius:var(--rp)}
/* 지난 회의 기록 — 진행 중(조율 현황)의 반대편, 끝난 회의 아카이브로 가는 가벼운 링크 */
.co-more{display:flex;align-items:center;gap:4px;width:100%;padding:8px 6px 2px;font-size:var(--fs-xs);font-weight:600;color:var(--faint);cursor:pointer}
.co-more:hover{color:var(--blue-d)}
.co-more span{margin-left:auto;color:var(--faintest)}

/* ── 회의 기록 독립 화면 ── */
.records-wrap{flex:1;min-height:0;padding:18px 20px 20px;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.records-card{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--panel);border-radius:16px;box-shadow:0 1px 2px rgba(0,27,55,.04),0 6px 20px rgba(0,27,55,.05);overflow:hidden}
.records-toolbar{flex:none;display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line2)}
.records-toolbar b{font-size:var(--fs-md);font-weight:850;color:var(--ink)}
.records-toolbar span{font-size:var(--fs-xs);font-weight:650;color:var(--faint)}
.records-list{flex:1;min-height:0;overflow-y:auto;padding:4px 18px 14px;overscroll-behavior:contain}
.record-row{width:100%;display:grid;grid-template-columns:190px minmax(180px,1fr) minmax(260px,1.6fr) 140px 20px;align-items:center;gap:18px;text-align:left;padding:17px 4px;border-bottom:1px solid var(--line2);cursor:pointer}
.record-row:hover{background:var(--free-s)}
.record-when b{display:block;font-size:var(--fs-sm);font-weight:850;color:var(--strong);white-space:nowrap;font-feature-settings:"tnum"}
.record-when span{display:block;font-size:var(--fs-xs);font-weight:650;color:var(--faint);margin-top:2px}
.record-main{min-width:0}
.record-main b{display:block;font-size:var(--fs-md);font-weight:850;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-main span{display:block;font-size:var(--fs-xs);font-weight:650;color:var(--faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-result{min-width:0;display:flex;flex-direction:column;gap:3px}
.record-result b{font-size:var(--fs-xs);font-weight:800;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-result span{font-size:var(--fs-xs);font-weight:600;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-people{display:flex;align-items:center;justify-content:flex-end;min-width:0}
.record-people .av{margin-left:-5px;border:2px solid var(--panel)}
.record-people .av:first-child{margin-left:0}
.record-count{margin-left:7px;font-size:var(--fs-xs);font-weight:700;color:var(--faint);white-space:nowrap}
.record-people{display:flex;align-items:center;justify-content:flex-end}
.record-people .av{margin-left:-5px;border:2px solid var(--panel)}
.record-go{font-size:20px;color:var(--faintest)}
@media(max-width:839px){
  .record-row{grid-template-columns:150px minmax(0,1fr) 20px}
  .record-result,.record-people{display:none}
}
@media(max-width:700px){
  .records-wrap{padding:12px 10px 14px;gap:10px}
  .records-list{padding:2px 12px 12px}
  .record-row{gap:10px;padding:14px 2px}
  .topbar{overflow:hidden}
  .tb-nav{min-width:0;overflow-x:auto;scrollbar-width:none}
  .tb-nav::-webkit-scrollbar{display:none}
  .tb-tab{padding:6px 10px;white-space:nowrap}
}
/* 알림 벨 배지 */
.tb-icon{position:relative}
/* ── 알림 드롭다운 — 벨 아래 표준 패널. 새 알림 = 파란 점 + 소프트 틴트, 읽으면(열면) 뱃지 소멸 ── */
.notif-scrim{position:fixed;inset:0;z-index:64}
.notif-pop{position:fixed;top:62px;right:20px;width:380px;max-width:calc(100vw - 24px);max-height:70vh;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 32px rgba(15,23,42,.14),0 2px 8px rgba(15,23,42,.06);z-index:65;overflow:hidden}
.notif-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line2);font-size:12.5px;color:var(--ink)}
.notif-head b{font-weight:750}
.notif-newcount{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--blue-d)}
.notif-list{overflow-y:auto;min-height:0}
.notif-row{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line2);align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.notif-row.new{background:#F5F9FF}
.notif-dot{flex:none;width:7px;height:7px;border-radius:50%;margin-top:6px;background:var(--faintest)}
.notif-dot.confirm{background:var(--blue)}
.notif-dot.wrap{background:var(--mint)}
.notif-dot.progress{background:var(--faint)}
.notif-body{min-width:0;font-size:12px;color:var(--strong);line-height:1.5}
.notif-time{display:block;margin-top:2px;font-size:10.5px;color:var(--faintest);font-weight:600}
.notif-empty{padding:24px 16px;text-align:center;font-size:11.5px;color:var(--faint)}
/* ── 온보딩 투어(코치마크) — 스포트라이트 구멍 + 말풍선. z-index 80 = 최상위 ── */
.tour-blk{position:fixed;z-index:80;background:rgba(15,23,42,.55)}
.tour-cover{position:fixed;z-index:81;background:transparent}
.tour-hole{position:fixed;z-index:81;border-radius:12px;pointer-events:none;border:2px solid rgba(255,255,255,.95);box-shadow:0 0 0 4px rgba(47,111,237,.35);transition:all .25s ease}
.tour-hole.live{box-shadow:0 0 0 4px rgba(47,111,237,.55),0 0 18px rgba(47,111,237,.45)}
.hub-row{width:100%;display:flex;align-items:center;gap:12px;text-align:left;padding:13px 6px;border-bottom:1px solid var(--line2);cursor:pointer}
.hub-row:last-child{border-bottom:none}
.hub-row:hover{background:var(--panel2)}
.hub-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.hub-tx b{font-size:13px;font-weight:750;color:var(--ink)}
.hub-tx span{font-size:11px;font-weight:550;color:var(--faint)}
.hub-n{flex:none;font-size:10px;font-weight:700;color:var(--blue-d);background:var(--blue-s);border-radius:4px;padding:2px 7px}
.hub-sub{font-size:11.5px;font-weight:600;color:var(--blue-d);background:var(--blue-s);border-radius:7px;padding:9px 12px;margin-bottom:8px}
.tour-tip{position:fixed;z-index:82;width:340px;max-width:calc(100vw - 24px);background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 16px 40px rgba(15,23,42,.28);padding:16px 18px}
.tour-step{font-size:10.5px;font-weight:800;color:var(--blue-d);margin-bottom:6px}
.tour-title{font-size:15px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:6px}
.tour-body{font-size:12.5px;font-weight:500;color:var(--strong);line-height:1.65}
.tour-acts{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.tour-acts .link-btn{color:var(--faint)}
/* ── 도움말(?) 모달 — 질문/답 형식, 설명문이 허용되는 유일한 공간(§8) ── */
.hp-sec{padding:12px 0;border-top:1px solid var(--line2)}
.hp-sec:first-child{padding-top:2px;border-top:none}
.hp-q{font-size:var(--fs-sm);font-weight:700;color:var(--ink);margin-bottom:7px}
.hp-a{display:flex;gap:7px;font-size:var(--fs-sm);color:var(--muted);line-height:1.55;padding:2px 0}
.hp-a::before{content:"·";color:var(--faintest);font-weight:800}
.hp-a b{color:var(--strong);font-weight:700}
/* ── 설정 모달 ── */
.set-grp{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);letter-spacing:.06em;text-transform:uppercase;padding:14px 2px 6px}
.set-grp:first-child{padding-top:0}
.set-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-top:1px solid var(--line2)}
.set-i{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.set-t{font-size:var(--fs-sm);font-weight:600;color:var(--ink)}
.set-s{font-size:var(--fs-xs);color:var(--faint);line-height:1.4}
.tgl{width:36px;height:21px;border-radius:var(--rp);background:var(--line);position:relative;flex:none;cursor:pointer}
.tgl::after{content:"";position:absolute;top:2.5px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,27,55,.25)}
.tgl.on{background:var(--blue)}
.tgl.on::after{left:17px}
.modal-wrap.settings{max-width:720px}
.settings-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:center;margin-bottom:16px;padding:18px;border-radius:22px;background:linear-gradient(135deg,var(--blue-s),#fff 58%,var(--attention-s));border:1px solid rgba(49,130,246,.14)}
.settings-hero h3{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:0;line-height:1.2;margin-bottom:6px}
.settings-hero p{font-size:var(--fs-sm);font-weight:650;color:var(--muted);line-height:1.5}
.settings-meter{display:grid;grid-template-columns:repeat(3,72px);gap:8px}
.settings-meter div{border-radius:16px;background:rgba(255,255,255,.74);border:1px solid rgba(229,232,235,.85);padding:10px 8px;text-align:center}
.settings-meter b{display:block;font-size:20px;font-weight:900;color:var(--ink);line-height:1}
.settings-meter span{display:block;font-size:var(--fs-2xs);font-weight:800;color:var(--faint);margin-top:5px}
.settings-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
.setting-card{min-height:104px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--panel);text-align:left;cursor:pointer}
.setting-card:hover{border-color:var(--blue-l);background:#FBFDFF;box-shadow:0 6px 18px rgba(49,130,246,.08)}
.setting-ic{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:var(--blue-s);color:var(--blue-d)}
.setting-card:nth-child(2) .setting-ic{background:var(--mint-s);color:var(--mint-d)}
.setting-card:nth-child(3) .setting-ic{background:var(--attention-s);color:var(--attention-d)}
.setting-ic svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.1;fill:none}
.setting-card b{font-size:var(--fs-sm);font-weight:900;color:var(--ink)}
.setting-card span{font-size:var(--fs-xs);font-weight:650;color:var(--faint);line-height:1.35}
.settings-section{border:1px solid var(--line);border-radius:18px;background:var(--panel);padding:12px 16px;margin-top:12px}
.settings-section .set-grp{padding:0 0 4px}

/* ── RESPONSIVE ── */
@media(max-width:839px){
  .home{grid-template-columns:1fr}
  .home .hp+.hp{display:none}
  .tb-team{display:none}
  .cal-wrap{padding:10px 12px 14px}
}
/* 태블릿(701–839px)만 7열 유지 + 카드 안 가로 스크롤. ≤700px는 가로 스크롤 대신 데이 스트립 구조(JS)로 전환 */
@media(max-width:839px) and (min-width:701px){
  .cal-card{overflow-x:auto}
  .wk{min-width:820px}
}
/* ── 모바일 캘린더: 데이 스트립(주 개관·이동) + 하루 시간 그리드 ── */
.mday-strip{display:flex;gap:2px;padding:0 4px 6px;flex:none}
.mday{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 0 11px;border:none;background:none;border-radius:12px;cursor:pointer;font:inherit}
.mday-dn{font-size:var(--fs-2xs);font-weight:600;color:var(--faint)}
.mday-dd{font-size:15px;font-weight:700;color:var(--strong)}
.mday.we .mday-dn{color:var(--cat-rose-fg)}
.mday.today .mday-dd{color:var(--blue-d)}
.mday.dim{opacity:.42}
.mday.past{opacity:.38;cursor:not-allowed}
.mday.on{background:var(--blue-s)}
.mday.on .mday-dd,.mday.on .mday-dn{color:var(--blue-d)}
.mday.dim.on{opacity:.72;background:var(--line2)}
.mday-dot{position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--faintest)}
.mday.dim .mday-dot{opacity:.5}
.mday.on .mday-dot{background:var(--blue)}
/* ── 메뉴 배지(답할 회의가 있으면) ── */
/* ── 좌측 조율 큐 — 작고 밀도 있는 카드·행 ── */
/* ── 응답 패널 — 내가 답할 초대(동의/참석 카드)가 있을 때만 나타나는 좌측 패널. 다 답하면 사라진다 ── */
.respond-side{width:300px;flex:none;background:var(--panel);border-right:1px solid var(--line);padding:16px 14px 14px;overflow-y:auto;display:flex;flex-direction:column}
.respond-side[hidden]{display:none}
.rs-h{display:flex;align-items:center;gap:8px;font-size:var(--fs-md);font-weight:800;color:var(--ink);padding:0 4px}
.rs-sub{font-size:var(--fs-xs);color:var(--faint);font-weight:600;padding:2px 4px 12px}
.rs-done-lbl{font-size:var(--fs-2xs);font-weight:700;color:var(--faintest);letter-spacing:.05em;padding:12px 4px 6px}
@media(max-width:1023px){.respond-side{display:none}}   /* 좁은 화면은 홈 통계 카드 '응답할 초대'가 같은 진입점 */
.qcard{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:9px 11px 8px;margin:0 0 6px;cursor:pointer}
.qcard:hover{border-color:var(--blue-l)}
.qc-1{display:flex;align-items:center;gap:7px}
.qc-1 b{flex:1;min-width:0;font-size:var(--fs-sm);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-badge{flex:none;font-size:10.5px;font-weight:800;color:var(--blue-d)}
.qc-badge.vio{color:var(--cat-violet-fg)}
.qc-2{font-size:var(--fs-2xs);color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-3{font-size:var(--fs-2xs);color:var(--faintest);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-cta{display:flex;justify-content:flex-end;gap:5px;margin-top:7px}
.qbtn{border:1px solid var(--line);background:var(--panel);border-radius:var(--rp);padding:4px 13px;font:inherit;font-size:var(--fs-2xs);font-weight:800;color:var(--muted);cursor:pointer}
.qbtn:hover{background:var(--line2)}
.qbtn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
.qdone{display:block;width:100%;padding:7px 3px;border:none;background:none;font:inherit;text-align:left;cursor:pointer;border-radius:var(--rx)}
.qdone:hover{background:var(--line2)}
.qdone b{display:block;font-size:var(--fs-2xs);font-weight:700;color:var(--faint)}
.qdone span{display:block;font-size:var(--fs-2xs);color:var(--faintest);margin-top:1px}
.qrow{display:block;width:100%;padding:8px 3px;border:none;border-top:1px solid var(--line2);background:none;font:inherit;text-align:left;cursor:pointer}
.qrow:first-of-type{border-top:none}
.qrow:hover{background:var(--line2)}
.qr-1{display:flex;align-items:center;gap:8px}
.qr-1 b{flex:1;min-width:0;font-size:var(--fs-sm);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qr-cta{flex:none;font-size:var(--fs-2xs);font-weight:800;color:var(--muted);white-space:nowrap}
.qr-cta.pri{color:var(--blue-d)}
.qr-cta.dim{color:var(--faintest);font-weight:700}
.qr-g{flex:none;display:flex;align-items:center;gap:6px}
.qr-g b{font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d);font-variant-numeric:tabular-nums}
.qr-2{display:block;font-size:var(--fs-2xs);color:var(--faint);margin-top:2px;line-height:1.45}
.side-foot{margin-top:auto;padding:12px 4px 6px;display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--line2)}
.sf-link{border:none;background:none;font:inherit;font-size:var(--fs-2xs);font-weight:700;color:var(--faint);text-align:left;padding:6px;border-radius:var(--rx);cursor:pointer}
.sf-link:hover{background:var(--line2);color:var(--muted)}
.side-cnt.dim{color:var(--faintest);background:none}
.tb-icon.tb-menu.has-new::after{content:"";position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--blue);border:2px solid var(--panel)}
@media(max-width:919px){.tb-greet{display:none}}
@media(max-width:700px){
  .cal-wrap{display:flex;flex-direction:column}
  .tb-clock{display:none}
}
/* 모바일 캘린더 헤더·모달 내부 — 텍스트 절단·가로 오버플로 방지 */

  .cal-legend{padding:7px 14px;gap:10px;row-gap:3px;flex-wrap:nowrap;overflow-x:auto;overscroll-behavior-x:contain}

  .mc-b{padding:12px 14px 18px}
  .compose,.pane{min-width:0}
  .pane-hint,.ro-note{display:none}
  .set-sum{flex-wrap:wrap;row-gap:4px}
  .confirm-time{font-size:30px}
  /* 만들기 모달: 단일 컬럼 — 접이식 요약(상단) + 단계 콘텐츠 + 하단 고정 CTA */

  .create-aside{border-left:none;border-bottom:1px solid var(--line2);padding:8px 14px;overflow:visible;flex:none}
  .sum-head{cursor:pointer;padding:4px 0}
  .sum-caret{display:inline}
  .sum-body{display:none}
  .sum-body.open{display:block;padding-bottom:4px}
  .create-flow{flex:1;min-height:0}
  .create-foot{padding:10px 14px}
  .create-foot .btn{padding:13px 16px}
  .modal-wrap.create .modal-bar{padding:16px 18px 6px}
  .modal-wrap.create .stepper{padding:8px 14px 12px;gap:5px}
  .modal-wrap.create .stp{height:38px;padding:0 6px;gap:5px}
  .modal-wrap.create .mc-h{padding:20px 18px 2px}
  .modal-wrap.create .mc-h h3{font-size:21px}
  .modal-wrap.create .mc-b{padding:14px 18px 24px}
  .time-scope{padding:14px;border-radius:18px}
  .scope-head{display:block}
  .scope-value{max-width:none;text-align:left;margin:9px 0 0}
  .date-row{grid-template-columns:repeat(4,minmax(0,1fr))}
  .time-range-grid{grid-template-columns:1fr}
  .time-cand{grid-template-columns:16px 30px minmax(0,1fr);padding:14px}
  .time-cand .time-status{grid-column:3;justify-self:start;margin-top:2px}
  .room-choice{grid-template-columns:16px minmax(0,1fr)}
  .room-choice em{grid-column:2;justify-self:start}
  /* 참석자 선택: 담기/명단 탭 분리 — 2패널을 억지로 줄이지 않는다 */
  .pane-tabs{display:flex}
  .compose{display:flex;flex-direction:column}
  .compose .pane-b{max-height:none}
  .compose.show-add .pane.result{display:none}
  .compose.show-roster .pane.pick{display:none}
  .stp{padding:9px 2px}
}
/* 소형 모달 + 라벨:값 행 + 사용자 언어 노트 + 조용한 액션 */
.modal-wrap.sm{max-width:360px}
.ev-title.sm{font-size:19px;padding:4px 0 2px}
.ev-meta{font-size:var(--fs-xs);color:var(--faint);font-weight:600;margin:2px 0 10px}
.kv-list{border-top:1px solid var(--line2)}
/* 라벨과 값은 같은 크기 — 위계는 선명도(색)로만 가른다. 크기가 다르면 행 정렬이 어긋난다 */
.kv{display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid var(--line2)}
.kv>span{flex:none;width:56px;font-size:var(--fs-sm);font-weight:600;color:var(--faint);line-height:1.5}
.kv>b{flex:1;min-width:0;font-size:var(--fs-sm);font-weight:650;color:var(--ink);line-height:1.5}
.ev-note{font-size:var(--fs-sm);color:var(--muted);line-height:1.55;padding:10px 2px 2px}
.ev-note b{color:var(--blue-d)}
.ev-note.hard b{color:var(--danger)}
.kv>em{flex:none;font-style:normal;font-size:var(--fs-2xs);font-weight:800;color:var(--faint)}
.kv-tag.hard{color:var(--danger)}
.kv-tag.warn{color:var(--warn)}
.kv-tag.good{color:var(--mint-d)}
.modal-acts{display:flex;align-items:center;gap:14px;margin-top:14px;padding-top:10px;border-top:1px solid var(--line2)}
.modal-acts .ma-sp{flex:1}
.link-btn.danger{color:var(--danger)}
/* 내 차례 단계 칩(동의→성립→확정→종결) · 알림 새 소식 점 */
.todo-chip{flex:none;font-size:var(--fs-2xs);font-weight:800;color:var(--blue-d)}
.tb-icon{position:relative}
.tb-icon.has-new::after{content:"";position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--blue);border:2px solid var(--panel)}
@media(max-width:639px){
  .tb-stats{display:none}
  .tb-greet{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .topbar{padding:0 12px;gap:8px}
  .settings-hero{grid-template-columns:1fr;padding:16px}
  .settings-meter{grid-template-columns:repeat(3,1fr)}
  .settings-grid{grid-template-columns:1fr}
  /* 모달: 풀스크린 시트로 */
  .modal-bg{align-items:flex-end;padding:0;background:rgba(9,16,28,.34)}
  .modal-wrap{max-width:100%;height:auto;max-height:92vh;border-radius:26px 26px 0 0}
  .modal-wrap.create{height:100%;max-height:100vh;border-radius:0}
  .modal-wrap.sm{max-width:100%;max-height:78vh}
  .modal-bar{padding:20px 18px 6px}
  .modal-bar::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:42px;height:4px;border-radius:var(--rp);background:var(--line)}
  .modal-wrap.create .modal-bar::before{display:none}
  .grid2{grid-template-columns:1fr}
  .stp .sl{display:none}
  .stp{gap:0;padding:9px 4px}
  .fab{right:18px;bottom:calc(18px + env(safe-area-inset-bottom))}
  .fab-menu{right:12px;left:12px;bottom:calc(86px + env(safe-area-inset-bottom));align-items:stretch}
  .fab-item{width:100%;min-width:0}
}

/* ── v0.4 전역 재설계: "색 박스 + 텍스트" 금지 — 색은 점(dot)으로만, 텍스트는 플레인 ── */
.pill,.rk-pill,.tstage,.rank-badge,.fs-chip{background:none!important;border:none!important;padding:0!important;box-shadow:none!important}
.pill{gap:5px;font-weight:700}
.pill::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex:none;opacity:.85}
.pill-d{color:var(--faint)}.pill-b{color:var(--blue-d)}.pill-m{color:var(--mint-d)}
.rk-pill{font-size:var(--fs-2xs);font-weight:700;color:var(--faint);margin-left:5px}
.rk-pill.lead{color:var(--blue-d)}
.tstage{font-size:var(--fs-2xs);font-weight:800;color:var(--faintest);margin-right:6px}
.iv-who{display:flex;align-items:center;gap:8px}
.iv-who .iv-nm{font-size:var(--fs-sm);font-weight:700;color:var(--ink);flex:1}
.co-my{font-size:var(--fs-xs);font-weight:800;color:var(--blue-d);flex:none}
.co-my.ok{color:var(--mint-d)}.co-my.no{color:var(--danger)}
.co-role.host{color:var(--blue-d)}
.side-sub{font-size:var(--fs-2xs);font-weight:600;color:var(--faintest);margin-left:6px}
.side-empty{font-size:var(--fs-xs);color:var(--faintest);padding:6px 10px 10px}
.resp-col{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex:none;min-width:86px}
.resp-sub{font-size:var(--fs-2xs);color:var(--faintest);font-weight:600}
.resp-remind{font-size:var(--fs-2xs);margin-right:8px;flex:none}
.rank-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-xs);font-weight:800;color:var(--blue-d)}
.rank-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--blue);flex:none}
.fs-chip{font-size:var(--fs-2xs);font-weight:700;color:var(--strong)}
.fs-chip.ph{color:var(--faintest);font-weight:600}
/* 경고: 색 배경 박스 → 플레인 텍스트 + 워닝 색 */
.warn-box{background:none;border:none;border-left:2.5px solid var(--warn);border-radius:0;padding:2px 0 2px 11px;color:var(--warn);font-weight:600}
.cl-tag{background:none!important;border:none!important;padding:0!important;color:var(--faint)!important}

/* ── 2026-07 리뉴얼: data-first compact system ──────────────────────────
   참고 이미지의 표 문법을 제품 전체에 확장한다.
   한 화면 = 한 평면, 구분은 그림자가 아니라 정렬·행 높이·1px 선으로 만든다. */
:root{
  --blue:#2F6FED;--blue-d:#245DCB;--blue-s:#EEF4FF;--blue-l:#CFDDF8;
  --attention:#E45757;--attention-d:#B94040;--attention-s:#FFF0F0;--attention-l:#F5CCCC;
  --mint:#3BAA78;--mint-d:#26845B;--mint-s:#EAF8F0;--mint-l:#CBEAD9;
  --warn:#A96A12;--warn-s:#FFF7E7;--danger:#C74B50;--danger-s:#FFF0F1;
  --ink:#18202C;--strong:#303A49;--muted:#586475;--faint:#7E8998;--faintest:#A9B1BC;
  --line:#E1E5EA;--line2:#EDF0F3;--bg:#F6F8FA;--panel:#FFFFFF;--panel2:#F5F7F9;
  --free-s:#FFFFFF;--free-l:#E6EBF0;
  --r:10px;--rs:8px;--rx:6px;
  --sh-evt:none;--sh-evt-h:none;--sh-card:none;--sh-card-blue:none;--sh-card-gray:none;
  --sh-lg:0 14px 36px rgba(19,33,55,.14);
}
body{letter-spacing:-.005em}
h1,h2,h3{font-family:var(--font);letter-spacing:-.02em}
button:focus{outline:none}
button:focus-visible{outline:2px solid var(--blue-l);outline-offset:1px}
.tb-tab:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--blue-l)}
.tb-icon:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--blue-l)}

/* chrome */
.topbar{height:58px;padding:0 22px;gap:10px;background:rgba(255,255,255,.98);border-bottom:1px solid var(--line)}
.tb-logoname{font-size:17px;font-weight:850;letter-spacing:.01em}
.tb-divider{height:18px;margin-right:2px}
.tb-nav{height:100%;align-items:stretch;gap:0}
.tb-tab{position:relative;border-radius:0;padding:0 13px;font-size:12.5px;font-weight:650;color:var(--faint)}
.tb-tab:hover{background:transparent;color:var(--ink)}
.tb-tab.on{background:transparent;color:var(--blue-d);font-weight:800}
.tb-tab.on::after{content:"";position:absolute;left:13px;right:13px;bottom:-1px;height:2px;background:var(--blue);border-radius:2px 2px 0 0}
.tb-greet{font-size:12.5px;color:var(--muted);margin-left:8px}
.tb-greet b{font-weight:750}
.tb-clock{font-size:12px;color:var(--faint)}
.tb-clock b{font-size:17px;color:var(--ink);letter-spacing:.01em}
.tb-icon{width:32px;height:32px;border-radius:6px}
.tb-icon:hover{background:var(--panel2)}

/* common surfaces */
.cal-wrap,.records-wrap{padding:14px var(--page-x) 18px;gap:12px}
.page-head{min-height:var(--page-head-h);flex:none;display:flex;align-items:flex-end;gap:16px;padding:2px 2px 8px;border-bottom:1px solid transparent}
.page-head h1{font-size:20px;font-weight:800;line-height:1.25;color:var(--ink)}
.page-head p{margin-top:var(--title-sub-gap);font-size:11px;font-weight:550;color:var(--faint);line-height:var(--row-line)}
.page-meta{margin-left:auto;padding-bottom:2px;font-size:10.5px;font-weight:650;color:var(--faint);white-space:nowrap}
.data-page .pp-filter{min-height:50px}
.data-page .ppf-q{max-width:none}
.cal-card,.records-card,.pp-filter,.pp-tree,.pp-table{border:1px solid var(--line);border-radius:9px;box-shadow:none;background:var(--panel)}
.hp-h{min-height:52px;padding:10px 16px;border-bottom:1px solid var(--line)}
.hp-h h2,.hp-h h2.wc-title-h{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.02em;text-transform:none}
.hp-sub{font-size:11px;font-weight:600;color:var(--faint);margin-left:8px}
.mcal-nav{gap:4px}
.mcal-arw,.mcal-today{height:28px;border-color:var(--line);border-radius:6px;background:#fff;font-size:12px}
.mcal-arw{width:28px}
.cal-seg{height:28px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);padding:2px}
.seg{height:22px;border-radius:4px;padding:0 10px;font-size:11px}
.seg.on{box-shadow:none;border:1px solid var(--line);background:#fff}
.cal-legend{min-height:38px;padding:7px 16px;gap:12px;background:#FAFBFC;border-bottom:1px solid var(--line);flex-wrap:nowrap}
.cal-legend .cl-it,.cl-cat,.criteria-toggle{font-size:10.5px;font-weight:650}
.cal-legend i{width:12px;height:8px;border-radius:2px}

/* summary = a single aligned data strip */
.stat-strip{grid-template-columns:repeat(4,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.stat-card{min-height:70px;border-radius:0;padding:11px 15px;gap:8px;box-shadow:none;border-right:1px solid var(--line);transition:background .12s}
.stat-card:last-child{border-right:none}
.stat-card:hover{transform:none;box-shadow:none;background:#FAFBFC}
.stat-ic{display:none}
.stat-tx{gap:2px}
.stat-lb{font-size:10px;font-weight:750;text-transform:uppercase;letter-spacing:.035em;color:var(--faint)}
.stat-v{font-size:21px;font-weight:800;letter-spacing:-.02em}
.stat-v small{font-size:11px;font-weight:650;color:var(--faint)}
.stat-sub{font-size:10.5px;font-weight:550}
.stat-go{width:12px;height:12px}

/* response queue = row list, not floating cards */
.respond-side{width:286px;padding:0 var(--page-x) 14px;background:#FBFCFD;border-right:1px solid var(--line)}
.rs-h{min-height:calc(14px + var(--page-head-h));padding:14px 2px 8px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;gap:10px}
.rs-title-group{display:flex;flex:1;min-width:0;flex-direction:column;gap:var(--title-sub-gap)}
.rs-title-group b{font-size:14px;font-weight:800;color:var(--ink);line-height:1.25;letter-spacing:-.02em}
.rs-title-group small{font-size:10.5px;font-weight:550;color:var(--faint);line-height:var(--row-line);white-space:nowrap}
.rs-h .side-cnt{margin-left:auto;margin-bottom:8px;align-self:flex-end}
.side-cnt{background:#EEF1F4;border-radius:5px;padding:1px 6px;font-size:10px}
.qcard{margin:0;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:14px 2px 13px;background:transparent}
.qcard:hover{background:#F4F7FA;border-color:var(--line)}
.qc-1 b{font-size:12.5px;font-weight:750;line-height:1.4}
.qc-badge{padding:2px 6px;border-radius:4px;background:var(--blue-s);font-size:9.5px}
.qc-badge.vio{background:#F1EFFE}
.qc-2{margin-top:5px}.qc-3{margin-top:2px}
.qc-2,.qc-3{font-size:10px;line-height:var(--row-line)}
.qc-cta{margin-top:8px}
.qbtn{border-radius:5px;padding:4px 11px;background:#fff;font-size:10px}
.qbtn.pri{background:var(--blue);border-color:var(--blue)}
.qdone{border-radius:0;border-bottom:1px solid var(--line)}

/* calendar = restrained spreadsheet-like grid */
.wk-head,.mcal-head{background:#F4F6F8;border-bottom:1px solid var(--line)}
.wk-dh{padding:8px 4px;border-left:1px solid var(--line)}
.wk-dn{font-size:10px;font-weight:750;color:var(--faint)}
.wk-dd{font-size:13px;width:24px;height:24px}
.wk-dh.today .wk-dd{background:var(--blue);color:#fff}
.wk-gut,.wk-times{width:52px}
.wk-hr{min-height:60px;border-top-color:var(--line2);font-size:10px;padding-right:7px}
.wk-slot{min-height:60px;background:#fff;border-top-color:var(--line2)}
.wk-slot:hover{background:#F7FAFE}
.wk-col{border-left-color:var(--line)}
.wk-dh{border-left-color:var(--line)}   /* 헤더·본문 열 경계선 색 통일 — 다르면 위아래 선이 끊겨 보인다 */
.wk-col.today{background:#FBFDFF}
.wk-evt{left:4px;right:4px;border-radius:5px;padding:6px 8px;box-shadow:none!important;border:1px solid rgba(38,50,67,.07);transition:filter .12s}
.wk-evt:hover{transform:none;box-shadow:none!important;filter:brightness(.98)}
.wk-evt.lay-invite{border:1px dashed #AEB7C3;border-radius:5px;box-shadow:none!important}
.wk-evt.lay-soft{box-shadow:none!important}
.wk-evt-t{font-size:11.5px;font-weight:750}
.wk-evt-s{font-size:10px;font-weight:550}
.wk-evt-loc{font-size:9.5px}
.mcal-dow{padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.mcal-cell{padding:6px 7px;border-color:var(--line2);gap:3px}
.mcal-dn{font-size:11px}
.mcal-evt{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:650}

/* table screens */
.pp-wrap{gap:12px}   /* records-wrap·cal-wrap과 동일 — 페이지 간 박스 시작점이 어긋나지 않게 */
.pp-grid{gap:10px;grid-template-columns:204px minmax(0,1fr)}
.pp-filter{padding:10px 12px}
.pp-filter .ppf-q{max-width:680px}
.records-filter{margin:0;flex:none}
.pp-table .hp-h{background:#fff}
.pl-head,.records-cols{background:#F1F3F6;color:#687485;text-transform:uppercase;letter-spacing:.035em;font-size:9.5px;font-weight:750;border-bottom:1px solid var(--line)}
.pl-head,.pl-row{padding-left:14px;padding-right:14px}
.pl-row{min-height:48px;padding-top:8px;padding-bottom:8px;border-bottom:1px solid var(--line2)}
.pl-row:hover,.record-row:hover{background:#F8FAFC}
.pl-row.sel{background:var(--blue-s)}
.pl-ck{width:17px;height:17px;border-radius:4px}
.pl-name{gap:8px}
.pl-nm b{font-size:12px;font-weight:750}
.pl-team,.pl-mail,.pl-hours{font-size:10.5px;font-weight:550}
.pl-st{border-radius:4px;padding:2px 6px;font-size:9.5px}
.pl-bar{min-height:46px;padding:7px 14px}
.pp-pager{padding:5px 14px}

/* people and records share one data-panel and one table grammar */
.data-side{height:100%;min-height:0;display:flex;flex-direction:column;overflow:hidden;border-radius:7px!important}
.data-side-title{height:46px;display:flex;align-items:center;padding:0 14px!important;border-bottom:1px solid var(--line);font-size:12px!important;font-weight:750!important;letter-spacing:0!important;text-transform:none!important;color:var(--strong)!important;flex:none}
.data-side-body{flex:1;min-height:0;overflow-y:auto;padding:8px!important;display:flex;flex-direction:column;gap:2px}
.data-side-section{display:flex;flex-direction:column;gap:2px}
.data-side-section-label{padding:13px 8px 5px!important;font-size:9.5px!important;font-weight:700!important;letter-spacing:.03em!important;text-transform:none!important;color:var(--faintest)!important}
.data-side-node{min-height:34px;margin:0!important;padding:7px 9px!important;border-radius:5px!important;font-size:10.5px!important;font-weight:600!important;color:var(--faint)!important;line-height:1.25}
.data-side-node:hover{background:#F7F9FC!important;color:var(--strong)!important}
.data-side-node.on{background:var(--blue-s)!important;color:var(--blue-d)!important;font-weight:700!important}
.data-side-node.root,.data-side-node.d{font-weight:650!important;color:var(--muted)!important}
.data-side-node.root.on,.data-side-node.d.on{color:var(--blue-d)!important}
.data-side-node.t{padding-left:24px!important}
.data-side-node .ppt-n,.data-side-node b{font-size:10px!important;font-weight:600!important;color:var(--faintest)!important}
.data-side-node.on .ppt-n,.data-side-node.on b{color:var(--blue)!important}
.data-side-footer{height:46px;min-height:46px;width:100%;display:flex;align-items:center;gap:8px;padding:0 14px!important;border-top:1px solid var(--line)!important;background:#fff;font-size:10.5px!important;font-weight:650!important;color:var(--muted)!important;text-align:left;flex:none}
.data-side-footer:hover:not(:disabled){background:#F8FAFC;color:var(--strong)!important}
.data-side-footer:disabled{opacity:.42;cursor:default}
.side-reset-ic{width:17px;height:17px;display:grid;place-items:center;border:1px solid var(--line);border-radius:4px;font-size:11px;color:var(--faint)}

.pl-head,.pl-row{grid-template-columns:28px 24px repeat(6,minmax(110px,1fr)) 66px;gap:14px}
.data-cell{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10.5px!important;font-weight:550!important;color:var(--muted)!important;line-height:1.35}
.pl-name{gap:7px}
.pl-nm{display:block;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-nm>span:first-child{font-size:10.5px;font-weight:550;color:var(--muted)}
.pl-eng{font-size:9.5px;font-weight:500;margin-left:5px}
.pl-duty,.pl-rank{display:block}
.pl-row .cr-add{font-size:10.5px;font-weight:600}
.pl-row.self{cursor:default}
.pl-row.self:hover{background:transparent}
.pl-row .pl-ck.self{border-color:transparent;background:transparent}
.pl-row .cr-add.self{color:var(--faint);font-weight:700}

.records-toolbar{min-height:46px;padding:10px 14px;border-bottom:1px solid var(--line)}
.records-toolbar b{font-size:13px}
.records-toolbar span{font-size:10.5px}
.records-grid{flex:1;display:grid;grid-template-columns:204px minmax(0,1fr);gap:10px;min-height:0}
.record-filter-panel{background:#fff;border:1px solid var(--line);padding:0}
.record-filter-body{gap:0}
.record-filter-group{display:flex;flex-direction:column;gap:2px}
.record-scope-node{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left}
.record-reset{margin-left:auto;padding:4px 7px;border-radius:4px;font-size:10px;font-weight:700;color:var(--blue-d);background:var(--blue-s)}
.records-cols{display:grid;grid-template-columns:28px minmax(180px,1.35fr) repeat(5,minmax(96px,1fr)) minmax(72px,.7fr) minmax(96px,1fr) 24px;gap:14px;padding:8px 18px}
.records-cols span:nth-child(9){text-align:right}
.records-list{padding:0 14px 10px}
.record-row{grid-template-columns:28px minmax(180px,1.35fr) repeat(5,minmax(96px,1fr)) minmax(72px,.7fr) minmax(96px,1fr) 24px;gap:14px;min-height:48px;padding:8px 4px;border-bottom:1px solid var(--line2)}
.record-fav{width:24px;height:24px;display:grid;place-items:center;border-radius:5px;color:var(--faintest);font-size:17px;line-height:1}

.record-fav.on{color:#D79A24}
.record-fav-head{color:#D79A24;text-align:center;font-size:11px}
.record-main,.record-when,.record-purpose,.record-location,.record-conclusion,.record-agenda{display:block;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-count{font-size:10.5px;font-weight:550;color:var(--muted)}
/* 정리 컬럼 — 정리한 사람(아바타+이름) 또는 '정리 전'. 결론 없는 행의 결론 셀도 같이 가라앉힌다 */
.record-wrap{display:flex;align-items:center;gap:6px;min-width:0;font-size:10.5px;font-weight:550;color:var(--strong)}
.record-wrap>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-wrap.none{color:var(--faintest)}
.record-conclusion.none{color:var(--faintest)}
.record-go{font-size:16px;justify-self:end;padding-right:6px}
.record-empty{min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px;color:var(--faint)}
.record-empty b{font-size:12.5px;color:var(--strong)}
.record-empty span{font-size:10.5px}

/* controls */
.btn{border-radius:6px;padding:8px 14px;font-size:11.5px;font-weight:750}
.btn-pill{border-radius:6px;padding:9px 16px}
.btn-p{background:var(--blue)}
.btn-g{background:#fff;border-color:var(--line)}
.chip{border:1px solid var(--line);border-radius:5px;padding:6px 10px;background:#fff;font-size:11.5px}
.chip:hover{background:#F7F9FC}
.chip.on{background:var(--blue-s);border-color:var(--blue-l);color:var(--blue-d)}
.pill{border-radius:4px!important;padding:2px 6px!important;background:#F0F2F5!important;font-size:9.5px!important;gap:4px}
.pill::before{width:5px;height:5px}
.pill-b{background:#EEF4FF!important;color:var(--blue-d)!important}
.pill-m{background:#EAF8F0!important;color:var(--mint-d)!important}
.pill-d{background:#F0F2F5!important;color:#6F7986!important}
.inp,.f-line,.time-select,.ppf-sel,.ppf-q{border:1px solid var(--line);border-radius:6px;background:#fff;box-shadow:none;font-size:12px}
.inp:focus,.f-line:focus,.time-select:focus,.ppf-q:focus{border-color:#8FB1F5;box-shadow:0 0 0 2px var(--blue-s)}

/* modals and creation flow */
.modal-bg{background:rgba(24,32,44,.22);backdrop-filter:none;padding:20px}
.modal-wrap,.modal-wrap.criteria{border:1px solid #D7DCE3;border-radius:11px;box-shadow:0 18px 46px rgba(20,32,50,.16);background:#fff}
.modal-bar{min-height:48px;padding:10px 14px 6px;border-bottom:1px solid var(--line2)}
.modal-bar h2{font-size:10px;font-weight:800;color:var(--faint)}
.modal-close,.criteria-close{width:30px;height:30px;border-radius:6px;background:#fff;border:1px solid var(--line);font-size:18px}
.mc-h{padding:17px 18px 3px}
.mc-h h3{font-size:18px;font-weight:800}
.mc-b{padding:11px 18px 18px}
.modal-wrap.create.v2{border-radius:11px}
.cm-head{min-height:52px;padding:10px 14px 10px 20px;background:#fff;border-bottom:1px solid var(--line)}
.cm-title{flex:1;min-width:0}
.cm-head h2{font-size:15px;color:var(--ink);line-height:1.3}
.cm-head p{margin-top:2px;font-size:9.5px;font-weight:550;color:var(--faint);line-height:1.35}
.cm-x{color:var(--faint);border:1px solid var(--line);border-radius:6px;width:30px;height:30px}
.cm-x:hover{background:var(--panel2);color:var(--ink)}
.modal-wrap.create.v2 .create-flow{padding:2px 22px 14px}
.modal-wrap.create.v2 .create-foot{padding:12px 18px 14px;box-shadow:none}
.modal-wrap.create .stepper{gap:0;padding:8px 20px 10px;border-bottom:1px solid var(--line2)}
.modal-wrap.create .stp{height:34px;border-radius:0;border-bottom:2px solid transparent;padding:0 10px}
.modal-wrap.create .stp.active{background:transparent;border-bottom-color:var(--blue)}
.modal-wrap.create .stp .sn{width:20px;height:20px;font-size:10px}
.modal-wrap.create .stp .sl{font-size:11px}
.modal-wrap.create .mc-h{padding:16px 22px 2px}
.modal-wrap.create .mc-h h3{font-size:17px;line-height:1.35}
.modal-wrap.create .mc-b{padding:10px 22px 20px}
.time-scope,.pane,.summary-card,.sec,.opt-card,.set-sum{border-radius:7px;box-shadow:none;background:#fff}
.time-scope{padding:11px 12px;margin-bottom:12px}
.scope-head{gap:10px;padding-bottom:10px;margin-bottom:11px}
.scope-title{font-size:15px;line-height:1.35}
.scope-value{font-size:11px;line-height:1.35}
.scope-grid{gap:10px}
.date-row{gap:5px}
.date-range-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.date-chip{padding:7px 3px;border-radius:5px}
.date-chip b{font-size:10.5px}
.date-chip span{font-size:9px;margin-top:3px}
.time-range-grid{gap:7px}
.time-field{gap:5px}
.time-select,.dur-seg{height:34px;border-radius:6px}
.time-select{padding:0 9px;font-size:11px;font-weight:700}
.selection-note,.inline-notice{margin:0 0 10px;padding:8px 10px;border:1px solid var(--blue-l);border-radius:6px;background:var(--blue-s);font-size:10.5px;font-weight:600;color:var(--blue-d);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inline-notice{margin:0;border-color:#F0D9A8;background:var(--warn-s);color:var(--warn)}
.flow-context{flex-wrap:nowrap;gap:0;margin:12px 0 2px;padding:0 10px;border-radius:7px;overflow:hidden;background:#F7F9FC}
.flow-context .fc-item{flex:1;padding:8px 10px;gap:6px;border-left:1px solid var(--line2);font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden}
.flow-context .fc-item:first-child{border-left:0}
.flow-context .fc-k{font-size:9px;font-weight:700;flex:none}
.flow-context .fc-dot{display:none}
.invite3-agenda{display:flex;align-items:center;gap:6px;min-width:0}
.invite3-agenda-main{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.invite-agenda-count{font-size:9.5px;font-weight:600;color:var(--faintest);white-space:nowrap}
.invite-agenda-list{padding:8px 14px 10px;border-bottom:1px solid var(--line2);background:#FAFBFC}
.invite-agenda-list[hidden]{display:none}
.invite-agenda-item{padding:4px 0;font-size:10.5px;font-weight:550;color:var(--muted)}
.meeting-detail-modal{width:min(560px,94vw);max-width:560px}
.meeting-detail-modal .modal-bar{min-height:52px;padding:10px 16px;border-bottom:1px solid var(--line2)}
.meeting-detail-modal .modal-bar h2{font-size:10.5px;font-weight:800;letter-spacing:.02em;color:var(--faint);text-transform:none}
.meeting-detail-modal .mc-b{padding:14px 16px 16px}
.meeting-detail-status{display:flex;align-items:center;gap:6px;min-height:22px;margin-bottom:10px;flex-wrap:wrap}
.meeting-detail-status:empty{display:none}
.meeting-detail-modal .invite-sheet{margin:0;border-radius:8px;background:#fff}
.meeting-detail-modal .invite3-head{padding:15px 16px 13px;border-bottom:1px solid var(--line2)}
.meeting-detail-modal .invite3-title{font-size:17px;font-weight:850;line-height:1.35;letter-spacing:-.02em}
.meeting-detail-modal .invite3-grid{padding:0 16px 4px}
.meeting-detail-modal .invite3-row{grid-template-columns:64px minmax(0,1fr);gap:12px;padding:11px 0}
.meeting-detail-modal .invite3-k{font-size:10.5px;font-weight:750;color:var(--faint);line-height:1.45}
.meeting-detail-modal .invite3-v{font-size:12.5px;font-weight:650;color:var(--strong);line-height:1.5}
.meeting-detail-modal .invite3-sub{font-size:10.5px;font-weight:550;color:var(--faint);line-height:1.45}
.meeting-agenda-block{min-width:0}
.meeting-agenda-main{display:flex;align-items:center;gap:6px;min-width:0}
.meeting-agenda-trigger{display:inline-flex;align-items:center;gap:7px;min-width:0;max-width:100%;margin:-3px 0;padding:3px 5px 3px 0;border-radius:5px;color:var(--strong);text-align:left;cursor:pointer}
.meeting-agenda-trigger:hover,.meeting-agenda-trigger:focus-visible{color:var(--blue-d);background:var(--blue-s);outline:none}
.meeting-agenda-title{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meeting-agenda-chevron{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}

.meeting-agenda-list{margin-top:9px;padding:8px 10px;border-radius:5px;background:var(--panel2)}
.meeting-agenda-list[hidden]{display:none}
.meeting-agenda-item{padding:3px 0;font-size:10.5px;font-weight:550;color:var(--muted);line-height:var(--row-line)}
.meeting-people{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.meeting-person{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:650;color:var(--strong);white-space:nowrap}
.meeting-people-count{font-size:10px;font-weight:650;color:var(--faint);white-space:nowrap}
.meeting-detail-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:12px}
.meeting-detail-actions:empty{display:none}
.meeting-record-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--line2)}
.meeting-record-head{display:flex;align-items:center;gap:8px;margin:0 0 8px;font-size:11.5px;font-weight:800;color:var(--ink)}
.meeting-record-meta{margin-left:auto;font-size:10px;font-weight:600;color:var(--faint)}
.meeting-record-agenda{border:1px solid var(--line);border-radius:7px;padding:10px 12px;margin-bottom:7px}
.meeting-record-agenda-title{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:750;color:var(--ink)}
@media(max-width:640px){
  .meeting-detail-modal{width:100%;max-width:none}
  .meeting-detail-modal .mc-b{padding:12px 14px 16px}
  .meeting-detail-modal .invite3-row{grid-template-columns:56px minmax(0,1fr);gap:10px}
}
.dur-seg{gap:2px;padding:3px}
.dur-seg button{border-radius:4px;font-size:10px}
.candidate-list.refined{gap:6px}
.time-cand{grid-template-columns:16px 52px minmax(0,1fr) auto;gap:8px}
.time-cand,.room-choice{border-radius:6px;padding:9px 11px;background:#F8F9FB}
.time-rank{width:52px;height:20px;border-radius:4px;font-size:9px;white-space:nowrap}
.time-cand-main b{font-size:13px;line-height:1.3}
.time-cand-main small{font-size:10px;margin-top:2px}
.time-status{font-size:10px}
.time-cand.sel,.room-choice.sel{box-shadow:none}
.opt-card{padding:9px 10px;border-radius:6px;gap:2px}
.opt-card b{font-size:11.5px}
.opt-card span{font-size:9.5px;line-height:1.35}
.opt-card.on{box-shadow:none}
.vopt{padding:9px 11px;border-radius:6px;margin-bottom:5px}
.vopt-top{gap:8px}
.vopt-when{font-size:13px}
.vopt-sub{font-size:10px;margin-top:2px}
.vopt-cnt{font-size:17px}
.vopt-cnt small{font-size:10px}
.vopt-tag{padding:2px 6px;border-radius:4px;font-size:9px}
.rchip{font-size:10px;padding:4px 7px;border-radius:4px}
.confirm-time{font-size:24px}
.invite3-head{padding:14px 14px 10px}
.invite3-title{font-size:16px;line-height:1.3}
.invite3-grid{padding:2px 14px 10px}
.invite3-row{grid-template-columns:58px minmax(0,1fr);gap:10px;padding:10px 0}
.invite3-k{font-size:10px}
.invite3-v{font-size:12.5px;line-height:1.4}
.invite-people{display:flex;align-items:center}

.invite-people .av:first-child{margin-left:0}
.invite-people>span:last-child{margin-left:7px;font-size:10.5px;font-weight:700;color:var(--faint)}
.consent-hero{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.consent-hero b{font-size:12.5px;color:var(--ink);font-feature-settings:"tnum"}

.sec-h .sec-no{border-radius:4px}
.create-foot{box-shadow:none}

/* settings and criteria use rows, not promotional cards */

.pf-ic.block{background:#E9EDF2;color:#445064}
.exclude-mode{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:10px;padding:3px;border-radius:6px;background:#EBEEF2}
.exclude-mode-btn{padding:7px 10px;border-radius:4px;font-size:10.5px;font-weight:700;color:var(--faint)}

.exclude-note{margin-top:0;padding:7px 9px;border-radius:5px;background:#F1F5FA;color:var(--faint);font-size:10px;font-weight:550}

/* meeting creation is the primary flow: compact choices, short rows and restrained hierarchy */
.modal-wrap.create.v2{max-width:590px;width:min(590px,94vw)}
.modal-wrap.create.v2 .create-flow{padding:2px 22px 10px}

const min=hm=>{const[h,m]=hm.split(":").map(Number);return h*60+m;};

   일정 추가·내 기준·슬롯 인스펙터 전부 동작하고, 회의 후보에서는 제외가 아니라 가중(soft weight)으로만 후순위가 된다 */

const ED_DATES=Array.from({length:RANGE_DAYS},(_,i)=>edDate(i));
const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const keyDate=k=>{const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d);};
const dayIndexFromKey=k=>Math.round((keyDate(k)-BASE_MON)/86400000);
const monthKey=(off,day)=>dateKey(new Date(NOW.getFullYear(),NOW.getMonth()+off,day));
const monthLabel=off=>{const d=new Date(NOW.getFullYear(),NOW.getMonth()+off,1);return`${d.getFullYear()}년 ${d.getMonth()+1}월`;};
const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const dateLabel=d=>`${DOW_KR[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
const fullDateLabel=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} (${DOW_KR[d.getDay()]})`;
const fullDayLabel=i=>fullDateLabel(edDate(i));
const fullSlotLabel=(i,s,e)=>`${fullDayLabel(i)} ${s}${e?`–${e}`:""}`;
const DAYS_S=ED_DATES.map(d=>DOW_KR[d.getDay()]);
const DAYS_D=ED_DATES.map(d=>`${d.getMonth()+1}/${d.getDate()}`);
const DAYS=ED_DATES.map((d,i)=>`${DAYS_S[i]} ${DAYS_D[i]}`);
const TODAY_IDX=ED_DATES.findIndex(d=>sameDay(d,NOW));
const TODAY=TODAY_IDX>=0?TODAY_IDX:0;
const isWknd=d=>d%7>=5;
const liveNow=()=>new Date();
const nowMinute=()=>{const n=liveNow();return n.getHours()*60+n.getMinutes();};
const dayIsPast=d=>{const dt=edDate(d),t=liveNow();dt.setHours(0,0,0,0);t.setHours(0,0,0,0);return dt<t;};
const dayIsToday=d=>sameDay(edDate(d),liveNow());
const ceilStep=(v,step)=>Math.ceil(v/step)*step;
const minFutureStart=(d,step=60,start=7*60)=>Math.max(start,dayIsToday(d)?ceilStep(nowMinute()+1,step):start);
const hasFutureOnDay=(d,dur=60,step=60,start=7*60,end=22*60)=>!dayIsPast(d)&&minFutureStart(d,step,start)+dur<=end;
const hasFutureInRange=(dur=60,step=60,start=7*60,end=22*60)=>Array.from({length:RANGE_DAYS},(_,d)=>d).some(d=>hasFutureOnDay(d,dur,step,start,end));
/* 이번 주(i<7)만 스캔하던 옛 구현은 일요일 저녁처럼 주 경계에서 다음 날을 못 찾는다 — 엔진 범위(4주) 전체를 본다 */
const firstFutureDay=(dur=60,step=60,start=7*60,end=22*60)=>{
  for(let i=0;i<RANGE_DAYS;i++)if(hasFutureOnDay(i,dur,step,start,end))return i;

};
const firstFutureRangeDay=(dur=60,step=60,start=7*60,end=22*60)=>{

function evalSlot(d,h,req,opt,dur=60){

  });
