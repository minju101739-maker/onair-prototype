    const guardSlot=()=>{const{d,h}=st.slotView;if(pastSlot(d,h,60)){toast("이미 지난 시간에는 새 조율·설정을 할 수 없습니다. 상세 확인만 가능합니다.");st.slotView=null;render();return null;}return{d,h};};
    const sb=document.getElementById("slBlock");if(sb)sb.onclick=()=>{const v=guardSlot();if(v)blockSlot(v.d,v.h);};
    const sm=document.getElementById("slMeet");if(sm)sm.onclick=()=>{const v=guardSlot();if(!v)return;st.slotView=null;openCreate(null,{window:{d0:v.d,d1:v.d,s:v.h*60,e:Math.min((v.h+1)*60,CAL_END*60)}});};
    const sa=document.getElementById("slAdd");if(sa)sa.onclick=()=>{const v=guardSlot();if(!v)return;st.slotView=null;openAdd(v.d,v.h);};
    return;}
  if(st.invite){m.innerHTML=inviteModal();
    wireInvitationCard();
    const cl=()=>{st.invite=null;render();};
    document.getElementById("ivClose").onclick=cl;const c2=document.getElementById("ivClose2");if(c2)c2.onclick=cl;
    document.getElementById("ivBg").onclick=e=>{if(e.target.id==="ivBg")cl();};
    const y=document.getElementById("ivYes");if(y)y.onclick=()=>respondInvite(st.invite,"yes");
    const n=document.getElementById("ivNo");if(n)n.onclick=()=>respondInvite(st.invite,"no");
    const ch=document.getElementById("ivChange");if(ch)ch.onclick=()=>{delete st.inviteResp[st.invite];render();};
    return;}
  if(st.roomAssign){m.innerHTML=assignModal();
    const cl=()=>{st.roomAssign=false;render();};
    document.getElementById("asClose").onclick=cl;document.getElementById("asBg").onclick=e=>{if(e.target.id==="asBg")cl();};
    document.querySelectorAll("[data-as-room]").forEach(c=>c.onclick=()=>{
      const r=ROOMS_DATA.find(x=>x.id===c.dataset.asRoom);if(!r)return;
      r.bk.push({d:ASSIGN_MEET.d,sh:ASSIGN_MEET.sh,eh:ASSIGN_MEET.sh+1,t:ASSIGN_MEET.title,once:true});
      if(EVENT_INFO[ASSIGN_MEET.title])EVENT_INFO[ASSIGN_MEET.title].r=roomLabel(r);
      st.roomAssign=false;st.roomAssigned=true;notify(`<b>${ASSIGN_MEET.title}</b> — ${roomLabel(r)} 배정, 참석자에게 확정 통보 발송`,"confirm");render();
      toast(`<strong>${ASSIGN_MEET.title}</strong> — ${roomLabel(r)} 배정 · 참석자에게 확정 통보 발송`);});
    return;}
  if(st.connect){m.innerHTML=connectModal();
    const cl=()=>{st.connect=null;render();};
    document.getElementById("cnClose").onclick=cl;document.getElementById("cnCancel").onclick=cl;document.getElementById("cnBg").onclick=e=>{if(e.target.id==="cnBg")cl();};
    document.getElementById("cnGo").onclick=()=>{
      const nm=st.connect;
      const cx=CAL_CONNECTIONS.find(c=>nm.startsWith(c.provider)||c.provider.startsWith(nm.split(" ")[0]));
      if(cx){cx.on=true;cx.sync="done";cx.last="방금";}else{CAL_CONNECTIONS.push({provider:nm,short:nm[0],on:true,sync:"done",last:"방금"});}
      const cp=CAL_PROVIDERS.find(p=>p.nm===nm);if(cp)cp.st="connected";
      st.connect=null;st.addCal=false;notify(`<b>${nm}</b> 캘린더가 연동되었습니다 — free/busy 동기화 시작`);render();
      toast(`<strong>${nm}</strong> 연동 완료 — free/busy 동기화를 시작했습니다.`);};
    return;}
  if(st.consent){m.innerHTML=consentModal();wireConsent();return;}
  if(st.closing){m.innerHTML=closeCardModal();const cl=()=>{st.closing=null;render();};document.getElementById("ccClose").onclick=cl;document.getElementById("ccLater").onclick=cl;document.getElementById("ccBg").onclick=e=>{if(e.target.id==="ccBg")cl();};document.querySelectorAll(".chip[data-fb]").forEach(c=>c.onclick=()=>{st.closeFb=c.dataset.fb;render();});
    document.querySelectorAll("[data-cc-st]").forEach(b=>b.onclick=()=>{const i=+b.dataset.ccSt;st.closeItems[i].status=st.closeItems[i].status==="carry"?"done":"carry";render();});
    document.querySelectorAll("[data-cc-res]").forEach(inp=>inp.oninput=()=>{st.closeItems[+inp.dataset.ccRes].result=inp.value;}); /* 재렌더 없이 저장(포커스 유지) */
    const a=document.getElementById("ccAct");if(a)a.oninput=()=>{st.closeAction=a.value;};
    document.getElementById("ccSave").onclick=()=>{
      const mtg=meetingOf(st.closing);if(!mtg)return;
      const miss=st.closeItems.findIndex(it=>!(it.result||"").trim());
      if(miss>=0){toast(`<strong>안건${miss+1}</strong>의 결론이 비었습니다 — '결정 없음'도 결론입니다.`);return;}
      const carryN=st.closeItems.filter(it=>it.status==="carry").length;
      RECORDS.unshift({id:"rec-"+mtg.id,title:mtg.title,hostId:mtg.hostId,date:mtg.date||(mtg.slot?dateKey(edDate(mtg.slot.d)):""),time:mtg.time||"",format:mtg.format,loc:displayLocation(mtg.format,mtg.loc),purpose:mtg.purposes[0]||"align",origin:mtg.origin||"routine",scribe:mtg.scribe,wrap:{by:"나",at:dateKey(new Date())},
        who:mAllParticipants(mtg),
        agendas:mtg.agendas.map((a2,i)=>({t:a2.t,notes:[],decision:st.closeItems[i].result,actions:st.closeAction.trim()?[{owner:"",due:"",t:st.closeAction.trim()}]:[],status:st.closeItems[i].status}))});
      mtg.status="closed";
      notify(`<b>${mtg.title}</b> 종결 카드가 배포되었습니다${carryN?` — 이월 ${carryN}건은 후속 회의의 안건 후보`:""}`,"wrap");
      st.closing=null;st.closeItems=null;st.closeAction="";st.closeFb=null;render();
      toast("<strong>종결 카드 배포 · 기록 적재 완료</strong> — 상단 '회의 기록'에서 열람하고, 이월 안건은 후속 회의로 이어집니다.");};
    return;}
  if(!st.modalOpen){m.innerHTML="";return;}
  m.innerHTML=modalShell();renderFlow();renderFoot();
  document.getElementById("mclose").onclick=closeCreate;
  document.getElementById("modalBg").onclick=e=>{if(e.target.id==="modalBg")closeCreate();};
}

/* 전체 재렌더가 필요한 선택에서도 사용자가 읽던 위치를 유지한다.
   각 화면·모달의 실제 스크롤 소유자만 태깅하며, 다른 모달로 전환되면 키가 달라 섞이지 않는다. */
const SCROLL_MEMORY={};
function tagScrollOwners(){
  const fixed=[
    [".wk-body","calendar-time"],[".pl-list","people-list"],[".ppt-body","people-tree"],
    [".records-list","records-list"],["#respondSide","respond-side"]
  ];
  fixed.forEach(([sel,key])=>{const el=document.querySelector(sel);if(el)el.dataset.scrollKey=key;});
  const modalEls=document.querySelectorAll("#modal .mc,#modal #flow,#modal .criteria-body,#modal .pane-b");
  modalEls.forEach((el,i)=>{const bg=el.closest(".modal-bg");el.dataset.scrollKey=`${bg?bg.id:"modal"}:${el.id||Array.from(el.classList).join(".")}:${i}`;});
}
function rememberScrollPositions(){
  document.querySelectorAll("[data-scroll-key]").forEach(el=>{SCROLL_MEMORY[el.dataset.scrollKey]=el.scrollTop;});
}
function restoreScrollPositions(){
  document.querySelectorAll("[data-scroll-key]").forEach(el=>{const y=SCROLL_MEMORY[el.dataset.scrollKey];if(y!=null)el.scrollTop=y;});
}
function render(){
  rememberScrollPositions();
  renderNav();
  renderRespondSide();
  const c=document.getElementById("content");
  if((st.view||"cal")==="people"){c.innerHTML=viewPeople();wirePeople();}
  else if(st.view==="records"){c.innerHTML=viewRecords();wireRecords();}
  else{c.innerHTML=viewHome();wireHome();}
  c.style.cssText="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column";
  const floating=document.getElementById("fab"),floatingMenu=document.getElementById("fabMenu"),floatingScrim=document.getElementById("fabScrim");
  const showFloating=(st.view||"cal")==="cal";
  if(floating){floating.hidden=!showFloating;if(!showFloating)floating.classList.remove("open");}
  if(!showFloating){if(floatingMenu)floatingMenu.hidden=true;if(floatingScrim)floatingScrim.hidden=true;}
  renderModal();
  renderTour();
  tagScrollOwners();
  restoreScrollPositions();
}
render();
/* 처음 진입한 사용자에게 온보딩 투어 자동 시작 — 완료 여부는 localStorage */
try{if(!localStorage.getItem("onairTour"))setTimeout(()=>startTour("intro",true),400);}catch(e){}
/* 뷰포트가 700px 경계를 넘나들면 캘린더 구조(7열 ↔ 데이 스트립)를 다시 그린다 */
let _wasMob=isMobile();
window.addEventListener("resize",()=>{const m2=isMobile();if(m2!==_wasMob){_wasMob=m2;render();}});
/* 드로어 사이드바 — 좌측 패널 제거 이후에는 레거시 가드만 유지 */
const sideEl=document.querySelector(".sidebar"),scrimEl=document.getElementById("scrim");
const drawer=open=>{if(!sideEl||!scrimEl)return;sideEl.classList.toggle("open",open);scrimEl.hidden=!open;};
const menuEl=document.getElementById("tbMenu");
if(menuEl&&sideEl&&scrimEl){
  menuEl.onclick=()=>drawer(!sideEl.classList.contains("open"));
  scrimEl.onclick=()=>drawer(false);
}

/* FAB 스피드다이얼 — 회의 생성 / 내 일정 추가 두 액션 */
const fabEl=document.getElementById("fab"),fabMenu=document.getElementById("fabMenu"),fabScrim=document.getElementById("fabScrim");
const fabToggle=open=>{fabMenu.hidden=!open;fabScrim.hidden=!open;fabEl.classList.toggle("open",open);};
fabScrim.onclick=()=>fabToggle(false);
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!fabMenu.hidden)fabToggle(false);});
fabEl.onclick=()=>fabToggle(fabMenu.hidden);
document.getElementById("fabMeet").onclick=()=>{fabToggle(false);openCreate();};   /* 전체 설정 위저드 — 바로 생성은 구성원 뷰 선택 CTA 전용 */
document.getElementById("fabEvent").onclick=()=>{fabToggle(false);openAdd();};
document.addEventListener("click",e=>{if(!fabMenu.hidden&&!fabMenu.contains(e.target)&&e.target!==fabEl&&!fabEl.contains(e.target))fabToggle(false);});

/* ── 셀렉트 팝업 — 모든 <select>의 네이티브 OS 메뉴를 밝은 카드 메뉴로 대체.
   마크업·onchange 배선은 그대로 두고 mousedown/keydown만 가로챈다. 항목 선택 시 change를 버블로 발화 →
   기존 핸들러(data-grade-sel·data-att-sel·#defGrade·시간 select 등)가 그대로 동작한다 */
const SP_CK=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
let spEl=null,spSel=null,spIdx=-1;
const spClose=()=>{if(spEl){spEl.remove();spEl=null;spSel=null;spIdx=-1;}};
const spPaint=()=>spEl.querySelectorAll("[data-sp]").forEach(b=>{
  const on=+b.dataset.sp===spIdx;
  b.classList.toggle("on",on);
  b.querySelector(".sp-ck").innerHTML=on?SP_CK:"";
});
/* 트리거 아래 정렬 — 화면을 넘치면 위로 뒤집고 좌우는 8px 여백으로 클램프. 리사이즈 시에도 재호출 */
function spPlace(){
  if(!spEl||!spSel)return;
  const r=spSel.getBoundingClientRect();
  spEl.style.minWidth=Math.max(136,r.width)+"px";
  const pw=spEl.offsetWidth,ph=spEl.offsetHeight;
  let y=r.bottom+6;
  if(y+ph>window.innerHeight-8)y=Math.max(8,r.top-ph-6);
  spEl.style.left=Math.min(Math.max(8,r.left),Math.max(8,window.innerWidth-pw-8))+"px";
  spEl.style.top=y+"px";
}
function spCommit(i){
  const s=spSel,o=s&&s.options[i];
  spClose();
  if(!o||o.disabled)return;
  if(s.selectedIndex!==i){s.selectedIndex=i;s.dispatchEvent(new Event("change",{bubbles:true}));}
}
function spOpen(sel){
  spClose();
  if(sel.disabled||!sel.options.length)return;
  spSel=sel;spIdx=sel.selectedIndex;
  spEl=document.createElement("div");spEl.className="sel-pop";
  spEl.innerHTML=[...sel.options].map((o,i)=>`<button type="button" data-sp="${i}"${o.disabled?" disabled":""}><span class="sp-ck"></span><span>${o.textContent}</span></button>`).join("");
  document.body.appendChild(spEl);
  spPaint();
  spPlace();
  /* scrollIntoView는 페이지까지 스크롤시켜 "스크롤 시 닫기"를 오발한다 — 팝업 내부 scrollTop만 조정 */
  const on=spEl.querySelector(".on");if(on)spEl.scrollTop=on.offsetTop-(spEl.clientHeight-on.offsetHeight)/2;
  spEl.querySelectorAll("[data-sp]").forEach(b=>b.onclick=()=>spCommit(+b.dataset.sp));
}
document.addEventListener("mousedown",e=>{
  const t=e.target;
  if(spEl&&spEl.contains(t))return;                       // 팝업 내부 클릭은 항목 onclick에 맡긴다
  const sel=t&&t.closest?t.closest("select"):null;
  if(sel){e.preventDefault();sel.focus();spSel===sel?spClose():spOpen(sel);return;}
  spClose();
},true);
document.addEventListener("keydown",e=>{
  if(spEl){
    if(e.key==="Escape"){e.preventDefault();spClose();}
    else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
      e.preventDefault();
      const n=spSel.options.length,d=e.key==="ArrowDown"?1:-1;
      let i=spIdx;
      do{i=(i+d+n)%n;}while(spSel.options[i].disabled&&i!==spIdx);
      spIdx=i;spPaint();
      const b=spEl.querySelector(`[data-sp="${i}"]`);
      if(b){if(b.offsetTop<spEl.scrollTop)spEl.scrollTop=b.offsetTop;else if(b.offsetTop+b.offsetHeight>spEl.scrollTop+spEl.clientHeight)spEl.scrollTop=b.offsetTop+b.offsetHeight-spEl.clientHeight;}
    }
    else if(e.key==="Enter"||e.key===" "){e.preventDefault();spCommit(spIdx);}
    else if(e.key==="Tab")spClose();
    return;
  }
  const a=document.activeElement;
  if(a&&a.tagName==="SELECT"&&(e.key==="Enter"||e.key===" "||e.key==="ArrowDown"||e.key==="ArrowUp")){e.preventDefault();spOpen(a);}
},true);
window.addEventListener("resize",spPlace);
document.addEventListener("scroll",e=>{if(spEl&&e.target!==spEl)spClose();},true);

/* 스크롤 중에만 스크롤바 노출 — scroll 이벤트는 버블하지 않으므로 캡처로 위임. 멈추면 700ms 뒤 숨김 */
const scrollTimers=new WeakMap();
document.addEventListener("scroll",e=>{
  const el=e.target;if(!el||el.nodeType!==1)return;
  el.classList.add("scrolling");
  clearTimeout(scrollTimers.get(el));
  scrollTimers.set(el,setTimeout(()=>el.classList.remove("scrolling"),700));
},true);
})();
</script>
