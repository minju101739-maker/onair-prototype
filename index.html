  else{const me=users.get(ME.id);if(me.workStart!==WORK.start||me.workLunch!==WORK.lunch||me.workEnd!==WORK.end)err("WORK","현재 사용자의 구성원 근무시간과 후보 엔진 근무시간 불일치");}
  const checkPurpose=(path,id)=>{if(!purposeOf(id))err(path,`존재하지 않는 목적 ${id}`);};
  const checkParticipants=(path,rows,hostId)=>{
    const seen=new Set();
    rows.forEach((p,i)=>{
      if(!users.has(p.id))err(`${path}[${i}].id`,`구성원 명부에 없는 사용자 ${p.id}`);
      if(seen.has(p.id))err(`${path}[${i}].id`,`중복 참석자 ${p.id}`);seen.add(p.id);
      if(!roles.has(p.role))err(`${path}[${i}].role`,`알 수 없는 역할 ${p.role}`);
      if(p.grade&&!grades.has(p.grade))err(`${path}[${i}].grade`,`알 수 없는 참석 등급 ${p.grade}`);
      if(p.attendance&&!atts.has(p.attendance))err(`${path}[${i}].attendance`,`알 수 없는 참석 형태 ${p.attendance}`);
      if(p.att&&!atts.has(p.att))err(`${path}[${i}].att`,`알 수 없는 참석 형태 ${p.att}`);
    });
    if(hostId&&!users.has(hostId))err(`${path}.hostId`,`구성원 명부에 없는 주최자 ${hostId}`);
    if(hostId&&!seen.has(hostId))err(path,"주최자가 참석자 명단에 없음");
    return seen;
  };
  Object.entries(INVITES).forEach(([id,v])=>{
    (v.purposes||[]).forEach((p,i)=>checkPurpose(`INVITES.${id}.purposes[${i}]`,p));
    const rows=inviteParticipants(v),seen=checkParticipants(`INVITES.${id}.participants`,rows,v.hostId);
    if(!seen.has(ME.id))err(`INVITES.${id}.participants`,"현재 수신자가 참석자 명단에 없음");
    const counts=inviteCounts(v),mine=inviteGrade(v),maxAgree=Math.max(0,counts.req-(mine==="req"?1:0));
    if(v.agree<0||v.agree>maxAgree)err(`INVITES.${id}.agree`,`동의 ${v.agree}명이 수신자 제외 필참 ${maxAgree}명을 벗어남`);
    if(!(v.agendas||[]).length)err(`INVITES.${id}.agendas`,"안건 없음");
    rows.forEach((p,i)=>{if(p.grade==="fyi"&&p.attendance!=="record")err(`INVITES.${id}.participants[${i}]`,`공유만 참석자는 record여야 함`);if(v.format==="online"&&p.grade!=="fyi"&&p.attendance!=="remote")err(`INVITES.${id}.participants[${i}]`,`온라인 회의 참석자는 remote여야 함`);if(v.format==="offline"&&p.grade!=="fyi"&&p.attendance!=="onsite")err(`INVITES.${id}.participants[${i}]`,`대면 회의 참석자는 onsite여야 함`);});
  });
  Object.entries(EVENT_INFO).forEach(([title,info])=>{
    checkPurpose(`EVENT_INFO.${title}.purpose`,info.p);
    const ids=[ME.id,...(info.who||[])];
    const seen=new Set();ids.forEach((id,i)=>{if(!users.has(id))err(`EVENT_INFO.${title}.who[${i}]`,`구성원 명부에 없는 사용자 ${id}`);if(seen.has(id))err(`EVENT_INFO.${title}.who`,`중복 참석자 ${id}`);seen.add(id);});
    if(!(info.ag||[]).length)err(`EVENT_INFO.${title}.ag`,`안건 없음`);
  });
  [...MY_EVENTS,...MONTH_EVENTS].filter(e=>e.src==="onair").forEach(e=>{if(!EVENT_INFO[e.t])err(`EVENT.${e.t}`,"ON AIR 회의인데 EVENT_INFO 투영 누락");});
  RECORDS.forEach((r,ri)=>{
    checkPurpose(`RECORDS[${ri}].purpose`,r.purpose);
    const rows=r.who.map(w=>({id:w.id,role:w.role,att:w.att})),seen=checkParticipants(`RECORDS[${ri}].who`,rows,r.hostId);
    rows.forEach((p,i)=>{const grade=(ROLE_DEF[p.role]||ROLE_DEF.info).grade;if(grade==="fyi"&&p.att!=="record")err(`RECORDS[${ri}].who[${i}]`,`공유만 참석자는 record여야 함`);if(r.format==="online"&&grade!=="fyi"&&p.att!=="remote")err(`RECORDS[${ri}].who[${i}]`,`온라인 회의 참석자는 remote여야 함`);if(r.format==="offline"&&grade!=="fyi"&&p.att!=="onsite")err(`RECORDS[${ri}].who[${i}]`,`대면 회의 참석자는 onsite여야 함`);});
    if(r.format==="hybrid"&&!rows.some(p=>p.att==="onsite"))err(`RECORDS[${ri}].who`,"하이브리드 회의에 현장 참석자가 없음");
    const scribe=r.scribe==="나"?ME.id:r.scribe;if(!seen.has(scribe))err(`RECORDS[${ri}].scribe`,`기록 담당 ${scribe}가 참석자가 아님`);
    if(r.wrap){const wrapper=r.wrap.by==="나"?ME.id:r.wrap.by;if(!seen.has(wrapper))err(`RECORDS[${ri}].wrap.by`,`정리자 ${wrapper}가 참석자가 아님`);}
    (r.agendas||[]).forEach((a,ai)=>(a.actions||[]).forEach((ac,xi)=>{if(ac.owner&&!seen.has(ac.owner))err(`RECORDS[${ri}].agendas[${ai}].actions[${xi}].owner`,`담당 ${ac.owner}가 참석자가 아님`);}));
  });
  MEETINGS.forEach((m,mi)=>{
    const rows=mAllParticipants(m),seen=checkParticipants(`MEETINGS[${mi}].participants`,rows,m.hostId);
    if(m.selected.includes(m.hostId))err(`MEETINGS[${mi}].selected`,"주최자가 selected에 중복 저장됨");
    (m.purposes||[]).forEach((p,i)=>checkPurpose(`MEETINGS[${mi}].purposes[${i}]`,p));
    Object.keys(m.roles||{}).forEach(id=>{if(!seen.has(id))err(`MEETINGS[${mi}].roles.${id}`,"참석자가 아닌 사용자의 역할");});
  });
  if(CONTACTS.length!==ORG_TOTAL)warn("ORG_TOTAL",`명부 ${CONTACTS.length}명과 집계 ${ORG_TOTAL}명 불일치`);
  return{ok:errors.length===0,errors,warnings,counts:{users:CONTACTS.length,invites:Object.keys(INVITES).length,eventMeetings:Object.keys(EVENT_INFO).length,records:RECORDS.length,lifecycleMeetings:MEETINGS.length}};
}

/* ── 내 차례 / 조율 현황 파생 (FLOW §7.8 · DESIGN-SYSTEM §7.3) ──
   판별은 "공이 누구 코트에 있나": 내 응답·행동이 남았으면 내 차례, 내 몫이 끝나 남을 기다리면 조율 현황 */
/* ── 조율 데이터 파생 — 좌측 패널(조율 큐)의 원천. 3버킷:
   respond(내가 답할 것 + 방금 답한 것) · sent(내가 보낸 조율의 진행) · wrap(회의 후 정리) ── */
function coordData(){
  const respond=[],sent=[],wrap=[];
  Object.keys(INVITES).forEach(id=>{if(!(id in st.inviteResp))respond.push({kind:"invite",id});});
  /* 답을 마친 초대 — 조용한 한 줄로 남는다. 필참은 성립/확정, 선택은 참석 여부만 */
  Object.entries(st.inviteResp).forEach(([id,r])=>{
    const v=INVITES[id];if(!v)return;
    const state=inviteState(id);
    const msg=invOpt(v)?(r==="yes"?"참석으로 답했어요":"불참으로 답했어요 — 불이익 없어요")
      :state==="confirmed"?"확정됐어요 — 캘린더에 올라갔어요":state==="agreed"?"동의했어요 — 모두 동의하면 확정돼요":"불가로 답했어요 — 새 제안을 기다려요";
    respond.push({kind:"done",act:"invite|"+id,title:v.title,msg});
  });
  MEETINGS.forEach(m=>{
    if(m.status==="consent"){
      const prop=mProp(m);
      if(!prop)sent.push({act:"consent|"+m.id,title:m.title,msg:"후보가 다 떨어졌어요 — 구성을 바꿔보세요",cta:"현황"});
      else if(mDeclined(m).length||(mPeersOk(m)&&iMeBusyRange(prop.d,prop.h,m.dur)))sent.push({act:"consent|"+m.id,title:m.title,msg:"이 시간은 어려워요 — 다음 후보를 보낼 수 있어요",cta:"재제안"});
      else if(mOk(m))sent.push({act:"consent|"+m.id,title:m.title,msg:"모두 동의했어요 — 확정하면 캘린더에 올라가요",cta:"확정",pri:1});
      else if(m.sup&&mPeersOk(m)&&!m.approved)sent.push({act:"consent|"+m.id,title:m.title,msg:`${mSups(m).map(nameRank).join("·")} 상신 승인 대기`});
      else{const t=mReqPeers(m),y=t.filter(p=>m.responses[p.id]==="yes").length,w=t.filter(p=>!(p.id in m.responses)).length;sent.push({act:"consent|"+m.id,title:m.title,msg:`${w}명이 아직 답하지 않았어요`,gauge:{n:y,d:t.length}});}
    }else if(m.status==="confirmed"){
      wrap.push({act:"close|"+m.id,title:m.title,msg:`${m.day||""} 회의가 끝났어요 — 결론을 남겨주세요`});
    }
  });
  /* 내가 참석한 회의 중 아직 아무도 정리하지 않은 기록 — 끝난 회의는 정리될 때까지 이 큐에 남는다 */
  RECORDS.filter(r=>!r.wrap&&recMine(r)).forEach(r=>
    wrap.push({act:"wraprec|"+r.id,title:r.title,msg:`${recordDateText(r)} — 안건 ${r.agendas.length}건 정리 전`}));
  return{respond,sent,wrap};
}

   필참 → 동의 필요 · [불가][동의] · 선택 → 참석 여부 · [불가][참석] (버튼 쌍은 duty에서 파생) */

function runAct(act){
  const[k,id]=act.split("|");
  if(k==="invite"){st.invite=id;render();}
  else if(k==="assign"){st.roomAssign=true;render();}
  else if(k==="consent")openConsent(id);
  else if(k==="close"){st.closing=id;st.closeItems=null;st.closeAction="";st.closeFb=null;render();}
  else if(k==="wraprec"){st.recWrap=id;st.recWrapItems=null;render();}
}

/* ── CENTER PANEL — Monthly calendar (멀티컬러 이벤트) ── */
/* 주간 뷰 = 월요일 시작 캘린더 주(실제 날짜). ed = 엔진 날짜 인덱스(0–27, RANGE_DAYS=4주) —
   엔진 범위 안의 모든 주에서 슬롯 클릭·일정 추가·기준 레이어가 동작한다(주 단위 제약 금지) */
function weekColsFor(off){
  const base=new Date(BASE_MON);base.setDate(BASE_MON.getDate()+off*7);
  const t0=new Date(NOW);t0.setHours(0,0,0,0);
  return [0,1,2,3,4,5,6].map(i=>{
    const d=new Date(base);d.setDate(base.getDate()+i);const we=i>=5;
    const ei=off*7+i;
    /* 주말도 ed 부여 — 일정·리듬·인스펙터가 7일 전체에서 동작. we는 톤 구분일 뿐 비활성이 아니다 */
    return{ed:off>=0&&ei<RANGE_DAYS?ei:null,key:dateKey(d),lb:DOW_KR[d.getDay()],dt:`${d.getMonth()+1}/${d.getDate()}`,we,dim:d<t0&&!sameDay(d,NOW)};
  });
}
const WEEK_COLS=weekColsFor(0);
function panelCenter(){
  /* 기본은 주 뷰 — 캘린더 안에서 이번 주 회의와 응답해야 할 회의를 바로 판단한다. */
  const view=st.calView||"week";
  const off=st.calOff||0;
  const dayIdx=TODAY_IDX>=0?TODAY_IDX:0;
  const monLabel=monthLabel(off);
  const wkCols=view==="week"?weekColsFor(off):WEEK_COLS;
  const dayCols=(()=>{const d=new Date(NOW);d.setHours(0,0,0,0);d.setDate(d.getDate()+off);const t0=new Date(NOW);t0.setHours(0,0,0,0);const we=d.getDay()===0||d.getDay()===6;const i=ED_DATES.findIndex(x=>sameDay(x,d));return[{ed:i>=0?i:null,key:dateKey(d),lb:DOW_KR[d.getDay()],dt:`${d.getMonth()+1}/${d.getDate()}`,we,dim:d<t0&&!sameDay(d,NOW)}];})();
  const period=view==="month"?monLabel:view==="day"?`${dayCols[0].dt} ${dayCols[0].lb}`:`${wkCols[0].dt} – ${wkCols[6].dt}`;
  const seg=[["day","일"],["week","주"],["month","월"]].map(([v,l])=>`<button class="seg${v===view?" on":""}" data-view="${v}">${l}</button>`).join("");
  const header=`<div class="hp-h">
    <h2 class="wc-title-h">${period}</h2>
    <div class="cal-seg">${seg}</div>
    <div class="tb-spacer"></div>
    <div class="mcal-nav">${off!==0?`<button class="mcal-today" id="calToday">오늘</button>`:""}<button class="mcal-arw" data-nav="-1" aria-label="이전">‹</button><button class="mcal-arw" data-nav="1" aria-label="다음">›</button></div>
  </div>`;
  /* 범례 — 카드 상태 사전 그 자체. ON AIR 확정 = ON AIR에서 조율·확정된 회의이며 실시간 진행 상태가 아니다.
     파란 카드이므로 스와치도 파랑(빨간 브랜드색 금지).
     일·주·월 어느 뷰에서든 같은 항목·우측 정렬. 좌측은 뷰 전용 레이어 컨트롤(주·일의 회의 제외 시간 토글)만 */
  const prefCtl=view==="month"?"":`<button class="criteria-toggle${st.showPrefs===false?"":" on"}" id="prefTog" title="회의 제외 시간을 캘린더에 표시"><span class="lt-sw"></span>회의 제외 시간</button>`;
  const legend=`<div class="cal-legend">${prefCtl}<span class="cl-spacer"></span><span class="cl-it" title="ON AIR에서 조율을 마치고 확정된 회의"><i class="cl-onair"></i>ON AIR 확정</span><span class="cl-it"><i class="cl-invite"></i>응답 필요</span><span class="cl-it"><i class="cl-block"></i>막은 시간</span><span class="cl-it"><i class="cl-soft"></i>우선순위 낮음</span></div>`;
  /* 모바일(≤700px) 주간 뷰: 7열 그리드를 찌그러뜨리지 않고 — 데이 스트립(주 전체 개관·이동) + 선택한 하루의 시간 그리드 */
  let body;
  if(view==="month")body=monthGrid(off);
  else if(view==="day")body=weekGrid(dayCols);
  else if(isMobile()){
    const di=st.mobDay!=null?Math.min(st.mobDay,6):(off===0?(NOW.getDay()+6)%7:0);
    const dots=i=>{const c=wkCols[i];const n=eventsForCol(c).length;return n?`<span class="mday-dot"></span>`:"";};
    const strip=wkCols.map((c,i)=>`<button class="mday${i===di?" on":""}${c.we?" we":""}${c.dim?" dim":""}${c.ed!=null&&dayIsPast(c.ed)?" past":""}${c.ed===TODAY_IDX&&off===0?" today":""}" data-mobday="${i}"><span class="mday-dn">${c.lb}</span><span class="mday-dd">${c.dt.split("/")[1]}</span>${dots(i)}</button>`).join("");
    body=`<div class="mday-strip">${strip}</div>`+weekGrid([wkCols[di]],true);
  }
  else body=weekGrid(wkCols);
  return header+legend+body;
}
function eventsForCol(c){
  const seen=new Set();
  return calendarEvents().filter(e=>{
    const hit=(c.ed!=null&&e.d===c.ed)||(c.key&&eventDateKey(e)===c.key);
    if(!hit)return false;
    const id=eventUid(e);if(seen.has(id))return false;seen.add(id);return true;
  });
}
function weekGrid(cols,noHead){
  /* 표시 범위는 07–22시(스크롤) — 근무시간 밖은 불가가 아니라 빈 시간의 우선순위 낮음으로만 드러난다. */
  const T0=CAL_START,T1=CAL_END,TH=T1-T0,HRS=Array.from({length:TH},(_,i)=>T0+i);
  const heads=cols.map(c=>`<div class="wk-dh${c.ed===TODAY_IDX?" today":""}${c.we?" we":""}${c.dim?" dim":""}"><span class="wk-dn">${c.lb}</span><span class="wk-dd">${c.dt.split("/")[1]}</span></div>`).join("");
  const gutter=HRS.map(h=>`<div class="wk-hr">${String(h).padStart(2,"0")}:00</div>`).join("");
  const colsHtml=cols.map(c=>{
    const evs=eventsForCol(c);
    const occ=evs.map(e=>({s:Math.max(min(e.s)/60,T0),e:Math.min(min(e.e)/60,T1)})).filter(x=>x.e>x.s).sort((a,b)=>a.s-b.s);
    const overlaps=(s,e)=>occ.some(o=>s<o.e&&o.s<e);
    const freeSegments=(s,e)=>{
      let segs=[{s:Math.max(s,T0),e:Math.min(e,T1)}].filter(g=>g.e>g.s);
      /* 회의와 겹치는 구간은 잘라내고, 30분 미만 쪼가리는 버린다 — 블록 주변에 기준 면이 걸쳐 보이지 않게 */
      occ.forEach(o=>{segs=segs.flatMap(g=>o.e<=g.s||o.s>=g.e?[g]:[{s:g.s,e:Math.min(o.s,g.e)},{s:Math.max(o.e,g.s),e:g.e}].filter(x=>x.e-x.s>=.5));});
      return segs;
    };
    const lowAt=h=>c.ed!=null&&!overlaps(h,h+1)&&!pastSlot(c.ed,h,60)?workLowReason(c.ed,h,60):"";
    /* 우선순위 낮음은 텍스트 없이 연회색 면으로만 — 사유는 hover 툴팁·슬롯 클릭 인스펙터가 담당 */
    const slots=HRS.map(h=>{const past=c.ed!=null&&pastSlot(c.ed,h,60),low=lowAt(h);return`<div class="wk-slot${past?" past":low?" lowprio":""}"${c.ed!=null&&!past?` data-slot="${c.ed}|${h}"`:""}${past?` title="이미 지난 시간 — 새 조율·설정 불가"`:low?` title="${low} · 우선순위 낮음"`:""}></div>`;}).join("");
    /* 내 기준 레이어 — 캘린더에서는 점수 대신 의미 라벨만 보여주고, 강도는 면의 농도로만 표현한다. */
    /* 내 기준은 색을 입히지 않는다 — 우선순위 낮음 시간만 채도를 낮춘 무채색 워시로 (막음은 회색 채움 블록) */
    const zones=(st.showPrefs===false||c.ed==null)?"":myCriteria().filter(r=>r.days.includes(r.scope==="상시"?c.ed%7:c.ed)&&(r.pol==="avoid"||r.pol==="block")).flatMap(r=>freeSegments(r.s,r.e).map(seg=>{
      const top=((seg.s-T0)/TH*100).toFixed(2),ht=((seg.e-seg.s)/TH*100).toFixed(2);
      return`<div class="wk-zone ${r.pol}" style="top:${top}%;height:${ht}%" title="${r.pol==="block"?"회의 제외":"우선순위 낮음"} · ${r.rule}"></div>`;
    })).join("");
    const blocks=evs.map(e=>{
      const info=infoOf(e.t);
      const inv=e.inviteId?INVITES[e.inviteId]:null;
      const top=((min(e.s)/60-T0)/TH*100).toFixed(2);
      const ht=(Math.max(min(e.e)-min(e.s),30)/60/TH*100).toFixed(2);
      /* 카드 4분류(범례 = 색 사전 전부): ON AIR 확정(프라이머리 블루) · 응답 필요(대시) ·
         막은 시간(빗금 — 연동 일정은 무조건, 직접 추가는 hard일 때) · 우선순위 낮음(연회색 — soft 일정) */
      const lay=e.src==="invite"?" lay-invite"
        :e.src==="google"?" lay-block"
        :e.src==="manual"?(evHard(e)?" lay-block":" lay-soft")
        :" lay-onair";
      /* ON AIR 확정 회의는 장소·목적·안건이 전부 있는 정보라 카드에도 전부 적는다(짧은 카드는 위에서부터 잘림) */
      const loc=e.loc||(info&&info.r)||"";
      const puNm=e.puNm||(info&&info.p?(purposeOf(info.p)?.nm||""):"");
      const ag=e.ag||(info&&info.ag)||[];
      const meta=loc?`<div class="wk-evt-meta"><span class="wk-evt-loc">${loc}${puNm?` · ${puNm}`:""}</span></div>`:"";
      const agHtml=lay===" lay-onair"&&ag.length?`<div class="wk-evt-ags">${ag.map(a=>`<div class="wk-evt-ag">· ${a}</div>`).join("")}</div>`:"";
      const title=inv?`<span class="wk-inv-badge">응답</span>${e.t}`:e.t;
      return`<div class="wk-evt${lay}" data-ev="${eventUid(e)}" style="top:${top}%;height:${ht}%"><div class="wk-evt-t">${title}</div><div class="wk-evt-s">${e.s}–${e.e}</div>${meta}${agHtml}</div>`;
    }).join("");
    return`<div class="wk-col${c.ed===TODAY_IDX?" today":""}${c.we?" we":""}${c.dim?" dim":""}">${slots}${zones}${blocks}</div>`;
  }).join("");
  return`<div class="wk${noHead?" wk-nohead":""}">
    <div class="wk-head"><div class="wk-gut"></div>${heads}</div>
    <div class="wk-body"><div class="wk-times">${gutter}</div><div class="wk-cols">${colsHtml}</div></div>
  </div>`;
}
function monthGrid(off){
  off=off||0;
  /* 월간 화면의 스크롤 주체는 하나만 둔다. 상단 제목이 월을 이미 말하므로
     내부 월 라벨과 이전·다음 달을 세로로 쌓는 연속 스크롤을 제거한다. */
  return`<div class="mcal-shell" data-month-shell="1">${monthPanel(off)}</div>`;
}
function monthPanel(off){
  const anchor=new Date(NOW.getFullYear(),NOW.getMonth()+off,1);
  const Y=anchor.getFullYear(),MO=anchor.getMonth();
  const start=new Date(anchor);
  start.setDate(1-((anchor.getDay()+6)%7));
  start.setHours(0,0,0,0);
  const today0=new Date(NOW);today0.setHours(0,0,0,0);
  const byDate={};
  calendarEvents().forEach(e=>{
    const dt=eventDate(e);if(!dt)return;
    const k=dateKey(dt);
    (byDate[k]=byDate[k]||[]).push(e);
  });
  const cells=Array.from({length:42},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
  const dow=["월","화","수","목","금","토","일"];
  const head=dow.map((d,i)=>`<div class="mcal-dow${i>=5?" we":""}">${d}</div>`).join("");
  const grid=cells.map(dt=>{
    const d=dt.getDate(),sameMonth=dt.getFullYear()===Y&&dt.getMonth()===MO;
    const dim=dt<today0&&!sameDay(dt,NOW),today=sameDay(dt,NOW),we=dt.getDay()===0||dt.getDay()===6;
    const evs=byDate[dateKey(dt)]||[];
    const chips=evs.slice(0,3).map(e=>{
      /* 주간과 같은 4분류: ON AIR 확정(블루)·응답 필요(대시)·막은 시간(빗금)·우선순위 낮음(연회색) */
      const cls=e.inviteId?" is-invite"
        :e.src==="google"?" is-block"
        :e.src==="manual"?(evHard(e)?" is-block":" is-soft")
        :" is-onair";
      return`<div class="mcal-evt${cls}" data-ev="${eventUid(e)}"><span class="mcal-dot"></span>${e.inviteId?"응답 · ":""}${e.t}</div>`;
    }).join("");
    const more=evs.length>3?`<div class="mcal-more">+${evs.length-3} more</div>`:"";
    return`<div class="mcal-cell${today?" today":""}${dim?" dim":""}${sameMonth?"":" outside"}${we?" we":""}" data-date="${dateKey(dt)}"><div class="mcal-dn">${d}</div><div class="mcal-evts">${chips}${more}</div></div>`;
  }).join("");
  return`<div class="mcal"><div class="mcal-head">${head}</div><div class="mcal-grid">${grid}</div></div>`;
}

const isMobile=()=>window.innerWidth<=700;
/* ── 홈 통계 — 잡힌 회의·응답할 초대·보낸 조율·회의 후 정리의 건수 파생. 카드 클릭 = 해당 목록 모달(실제 진입점) ── */
function homeStats(){
  const cd=coordData();
  /* 이번 주 회의 = 이번 캘린더 주(d 0–6)의 ON AIR 확정 회의만 — 연동 일정(막은 시간)·개인 일정·미응답 초대는 회의가 아니다 */
  const wk=MY_EVENTS.filter(e=>e.src==="onair"&&e.d!=null&&e.d<7).slice().sort((a,b)=>a.d-b.d||min(a.s)-min(b.s));
  return{
    wk,wkN:wk.length,
    todayN:wk.filter(e=>e.d===TODAY_IDX).length,
    confN:wk.filter(e=>e.k==="confirmed").length,
    respond:cd.respond.filter(x=>x.kind!=="done"),
    sent:cd.sent,wrap:cd.wrap,
    readyN:cd.sent.filter(r=>r.pri).length,
  };
}

    send:`<svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>`,

  };
  const card=(key,cls,ic,lb,n,sub)=>`<button class="stat-card" data-stat="${key}">

    ${card("respond","a",IC.inbox,"응답할 초대",s.respond.length,(()=>{const rq=s.respond.filter(x=>!invOpt(INVITES[x.id])).length,op=s.respond.length-rq;return[rq?`동의 필요 ${rq}건`:"",op?`참석 여부 ${op}건`:""].filter(Boolean).join(" · ");})())}
    ${card("sent","m",IC.send,"생성한 회의",s.sent.length,s.readyN?`확정 가능 ${s.readyN}건`:"")}

/* ── 구성원 뷰(그룹웨어 조회 레퍼런스) — 조직도 트리 + 검색조건 바 + 페이지 테이블.
   행 클릭 = 선택/해제(체크+틴트 2신호, 페이지를 넘어 유지), 선택 바의 CTA가 바로 생성 플로우로 이어진다.
   개인 축 비공개 원칙: 휴대폰·개인 일정 상세는 노출하지 않는다 — 업무 축(직위·소속·이메일·출퇴근 시간)만 보인다 ── */
const PPL_PAGE=20;
const PPL_FIELDS=[["name","성명"],["team","부서"],["rank","직위"],["duty","직무"],["email","이메일"]];
function pplFiltered(){
  const q=(st.pplQuery||"").toLowerCase();
  const sc=st.pplScope||{d:null,t:null};
  return CONTACTS.filter(c=>{
    if(sc.t){if(c.dept!==sc.d||c.team!==sc.t)return false;}
    else if(sc.d){if(c.dept!==sc.d)return false;if(!st.pplSub&&c.team!=="본부 직속")return false;}
    else if(!st.pplSub)return false;   /* 회사 바로 아래 소속 인원은 없다 — 하위부서포함을 끄면 비어 있음이 정상 */
    if(st.pplFavOnly&&!st.pplFavs.has(c.id))return false;
    if(q){
      const v=st.pplField==="name"?c.id:st.pplField==="team"?`${c.dept} ${c.team}`:st.pplField==="rank"?c.rank:st.pplField==="duty"?c.duty:(c.email||"");
      if(!v.toLowerCase().includes(q))return false;
    }
    return true;
  }).sort((a,b)=>TEAM_ORDER.indexOf(`${a.dept}|${a.team}`)-TEAM_ORDER.indexOf(`${b.dept}|${b.team}`)||RANK_LV[b.rank]-RANK_LV[a.rank]||a.id.localeCompare(b.id,"ko"));
}
const pplPageRows=list=>list.slice((st.pplPage||0)*PPL_PAGE,(st.pplPage||0)*PPL_PAGE+PPL_PAGE);
function pplTree(){
  const sc=st.pplScope||{d:null,t:null};
  const node=(cls,on,scope,label,n)=>`<button class="ppt-node data-side-node ${cls}${on?" on":""}" data-scope="${scope}"><span class="ppt-nm">${label}</span><span class="ppt-n">${n}</span></button>`;
  let html=node("root",!sc.d&&!sc.t,"|","전체 구성원",ORG_TOTAL);
  DEPT_ORDER.forEach(d=>{
    html+=node("d",sc.d===d&&!sc.t,`${d}|`,d,ORG_SIZE[d]);
    TEAM_ORDER.filter(k=>k.startsWith(d+"|")).forEach(k=>{const t=k.split("|")[1];html+=node("t",sc.d===d&&sc.t===t,k,t,TEAM_SIZE[t]);});
  });
  return`<aside class="cal-card pp-tree data-side" aria-label="조직도">
    <div class="ppt-h data-side-title">조직도</div>
    <div class="ppt-body data-side-body">${html}</div>
    <button class="ppt-sub data-side-footer" id="ppSub"><span class="pl-ck pl-all${st.pplSub?" on":""}"><svg viewBox="0 0 24 24"><path d="m5 12 5 5L20 6"/></svg></span>하위부서 포함</button>
  </aside>`;
}
function pplFilterBar(){
  const fieldOpts=PPL_FIELDS.map(([v,l])=>`<option value="${v}"${st.pplField===v?" selected":""}>${l}</option>`).join("");
  const sc=st.pplScope,scopeVal=sc.t?`${sc.d}|${sc.t}`:sc.d?`${sc.d}|`:"|";
  const scopeOpts=`<option value="|"${scopeVal==="|"?" selected":""}>전체 구성원</option>`+DEPT_ORDER.map(d=>
    `<option value="${d}|"${scopeVal===`${d}|`?" selected":""}>${d}</option>`+
    TEAM_ORDER.filter(k=>k.startsWith(d+"|")).map(k=>`<option value="${k}"${scopeVal===k?" selected":""}>&nbsp;&nbsp;— ${k.split("|")[1]}</option>`).join("")
  ).join("");
  return`<div class="cal-card pp-filter">
    <label class="ppf-lb" for="ppField">검색조건</label>

    <button class="btn btn-p ppf-go" id="ppSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>조회</button>
    <button class="ppf-fav${st.pplFavOnly?" on":""}" id="ppFavOnly"><span>★</span>즐겨찾기${st.pplFavs.size?` ${st.pplFavs.size}`:""}</button>
    ${st.pplQuery?`<button class="link-btn" id="ppReset">검색 초기화</button>`:""}
    <label class="ppf-lb ppf-scope-lb" for="ppScope">소속</label>
    <select class="inp ppf-sel ppf-scope" id="ppScope" aria-label="소속 선택">${scopeOpts}</select>
  </div>`;
}

  const pg=st.pplPage||0;
  const pageRows=pplPageRows(list);

  const selectable=pageRows.filter(c=>c.id!==ME.id);

  const avs=selN?Array.from(st.pplSel).slice(0,5).map(id=>av(id,22)).join(""):"";
  const bar=`<div class="pl-bar${selN?" has":""}">
    <button class="pl-ck pl-all${allSel?" on":""}" id="plAll" title="이 페이지 전체 선택/해제" aria-label="이 페이지 전체 선택"><svg viewBox="0 0 24 24"><path d="m5 12 5 5L20 6"/></svg></button>
    <span class="pl-bar-n">${selN?`<b>${selN}명</b> 선택됨`:""}</span>
    ${selN?`<span class="pl-avs">${avs}${selN>5?`<span class="pl-bar-n" style="margin-left:6px">+${selN-5}</span>`:""}</span><button class="link-btn" id="plClear">선택 해제</button>`:""}
    <span style="flex:1"></span>
    <button class="btn btn-p btn-sm" id="plGo"${selN?"":" disabled"}>${selN?`선택한 ${selN}명으로 회의 만들기`:"회의 만들기"}</button>
  </div>`;
  const win=7,p0=Math.max(0,Math.min(pg-3,pages-win)),p1=Math.min(pages,Math.max(p0,0)+win);
  const nums=Array.from({length:Math.max(p1-Math.max(p0,0),1)},(_,i)=>Math.max(p0,0)+i).filter(p=>p<pages)
    .map(p=>`<button class="ppg-n${p===pg?" on":""}" data-pg="${p}">${p+1}</button>`).join("");
  const pager=`<div class="pp-pager">
    <span class="ppg-info">${list.length?`${list.length}명 중 ${pg*PPL_PAGE+1}–${Math.min((pg+1)*PPL_PAGE,list.length)} 표시`:"조회 결과 0명"}</span>
    <div class="ppg-btns">
      <button class="ppg-a" data-pg="0"${pg===0?" disabled":""}>«</button>
      <button class="ppg-a" data-pg="${pg-1}"${pg===0?" disabled":""}>‹</button>
      ${nums}
      <button class="ppg-a" data-pg="${pg+1}"${pg>=pages-1?" disabled":""}>›</button>
      <button class="ppg-a" data-pg="${pages-1}"${pg>=pages-1?" disabled":""}>»</button>
    </div>
  </div>`;
  const sc=st.pplScope,scopeLb=sc.t?`${sc.d} · ${sc.t}`:sc.d?sc.d:"전체 구성원";
  const emptyMsg=(!st.pplSub&&!sc.d)?"하위부서포함이 꺼져 있어요 — 회사 직속 인원이 없어요."
    :st.pplQuery?"조회 결과가 없어요.":"이 범위에는 인원이 없어요.";
  return`<div class="cal-wrap pp-wrap page-view data-page">
    ${pageHeader("구성원","조직과 업무 정보를 조회하고 회의 참석자를 선택합니다.",`전체 ${ORG_TOTAL}명 · 즐겨찾기 ${st.pplFavs.size}명`)}
    ${pplFilterBar()}
    <div class="pp-grid">
      ${pplTree()}
      <div class="cal-card pp-table">
        <div class="records-toolbar"><b>구성원 목록</b><span>${scopeLb} · 조회 ${list.length}명 / 전체 ${ORG_TOTAL}명</span></div>
        ${bar}
        <div class="pl-head"><span class="record-fav-head" title="즐겨찾기">★</span><span></span><span>성명</span><span>직무</span><span>직위</span><span>소속</span><span>이메일</span><span>출퇴근 시간</span><span></span></div>
        <div class="pl-list">${rows||`<div class="ml-empty">${emptyMsg}</div>`}</div>
        ${pager}
      </div>
    </div>
  </div>`;
}
function wirePeople(){
  const apply=()=>{const el=document.getElementById("ppQ");st.pplQuery=((el?el.value:st.pplDraft)||"").trim();st.pplDraft=st.pplQuery;st.pplPage=0;render();};
  const pq=document.getElementById("ppQ");
  if(pq){pq.oninput=()=>{st.pplDraft=pq.value;};pq.onkeydown=e=>{if(e.key==="Enter")apply();};}
  const sb=document.getElementById("ppSearch");if(sb)sb.onclick=apply;
  const rs=document.getElementById("ppReset");if(rs)rs.onclick=()=>{st.pplQuery="";st.pplDraft="";st.pplPage=0;render();};
  const pf=document.getElementById("ppField");if(pf)pf.onchange=()=>{st.pplField=pf.value;if(st.pplQuery)apply();};
  const scSel=document.getElementById("ppScope");if(scSel)scSel.onchange=()=>{const[d,t]=scSel.value.split("|");st.pplScope={d:d||null,t:t||null};st.pplPage=0;render();};
  document.querySelectorAll(".ppt-node[data-scope]").forEach(b=>b.onclick=()=>{const[d,t]=b.dataset.scope.split("|");st.pplScope={d:d||null,t:t||null};st.pplPage=0;render();});
  const sub=document.getElementById("ppSub");if(sub)sub.onclick=()=>{st.pplSub=!st.pplSub;st.pplPage=0;render();};
  document.querySelectorAll(".pl-row[data-pl]").forEach(r=>r.onclick=()=>{
    const id=r.dataset.pl;
    st.pplSel.has(id)?st.pplSel.delete(id):st.pplSel.add(id);render();
  });
  document.querySelectorAll("[data-fav]").forEach(b=>b.onclick=e=>{e.stopPropagation();const id=b.dataset.fav;st.pplFavs.has(id)?st.pplFavs.delete(id):st.pplFavs.add(id);render();});
  const favOnly=document.getElementById("ppFavOnly");if(favOnly)favOnly.onclick=()=>{st.pplFavOnly=!st.pplFavOnly;st.pplPage=0;render();};
  document.querySelectorAll("[data-pg]").forEach(b=>b.onclick=()=>{if(b.disabled)return;st.pplPage=+b.dataset.pg;render();});
  const all=document.getElementById("plAll");
  if(all)all.onclick=()=>{
    const sel=pplPageRows(pplFiltered()).filter(c=>c.id!==ME.id);
    const allSel=sel.length>0&&sel.every(c=>st.pplSel.has(c.id));
    sel.forEach(c=>allSel?st.pplSel.delete(c.id):st.pplSel.add(c.id));
    render();
  };
  const cl=document.getElementById("plClear");if(cl)cl.onclick=()=>{st.pplSel=new Set();render();};
  const go=document.getElementById("plGo");if(go)go.onclick=()=>{if(!st.pplSel.size)return;openCreate(null,{people:Array.from(st.pplSel)});};
}

/* ── 회의 기록 — 캘린더·구성원과 동급인 독립 탐색 화면 ── */
function recordContentParts(r){
  return r.agendas.flatMap(a=>[
    a.t,...(a.notes||[]),a.decision||"",
    ...(a.actions||[]).flatMap(x=>[x.t||"",x.owner||"",x.due||""])
  ]).filter(Boolean);

    return{back:1,next:"다음",reason:!o?"가능한 후보가 없습니다 — 참석자·형식·소요를 조정하세요":!roomOk?"시간과 회의실을 선택하세요":""};
  }
  const online=st.format==="online";
  const wr=windowReason(currentWindow(),st.dur);
  if(wr)return{back:2,next:hasSup()?"동의 요청 · 상신 예약":"동의 요청 보내기",reason:wr,send:true};
  const{ranked}=chosenCandidates(3);const o=ranked[0]||null;
  const roomOk=online||(o&&roomsForSlot(o.d,o.h,st.dur,needCount()).some(r=>r.id===st.room));
  const sups=approvalPpl();
  return{back:2,next:sups.length?"동의 요청 · 상신 예약":"동의 요청 보내기",
    reason:!o?"발송할 후보가 없습니다 — 구성을 조정하세요":!roomOk?"가예약할 회의실을 선택하세요":"",send:true};
}
function renderFoot(){

/* ── Stage 1 — 구성: 참석자가 주역. 나머지 설정은 파생 기본값으로 접힘 (FLOW.md §7.6) ── */

/* 사람 row(선택 영역, Interaction Grammar B) — avatar·이름·직급·팀·직무 + 선택 신호 2개(체크·틴트) + 명시적 추가/해제 어포던스.

function memberRow(c){const on=st.selected.has(c.id);return`<div class="cr${on?" sel":""}" data-id="${c.id}" role="button"><span class="chk"><svg viewBox="0 0 24 24"><path d="m5 12 5 5L20 6"/></svg></span>${av(c.id,22)}<div class="cr-i"><div class="cr-nm">${c.id}<span class="rk-pill">${c.rank}</span></div><div class="cr-rl">${c.team} · ${c.duty}</div></div><span class="cr-add${on?" is":""}">${on?"담김 ✓":"+ 담기"}</span></div>`;}
function orgScopeHtml(path,shown){

function inviteOptionsHtml(raw){

function stage1(){
  const durs=[30,60,90,120];const selArr=Array.from(st.selected);
  const reqN=getReq().length,optN=getOpt().length,fyiN=getFyi().length,totalN=reqN+optN+fyiN+1;
  const q=(st.query||"").trim();

  const x=`<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  const chips=selArr.map(id=>`<span class="inv-chip">${av(id,18)}${id}<button class="chip-x" data-rm="${id}">${x}</button></span>`).join("");
  const drop=`<div class="inv-drop" id="invDrop"${q?"":" hidden"}>${inviteOptionsHtml(q)}</div>`;
  const gradeSel=(id,g)=>`<select class="ro-sel" data-grade-sel="${id}">${[["req","필참"],["opt","선택"],["fyi","공유만"]].map(([v,l])=>`<option value="${v}"${g===v?" selected":""}>${l}</option>`).join("")}</select>`;
  const attSel=(id,g)=>{if(g==="fyi"||st.format!=="hybrid")return"";const a=attendFor(id);return`<select class="ro-sel" data-att-sel="${id}">${[["onsite","현장"],["remote","원격"]].map(([v,l])=>`<option value="${v}"${a===v?" selected":""}>${l}</option>`).join("")}</select>`;};
  const meRow=`<div class="ro-row me">${av("권민주",26)}<div class="ro-id"><div class="ro-nm">권민주 (나)</div><div class="ro-sub">${ME.team} · 주최자</div></div><span class="ro-btn req" disabled>필참</span>${attSel("나","req")}</div>`;

  const decs=[["owner","책임자 결정"],["vote","다수결"],["consensus","전원 합의"]].map(([v,l])=>`<button class="chip${st.decision===v?" on":""}" data-dec="${v}">${l}</button>`).join("");
  const settingsBlock=st.showSettings
    ? `<div style="border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px">

          <div class="f"><label>회의 제목</label><input class="f-line" id="mtitle" value="${st.title||""}" placeholder="${st.agendas[0]?st.agendas[0].t:"회의 제목"}"></div>
          <div class="f"><label>소요 시간${recDur?` · 권장 ${recDur}분`:""}</label><div class="chip-group">${durs.map(d=>`<button class="chip${d===st.dur?" on":""}" data-d="${d}">${d<60?d+"분":d===60?"1시간":d/60+"시간"}</button>`).join("")}</div></div>

  return`<div class="mc"><div class="mc-h"><h3>누가 참석하나요?</h3></div><div class="mc-b">

    <div class="inv-box">
      <div class="inv-row">${chips}<input id="pplQ" placeholder="이름 · 팀 · 직급으로 검색" value="${st.query||""}" autocomplete="off"><select class="ro-sel" id="defGrade" title="새로 담는 사람의 자격">${[["req","필참"],["opt","선택"],["fyi","공유만"]].map(([v,l])=>`<option value="${v}"${st.defGrade===v?" selected":""}>${l}</option>`).join("")}</select></div>

function wireStage1(){
  const refocus=()=>{const el=document.getElementById("pplQ");if(el){el.focus();const nn=el.value.length;el.setSelectionRange(nn,nn);}};
  const addPerson=id=>{st.selected.add(id);st.roles[id]=roleForGrade(id,st.defGrade);st.query="";refreshCreateStage();refocus();};
  const rmPerson=id=>{st.selected.delete(id);delete st.roles[id];approverSet().delete(id);if(st.scribe===id)st.scribe="나";refreshCreateStage();};
  const bindInviteOptions=()=>{document.querySelectorAll(".inv-opt[data-add]").forEach(b=>b.onclick=()=>addPerson(b.dataset.add));};
  const syncInviteDrop=()=>{const d=document.getElementById("invDrop");if(!d)return;const q=(st.query||"").trim();d.hidden=!q;d.innerHTML=inviteOptionsHtml(q);bindInviteOptions();};
  const pq=document.getElementById("pplQ");
  if(pq){
    pq.oninput=()=>{st.query=pq.value;syncInviteDrop();};
    pq.onkeydown=e=>{
      if(e.key==="Enter"){e.preventDefault();const first=document.querySelector(".inv-opt[data-add]");if(first)addPerson(first.dataset.add);}
      else if(e.key==="Backspace"&&!pq.value){const last=Array.from(st.selected).pop();if(last)rmPerson(last);}
    };
  }
  bindInviteOptions();
  const dg=document.getElementById("defGrade");if(dg)dg.onchange=()=>{st.defGrade=dg.value;};
  document.querySelectorAll(".chip-x[data-rm]").forEach(b=>b.onclick=e=>{e.stopPropagation();rmPerson(b.dataset.rm);});
  document.querySelectorAll(".chip-x[data-rm2]").forEach(b=>b.onclick=e=>{e.stopPropagation();rmPerson(b.dataset.rm2);});
  document.querySelectorAll("[data-grade-sel]").forEach(s=>s.onchange=()=>{const id=s.dataset.gradeSel;st.roles[id]=roleForGrade(id,s.value);if(s.value==="fyi")approverSet().delete(id);if(st.scribe===id&&s.value==="fyi")st.scribe="나";refreshCreateStage();});
  document.querySelectorAll("[data-att-sel]").forEach(s=>s.onchange=()=>{st.attend[s.dataset.attSel]=s.value;refreshCreateStage();});
  document.querySelectorAll("[data-appr]").forEach(b=>b.onclick=()=>{const id=b.dataset.appr;if(gradeFor(id)==="fyi")return;const set=approverSet();set.has(id)?set.delete(id):set.add(id);refreshCreateStage();});
  document.querySelectorAll(".chip[data-d]").forEach(c=>c.onclick=()=>{st.dur=+c.dataset.d;st.picked=null;st.room=null;refreshCreateStage();});
  document.querySelectorAll(".chip[data-fmt]").forEach(c=>c.onclick=()=>{st.format=c.dataset.fmt;st.fmtTouched=true;st.picked=null;st.room=null;refreshCreateStage();});
  document.querySelectorAll(".chip[data-dec]").forEach(c=>c.onclick=()=>{st.decision=c.dataset.dec;refreshCreateStage();});
  const setT=document.getElementById("setToggle");if(setT)setT.onclick=()=>{st.showSettings=true;refreshCreateStage();};
  const setD=document.getElementById("setDone");if(setD)setD.onclick=()=>{st.showSettings=false;refreshCreateStage();};
  const mt=document.getElementById("mtitle");if(mt)mt.oninput=()=>{st.title=mt.value;}; /* 재렌더 없이 저장(포커스 유지) */
}

const criteriaTags=(d,h,dur)=>criteriaForSlot(d,h,dur).slice(0,3).map(r=>`<span class="crit-tag${r.scope==="오늘"?" today":""}">${r.label}</span>`).join("");
function stage3(){
  const w=syncWindowState();
  const wr=windowReason(w,st.dur);
  const res=wr?{ranked:[],quality:"partial",total:0,feasible:0,comfortable:0}:chosenCandidates(3);
  const {ranked,quality,total,feasible,comfortable}=res;
  const need=needCount();
  const durText=d=>d<60?`${d}분`:d===60?"1시간":`${d/60}시간`;
  const qNote = wr?`<div class="warn-box"><b>${wr}</b></div>`:quality==="good"?""
    : quality==="tight"
    ? `<div class="selection-note">참석 가능한 시간 중 우선순위가 가장 높은 후보입니다.</div>`
    : `<div class="selection-note">가장 많은 참석자가 가능한 후보입니다. 참석 기준을 확인하세요.</div>`;
  const selected=ranked[0]||null,online=st.format==="online";
  const rooms=selected&&!online?roomsForSlot(selected.d,selected.h,st.dur,need):[];
  if(online)st.room=null;else if(selected&&!rooms.some(r=>r.id===st.room))st.room=rooms[0]?.id||null;
  const dateMin=dateKey(edDate(firstFutureRangeDay(st.dur,60,CAL_START*60,CAL_END*60))),dateMax=dateKey(edDate(RANGE_DAYS-1));
  const startFrom=minFutureStart(w.d0,60,CAL_START*60);
  const endFrom=Math.max((w.s||startFrom)+Math.max(st.dur,30),CAL_START*60+30);
  const timeScope=`<div class="time-scope">
    <div class="scope-head">
      <div><div class="scope-eyebrow">후보 탐색 기간</div><div class="scope-title">회의 가능한 날짜와 시간을 정하세요</div></div>
      <div class="scope-value">${windowLabel(w)}</div>
    </div>
    <div class="scope-grid">
      <div class="date-range-grid">
        <label class="time-field"><span>시작일</span><input class="time-select" type="date" id="winStartDate" min="${dateMin}" max="${dateMax}" value="${dateKey(edDate(w.d0))}"></label>
        <label class="time-field"><span>종료일</span><input class="time-select" type="date" id="winEndDate" min="${dateKey(edDate(w.d0))}" max="${dateMax}" value="${dateKey(edDate(w.d1))}"></label>
      </div>
      <div class="time-range-grid">
        <label class="time-field"><span>시작 시간</span><select class="time-select" id="winStart">${optionTimes(w.s,startFrom,(CAL_END-1)*60,30)}</select></label>
        <label class="time-field"><span>종료 시간</span><select class="time-select" id="winEnd">${optionTimes(w.e,endFrom,CAL_END*60,30)}</select></label>
        <div class="time-field"><span>소요</span><div class="dur-seg">${[30,60,90,120].map(d=>`<button class="${st.dur===d?"on":""}" data-win-dur="${d}" type="button">${durText(d)}</button>`).join("")}</div></div>
      </div>
    </div>
  </div>`;
  /* 후보의 성격을 위계로: 사용자가 고른 범위 안의 시간과 그 시간의 장소를 한 화면에서 고른다 */
  const card=s=>{
    const nR=online?0:roomsForSlot(s.d,s.h,st.dur,need).length,full=s.reqCov>=s.reqTot,on=s.key===st.picked;
    const roomTxt=online?"온라인":nR>0?`회의실 ${nR}곳`:"빈 회의실 없음";
    const ct=criteriaTags(s.d,s.h,st.dur);
    const work=workLowReason(s.d,s.h,st.dur);
    const tags=[ct,work?`<span class="crit-tag warn">${work} · 후순위</span>`:"",isWknd(s.d)?`<span class="crit-tag warn">주말 · 후순위</span>`:""].filter(Boolean).join("");
    const end=fmtT(s.h*60+st.dur);
    return `<button class="time-cand${on?" sel":""}" data-cand="${s.key}" type="button">
      <span class="pick-dot"></span>
      <span class="time-rank">${candidateLabel(s.rank)}</span>
      <span class="time-cand-main"><b>${when(s.d,s.h)}–${end}</b><small class="${!online&&nR===0?"danger":""}">${roomTxt} · 필참 ${s.reqCov}/${s.reqTot}${s.total>s.reqTot?` · 선택 포함 ${s.coverage}/${s.total}`:""}</small>${tags?`<span class="crit-tags">${tags}</span>`:""}</span>
      <span class="time-status ${on?"on":full?"ok":"mid"}">${on?"선택됨":full?"성립 가능":`${s.reqCov}/${s.reqTot}`}</span>
    </button>`;};
  const cards=ranked.map(card).join("");
  const roomBlock=selected?`<div class="room-pick">
      <div class="room-pick-head"><b>${online?"장소":"회의실"}</b><span>${when(selected.d,selected.h)}–${fmtT(selected.h*60+st.dur)} · 현장 ${need}명</span></div>
      <div class="room-pick-body">${
        online?`<div class="online-box"><b>온라인</b></div>`
        :rooms.length?rooms.map(r=>`<button class="room-choice${r.id===st.room?" sel":""}" data-room="${r.id}" type="button"><span class="pick-dot"></span><span><b>${roomLabel(r)}</b><small>정원 ${r.cap} · ${r.eq.join(" · ")}</small></span><em>현장 ${need}/${r.cap}</em></button>`).join("")
        :`<div class="inline-notice" title="현장 ${need}명을 수용할 회의실이 없습니다. 다른 후보 또는 온라인을 선택하세요.">현장 ${need}명 회의실 없음 · 다른 후보 또는 온라인을 선택하세요.</div>`
      }</div>
    </div>`:"";
  /* 후보가 없거나 부분 가용이면 — 막다른 길이 아니라 조정 액션을 제시 (참석자 조정 · 온라인 전환 · 소요 단축) */
  const adjust=(quality==="partial"||!ranked.length)?`<div class="adjust-box">
      <span class="adjust-lbl">구성을 조정하면 후보가 넓어집니다</span>
      <button class="btn btn-g btn-sm" id="adjWide">다음 2주 전체 보기</button>
      <button class="btn btn-g btn-sm" id="adjPeople">참석자 조정 — 필참↔선택</button>
      ${st.format!=="online"?`<button class="btn btn-g btn-sm" id="adjOnline">온라인으로 전환 — 회의실 제약 제거</button>`:""}
      ${st.dur>30?`<button class="btn btn-g btn-sm" id="adjShort">소요 30분으로 단축</button>`:""}
    </div>`:"";
  return `<div class="mc"><div class="mc-h"><h3>시간 범위와 후보</h3><span class="pill pill-b">${ranked.length}개 후보</span></div><div class="mc-b">
    ${timeScope}
    ${qNote}
    <div class="section-title-row"><div><b>추천 후보</b><span>${total}개 슬롯 중 필참 가능 ${feasible}개 · 편한 시간 ${comfortable}개</span></div></div>
    ${cards?`<div class="candidate-list refined">${cards}</div>`:`<div class="empty-candidate">이 범위 안에서 제안할 수 있는 후보가 없습니다</div>`}
    ${roomBlock}
    ${adjust}
  </div></div>`;
}
function wireStage3(){
  const reset=()=>{st.picked=null;st.room=null;};
  const sd=document.getElementById("winStartDate");if(sd)sd.onchange=()=>{st.winStartD=Math.max(0,Math.min(RANGE_DAYS-1,dayIndexFromKey(sd.value)));if(st.winEndD<st.winStartD)st.winEndD=st.winStartD;reset();render();};
  const ed=document.getElementById("winEndDate");if(ed)ed.onchange=()=>{st.winEndD=Math.max(st.winStartD,Math.min(RANGE_DAYS-1,dayIndexFromKey(ed.value)));reset();render();};
  const ws=document.getElementById("winStart");if(ws)ws.onchange=()=>{st.winStart=+ws.value;if(st.winEnd<=st.winStart)st.winEnd=Math.min(CAL_END*60,st.winStart+Math.max(st.dur,60));reset();render();};
  const we=document.getElementById("winEnd");if(we)we.onchange=()=>{st.winEnd=+we.value;reset();render();};
  document.querySelectorAll("[data-win-dur]").forEach(b=>b.onclick=()=>{st.dur=+b.dataset.winDur;if(st.winEnd-st.winStart<st.dur)st.winEnd=Math.min(CAL_END*60,st.winStart+st.dur);reset();render();});
  document.querySelectorAll("[data-cand]").forEach(c=>c.onclick=()=>{st.picked=c.dataset.cand;st.room=null;render();});
  document.querySelectorAll(".room-choice[data-room]").forEach(c=>c.onclick=()=>{st.room=c.dataset.room;render();});
  const aw=document.getElementById("adjWide");if(aw)aw.onclick=()=>{const d=firstFutureRangeDay(st.dur,60,CAL_START*60,CAL_END*60);st.winStartD=d;st.winEndD=Math.min(d+13,RANGE_DAYS-1);st.winStart=minFutureStart(d,60,CAL_START*60);st.winEnd=CAL_END*60;reset();render();};
  const ap=document.getElementById("adjPeople");if(ap)ap.onclick=()=>{st.stage=1;render();};
  const ao=document.getElementById("adjOnline");if(ao)ao.onclick=()=>{st.format="online";st.fmtTouched=true;render();toast("<strong>온라인 전환</strong> — 회의실·정원 제약이 사라져 후보가 다시 계산되었습니다.");};
  const as=document.getElementById("adjShort");if(as)as.onclick=()=>{st.dur=30;render();toast("<strong>소요 30분</strong> — 더 짧은 시간도 후보가 됩니다.");};
}

/* ── 초대장 공용 렌더러 — 주최자의 발송 전 미리보기(Stage4)와 수신자의 상세(inviteModal)가 같은 정보 구조를 쓴다.
   기본은 회의 축 정보만 담는다: 제목·시간·장소·주최·목적·안건·참석 구성·성립 조건. 개인 축 정보는 수신자 화면의 개인 힌트로만 붙는다 ── */
const dutyLabelByRole=r=>gradeLabel(ROLE_DEF[r]?.grade||"req");
const attLabel=(format,att)=>format==="online"?"원격":format==="offline"?"현장":ATT_DEF[att]?.nm||"현장";
function currentWhoHtml(){
  const rows=[{id:"권민주",role:"host",grade:"req",att:attendFor("나"),rank:ME.rank},...Array.from(st.selected).map(id=>{const c=contactOf(id)||{};return{id,role:roleFor(id),grade:gradeFor(id),att:attendFor(id),rank:c.rank||""};})];
  return`<div class="att-mini">${rows.map(x=>`<div class="att-mini-row">${av(x.id,20)}<span style="flex:1">${x.id} ${x.rank}${x.role==="host"?" · 주최":""}</span>${isApprovalTarget(x.id)?`<span class="pill pill-b">상신 대상</span>`:""}<span class="pill ${x.grade==="req"?"pill-b":"pill-d"}">${gradeLabel(x.grade)}</span><span class="pill" style="${x.att==="remote"?"background:var(--cat-violet-bg);color:var(--cat-violet-fg)":"background:var(--mint-s);color:var(--mint-d)"}">${x.grade==="fyi"?"공유만":ATT_DEF[x.att]?.nm||"현장"}</span></div>`).join("")}</div>`;
}
const invite3Item=(k,v,sub="")=>`<div class="invite3-row"><div class="invite3-k">${k}</div><div style="min-width:0"><div class="invite3-v">${v}</div>${sub?`<div class="invite3-sub">${sub}</div>`:""}</div></div>`;
function splitLocLine(s){
  if(!s)return{main:"장소 미정",sub:""};
  const cleaned=s.replace(/\s*\(([^)]*)\)\s*/g," · $1").replace(/\s+·\s+/g," · ").trim();
  const parts=cleaned.split(" · ").filter(Boolean);
  if(parts[0]==="온라인")return{main:"온라인",sub:""};
  return{main:cleaned.replace(/\s*·\s*(가예약|가예약 대상)$/,""),sub:""};
}
const purposeNames=ids=>(ids||[]).map(id=>purposeOf(id)?.nm||id).filter(Boolean).join(" · ")||"미정";
function meetingPeopleHtml(ids=[]){
  const names=[...new Set(ids.filter(Boolean))];
  return`<span class="meeting-people">${names.slice(0,6).map(id=>`<span class="meeting-person">${av(id,20)}<span>${id}</span></span>`).join("")}${names.length>6?`<span class="meeting-people-count">외 ${names.length-6}명</span>`:`<span class="meeting-people-count">${names.length}명</span>`}</span>`;
}
function meetingAgendaHtml(agendas=[]){
  const list=agendas.map(a=>a&&typeof a==="object"?a.t:a).filter(Boolean);
  if(!list.length)return`<span class="meeting-empty">안건 없음</span>`;
  const extra=list.slice(1);
  if(!extra.length)return`<span class="meeting-agenda-title">${list[0]}</span>`;
  return`<div class="meeting-agenda-block"><div class="meeting-agenda-main"><button class="meeting-agenda-trigger" type="button" aria-expanded="false" aria-label="${list[0]} · 나머지 안건 ${extra.length}개 펼치기" title="눌러서 전체 안건 보기"><span class="meeting-agenda-title">${list[0]}</span><svg class="meeting-agenda-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5"/></svg></button><span class="invite-agenda-count">외 ${extra.length}개</span></div><div class="meeting-agenda-list" hidden>${extra.map((a,i)=>`<div class="meeting-agenda-item">${i+2}. ${a}</div>`).join("")}</div></div>`;
}
function invitationCard(o){
  const loc=splitLocLine(o.locLine);
  const people=o.peopleHtml||o.peopleLine||o.attLine||"참석자 미정";
  return`<div class="invite-sheet">
    <div class="invite3-head">
      <div class="invite3-title">${o.title||"회의"}</div>
    </div>
    <div class="invite3-grid">
      ${invite3Item("목적",o.purposeLabel||purposeNames(o.purposes))}
      ${invite3Item("일시",o.timeLabel)}
      ${invite3Item("장소",loc.main)}
      ${invite3Item("안건",meetingAgendaHtml(o.agendas||[]))}
      ${invite3Item("참석자",people)}
    </div>
  </div>`;
}
function wireInvitationCard(){
  document.querySelectorAll(".meeting-agenda-trigger").forEach(b=>{
    const block=b.closest(".meeting-agenda-block"),list=block?.querySelector(".meeting-agenda-list");if(!block||!list)return;
    const title=block.querySelector(".meeting-agenda-title")?.textContent||"안건";
    const setOpen=open=>{list.hidden=!open;b.setAttribute("aria-expanded",String(open));b.setAttribute("aria-label",`${title} · 나머지 안건 ${list.children.length}개 ${open?"접기":"펼치기"}`);};
    /* 호버 미리보기 금지 — 선택(클릭/Enter)해야 열리고, 다시 선택하면 접힌다 */
    b.onclick=()=>setOpen(list.hidden);
  });
}
function meetingModalFrame({bgId,closeId,label="회의 상세",statuses="",card="",extra="",actions=""}){
  return`<div class="modal-bg" id="${bgId}"><div class="modal-wrap meeting-detail-modal"><div class="modal-bar"><h2>${label}</h2><button class="modal-close" id="${closeId}" aria-label="닫기">×</button></div><div class="mc"><div class="mc-b"><div class="meeting-detail-status">${statuses}</div>${card}${extra}<div class="meeting-detail-actions">${actions}</div></div></div></div></div>`;
}

/* ── Stage 4(검토·발송, Interaction Grammar D) — 읽기 중심 + primary CTA 하나(푸터의 "동의 요청 보내기").
   여기서 보내는 것은 확정이 아니라 "제안"이다. 수신자가 보게 될 초대장을 그대로 미리 본다 ── */
function stage4(){
  const need=needCount();
  const {ranked,quality}=chosenCandidates(3);
  const o=ranked[0]||null;
  if(!o) return `<div class="mc"><div class="mc-h"><h3>발송할 후보가 없습니다</h3></div><div class="mc-b"><div class="warn-box">이전 단계에서 참석자·형식·소요를 조정하세요.</div></div></div>`;
  const online=st.format==="online";
  const endStr=`${when(o.d,o.h)}–${fmtT(o.h*60+st.dur)}`;
  const title=st.title||(st.agendas[0]?st.agendas[0].t:"회의");
  const qNote=quality==="good"?"":`<div class="selection-note">${quality==="tight"?"참석 가능한 시간 중 선택된 추천안입니다.":"가장 많은 참석자가 가능한 시간으로 선택했습니다."}</div>`;
  const avail=!online?roomsForSlot(o.d,o.h,st.dur,need):[];
  if(online) st.room=null; else if(!avail.some(r=>r.id===st.room)) st.room=avail.length?avail[0].id:null;
  const sel=avail.find(r=>r.id===st.room)||null;
  /* 상신 대상은 주최자가 참석자 중 직접 지정한다. 일반 참석자 OK 이후에만 이 수신자에게 넘어간다. */
  const sups=approvalPpl();
  const normalN=sups.length?generalPpl().length:getReq().length;
  const supBox=sups.length?`<div class="rcv-box" style="margin-bottom:10px"><div class="rcv-hd"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>상신 예약 — ${sups.map(nameRank).join(", ")}</div><div class="rcv-bd"><div class="rcv-row"><b style="color:var(--blue-d)">일반 참석자 ${normalN}명 OK 후 전달</b><span style="color:var(--muted)">동의/참가 결과와 추천 시간안이 함께 상신됩니다</span></div>${ranked.map(x=>`<div class="rcv-row"><span style="width:48px;flex:none;font-weight:800;color:${x.key===o.key?"var(--blue-d)":"var(--faint)"};font-size:var(--fs-xs)">${candidateLabel(x.rank)}</span>${when(x.d,x.h)} · 필참 ${x.reqCov}/${x.reqTot} 가능${x.key===o.key?' <span class="pill pill-b" style="margin-left:4px">추천</span>':""}</div>`).join("")}</div></div>`:"";
  const inv={
    title,
    timeLabel:endStr,
    format:st.format,
    locLine:online?"온라인":sel?roomLabel(sel):"회의실 미정",
    purposes:[...st.purposes],
    agendas:st.agendas.map(a=>a.t),
    peopleHtml:meetingPeopleHtml(["권민주",...Array.from(st.selected)])
  };
  return`<div class="mc"><div class="mc-h"><h3>보낼 내용 확인</h3></div><div class="mc-b" style="padding-top:10px">
    ${qNote}
    ${invitationCard(inv)}
    ${supBox}
  </div></div>`;
}
/* 발송: 위저드 종료 → 수명주기 스토어에 consent(동의 대기) 회의 생성. 동의·재제안·승인·확정은 홈에서 (VOTING-LOGIC §4) */
function sendMeeting(){
  const {ranked,quality}=chosenCandidates(3);if(!ranked.length)return null;
  const m=makeMeeting({title:st.title||"회의",dur:st.dur,format:st.format,scribe:st.scribe,origin:st.origin,source:st.source,
    purposes:[...st.purposes],agendas:st.agendas.map(a=>({...a})),
    selected:[...st.selected],roles:{...st.roles},attend:{...st.attend},approvers:approvalIds(),
    cands:ranked.map(s=>({...s})),quality,room:st.room,window:currentWindow()});
  /* 데모: 빠른 응답자 두 명이 즉시 응답 — 나머지는 동의 현황에서 진행 */
  const o=ranked[0];
  mPeers(m).filter(p=>["한지우","김서연"].includes(p.id)).forEach(p=>{m.responses[p.id]=busyAtRange(p,o.d,o.h,m.dur)?"no":"yes";m.respTime[p.id]=nowStamp();});

  const qNote=m.quality==="good"?"":`<div class="selection-note">${m.quality==="tight"?"참석 가능한 시간 중 선택된 추천안입니다.":"가장 많은 참석자가 가능한 시간으로 선택했습니다."}</div>`;

  const supBox=m.sup?`<div class="consent-approval"><span>상신 승인</span><b>${m.approved?"1/1":"0/1"}</b>${peersOk&&!m.approved?`<button class="link-btn" id="simApprove">승인 응답 받기</button>`:""}</div>`:"";

/* 확정(Phase 3 → 캘린더): 회의실 예약 + 내 캘린더(MY_EVENTS)에 "ON AIR 확정" 이벤트로 적재 + free/busy 재계산 */
function finalizeMeeting(m){
  const o=mProp(m);if(!o)return;
  if(pastStart(o.d,o.h*60)){toast("이미 지난 제안 시간은 확정할 수 없습니다. 다음 후보로 재제안해 주세요.");return;}
  const title=m.title,sh=o.h,eh=o.h+durH(m.dur),startM=sh*60,endM=startM+m.dur,timeLabel=`${fmtT(startM)}–${fmtT(endM)}`;
  let loc;
  if(m.format==="online")loc="온라인";
  else{
    const room=ROOMS_DATA.find(r=>r.id===m.room&&roomFree(r,o.d,sh,m.dur))||roomsForSlot(o.d,sh,m.dur,mOnsite(m))[0];
    if(!room){toast("이 시간에 가능한 회의실이 없습니다 — 다른 대안으로 재제안하세요.");return;}
    room.bk.push({d:o.d,sh,eh,t:title,once:true});loc=roomLabel(room);
  }
  m.status="confirmed";m.slot={d:o.d,h:o.h};m.loc=loc;
  m.date=dateKey(edDate(o.d));m.day=DAYS[o.d];m.time=timeLabel;
  MY_EVENTS.push({d:o.d,s:fmtT(startM),e:fmtT(endM),t:title,k:"confirmed",src:"onair"});
  if(!EVENT_CAT[title])EVENT_CAT[title]="team";
  EVENT_INFO[title]={who:mPpl(m).map(p=>p.id),r:loc,p:m.purposes[0]||"align",myRole:"주최자",ag:m.agendas.map(a=>a.t)};
  rebuildBusy();
  UPCOMING.unshift({d:o.d,hm:`${String(sh).padStart(2,"0")}:00`,t:title,who:mPpl(m).map(p=>p.id),r:loc});
  notify(`<b>${title}</b> 확정 — ${DAYS[o.d]} ${timeLabel} · ${loc} · 참석자에게 초대장 발송`,"confirm");
  st.consent=null;render();
  toast(`<strong>${DAYS[o.d]} ${timeLabel} · ${title}</strong> 확정 · 캘린더 등록 완료 — 회의 후 <strong>종결 카드</strong>가 내 차례에 옵니다.`);
}

function startTour(key,auto){
  st.tourAuto=!!auto;
  st.tourHub=false;st.view="cal";st.calView="week";st.calOff=0;st.modalOpen=false;st.statList=null;st.notif=false;
  addSt.open=false;st.recView=null;st.recWrap=null;st.sel=null;st.slotView=null;st.invite=null;
  st.tourKey=key||"intro";st.tour=0;render();
}
function endTour(){
  const t=TOURS[st.tourKey],wasIntroAuto=st.tourKey==="intro"&&st.tourAuto;
  if(st.tourKey==="intro"){try{localStorage.setItem("onairTour","done");}catch(e){}}
  st.tourKey=null;st.tour=null;st.tourAuto=false;
  if(t&&t.cleanup)t.cleanup();
  /* 첫 진입의 화면 안내가 끝나면 허브를 열어 나머지 가이드로 잇는다 */
  if(wasIntroAuto){st.tourHub=true;st.tourHubNext=true;}
  render();
}
function renderTour(){
  const layer=document.getElementById("tourlayer");if(!layer)return;
  if(!st.tourKey){layer.innerHTML="";return;}
  const tour=TOURS[st.tourKey],steps=tour.steps;
  /* 대상이 없는 스텝은 대체 셀렉터 → 그래도 없으면 건너뛴다. 가시성은 rect로(fixed 요소는 offsetParent가 null) */
  let i=st.tour,step=null,el=null;
  while(i<steps.length){
    step=steps[i];
    el=document.querySelector(step.sel)||(step.alt?document.querySelector(step.alt):null);
    if(el&&el.getClientRects().length)break;
    i++;
  }
  if(i>=steps.length){endTour();return;}
  st.tour=i;
  const last=i===steps.length-1,live=!!step.do&&!step.noLive;
  layer.innerHTML=`
    ${["t","b","l","r"].map(k=>`<div class="tour-blk" data-tb="${k}"></div>`).join("")}
    ${live?"":`<div class="tour-cover" id="tourCover"></div>`}
    <div class="tour-hole${live?" live":""}" id="tourHole"></div>
    <div class="tour-tip" id="tourTip" role="dialog" aria-label="온보딩 안내">
      <div class="tour-step">${tour.nm} · ${i+1} / ${steps.length}</div>
      <div class="tour-title">${step.title}</div>
      <div class="tour-body">${step.body}</div>
      <div class="tour-acts"><button class="link-btn" id="tourSkip">건너뛰기</button><span class="ma-sp"></span><button class="btn btn-p btn-sm" id="tourNext">${last?"완료":"다음"}</button></div>
    </div>`;
  placeTour(el);
  document.getElementById("tourSkip").onclick=endTour;
  document.getElementById("tourNext").onclick=()=>{
    if(st.tour>=steps.length-1){endTour();return;}
    const cur=steps[st.tour],idx=st.tour;
    if(cur.do){try{cur.do();}catch(e){}}
    /* do가 앱 렌더를 유발하면 renderTour의 자동 스킵이 이미 전진시켰을 수 있다 — 이중 전진 방지 */
    if(st.tourKey&&st.tour===idx){st.tour++;render();}
  };
}
function placeTour(el){
  const hole=document.getElementById("tourHole"),tip=document.getElementById("tourTip");
  if(!el||!hole||!tip)return;
  const r=el.getBoundingClientRect(),pad=6,vw=window.innerWidth,vh=window.innerHeight;
  const hx=r.left-pad,hy=r.top-pad,hw=r.width+pad*2,hh2=r.height+pad*2;
  hole.style.left=hx+"px";hole.style.top=hy+"px";hole.style.width=hw+"px";hole.style.height=hh2+"px";
  const cover=document.getElementById("tourCover");
  if(cover){cover.style.left=hx+"px";cover.style.top=hy+"px";cover.style.width=hw+"px";cover.style.height=hh2+"px";}
  /* 어둠막 4장 — 구멍 자리만 비워 실제 요소를 직접 누를 수 있게 한다(시나리오 스텝) */
  const blk=k=>document.querySelector(`.tour-blk[data-tb="${k}"]`);
  const T=blk("t"),B=blk("b"),L=blk("l"),R=blk("r");
  if(T){T.style.cssText+=`;left:0;top:0;width:${vw}px;height:${Math.max(0,hy)}px`;}
  if(B){B.style.cssText+=`;left:0;top:${hy+hh2}px;width:${vw}px;height:${Math.max(0,vh-hy-hh2)}px`;}
  if(L){L.style.cssText+=`;left:0;top:${hy}px;width:${Math.max(0,hx)}px;height:${hh2}px`;}
  if(R){R.style.cssText+=`;left:${hx+hw}px;top:${hy}px;width:${Math.max(0,vw-hx-hw)}px;height:${hh2}px`;}
  const tw=tip.offsetWidth,thh=tip.offsetHeight;
  let x=Math.min(Math.max(12,r.left),vw-tw-12);
  let y=r.bottom+pad+12;
  if(y+thh>vh-12)y=Math.max(12,r.top-pad-thh-12);
  tip.style.left=x+"px";tip.style.top=y+"px";
}
/* 시나리오 스텝의 대상 요소를 직접 누르면 — 앱이 실제로 반응하고, 투어는 그 결과 위에서 다음 스텝으로 */
document.addEventListener("click",e=>{
  if(!st.tourKey)return;
  const tour=TOURS[st.tourKey],step=tour&&tour.steps[st.tour];
  if(!step||!step.do||step.noLive)return;
  const el=document.querySelector(step.sel)||(step.alt?document.querySelector(step.alt):null);
  const idx=st.tour;
  if(el&&(el===e.target||el.contains(e.target)))setTimeout(()=>{if(st.tourKey&&st.tour===idx){st.tour++;render();}},150);
},true);
/* ── 온보딩 허브(?) — 화면 안내 + 시나리오 가이드 목록 ── */

/* 슬롯 인스펙터 — "이 시간이 왜 추천/후순위/제외인지"를 사용자 문장으로 (FLOW §7.8) */
function slotModal(){
  const{d,h}=st.slotView;
  const past=pastSlot(d,h,60);
  const evts=MY_EVENTS.filter(e=>e.d===d&&Math.floor(min(e.s)/60)<=h&&Math.ceil(min(e.e)/60)>h);
  const hardEvt=evts.find(evHard);
  const workLow=workLowReason(d,h,60);
  const evtRows=evts.length?evts.map(e=>{
    const hard=evHard(e);
    const kind=e.src==="manual"?"개인 일정":e.src==="onair"?"ON AIR 확정":"업무 일정";
    return`<div class="kv"><span>${kind}</span><b>${e.t}</b><em class="kv-tag${hard?" hard":""}">${hard?"차단":"후순위"}</em></div>`;
  }).join(""):past?`<div class="kv"><span>상태</span><b style="color:var(--faint);font-weight:700">지난 시간 · 새 조율 불가</b></div>`:`<div class="kv"><span>상태</span><b style="color:var(--blue-d);font-weight:700">비어 있음 · 파란 시간</b></div>`;
  const rules=criteriaForSlot(d,h);
  const showHints=!evts.length&&!past;
  const ruleRows=showHints?(rules.map(r=>`<div class="kv"><span>회의 제외</span><b>${r.rule}</b><em class="kv-tag warn">${r.pol==="block"?"막음":"후순위"}</em></div>`).join("")
    +(workLow?`<div class="kv"><span>근무시간</span><b style="font-weight:600;color:var(--muted)">${WORK.start}–${WORK.end} 밖이라 추천 순위가 낮아요</b><em class="kv-tag warn">${workLow}</em></div>`:"")
    +(isWknd(d)?`<div class="kv"><span>주말</span><b style="font-weight:600;color:var(--muted)">회의는 뒤로 미뤄져요 — 일정은 자유</b><em class="kv-tag warn">후순위</em></div>`:"")):"";
  const pen=myPrefPen(d,h)+mySoftPen(d,h)+workLowPen(d,h)+(isWknd(d)?WKND_W:0);
  const note=past?`이미 지난 시간이에요 — 어떤 일정이었는지는 볼 수 있지만 <b>새 회의·일정·막기 설정은 할 수 없어요</b>`
    :hardEvt?(hardEvt.src==="manual"?`<b>막아둔 시간</b>이에요 — 회의가 잡히지 않아요`:`이미 일정이 있는 시간이에요 — 다른 회의가 <b>잡히지 않아요</b>`)
    :workLow?`가능하지만 <b>우선순위가 낮아요</b> — ${workLow} 시간대예요`
    :pen>0?`가능하지만 <b>우선순위가 낮아요</b> — 후보에서 뒤로 밀려요`
    :`일정이 없는 <b>파란 시간</b>이에요 — 회의 조율을 시작하기 좋습니다`;
  const actions=past
    ?`<span class="ma-sp"></span><button class="link-btn" id="slClose2">닫기</button>`
    :`<button class="link-btn" id="slAdd">내 일정 추가</button><span class="ma-sp"></span>${hardEvt?"":`<button class="btn btn-p btn-sm" id="slBlock">이 시간 막아두기</button><button class="link-btn" id="slMeet">회의 잡기</button>`}<button class="link-btn" id="slClose2">닫기</button>`;
  return`<div class="modal-bg" id="slBg"><div class="modal-wrap sm"><div class="modal-bar"><h2>이 시간은</h2><button class="modal-close" id="slClose">×</button></div><div class="mc"><div class="mc-b">
    <div class="ev-title sm">${DAYS[d]} ${String(h).padStart(2,"0")}:00–${String(h+1).padStart(2,"0")}:00</div>
    <p class="ev-note${hardEvt&&!past?" hard":""}" style="padding-top:4px">${note}</p>
    <div class="kv-list">${evtRows}${ruleRows}</div>
    <div class="modal-acts">${actions}</div>
  </div></div></div></div>`;
}

/* ── 받은 초대 상세(참석자 관점) — Stage4의 미리보기와 같은 초대장 카드 구조.

/* 상태 라벨: 필참(req)은 동의/성립 축, 선택(opt)은 참석 축 */
const INV_STATE_REQ={pending:["동의 필요","blue"],agreed:["동의함 — 확정 대기","mint"],declined:["불가 — 재제안 대기","danger"],confirmed:["확정된 회의","mint"]};
const INV_STATE_OPT={pending:["참석 여부","blue"],agreed:["참석으로 답함","mint"],declined:["불참으로 답함","faint"],confirmed:["확정된 회의","mint"]};
function inviteModal(){
  const id=st.invite,v=INVITES[id];if(!v)return"";
  const opt=invOpt(v),state=inviteState(id);
  const[stTxt,stTone]=(opt?INV_STATE_OPT:INV_STATE_REQ)[state];
  const agreeNow=v.agree+(st.inviteResp[id]==="yes"?1:0);
  const peopleHtml=meetingPeopleHtml(inviteParticipants(v).map(p=>p.id));
  const inv={
    title:v.title,
    timeLabel:v.proposed.label,
    format:v.format,locLine:v.loc,
    purposes:v.purposes,
    agendas:v.agendas,
    peopleHtml
  };
  const yn=opt?["불참","참석"]:["불가","동의"];
  const actions=state==="pending"
    ?`<button class="btn btn-g" id="ivNo">${yn[0]}</button><button class="btn btn-p" id="ivYes">${yn[1]}</button>`
    :state==="confirmed"
    ?`<button class="btn btn-p" id="ivClose2">닫기</button>`
    :`<button class="btn btn-g" id="ivChange">응답 변경</button><button class="btn btn-p" id="ivClose2">닫기</button>`;
  const hdr=state==="confirmed"?"확정된 회의":opt?"참석 여부":"동의 요청";
  const pills=`<span class="pill" style="color:var(--${stTone==="mint"?"mint-d":stTone==="danger"?"danger":stTone==="faint"?"faint":"blue-d"})">${stTxt}</span>${opt?"":`<span class="pill pill-d">동의 ${agreeNow}/${inviteReqN(v)}</span>`}`;
  return meetingModalFrame({bgId:"ivBg",closeId:"ivClose",label:hdr,statuses:pills,card:invitationCard(inv),actions});
}

/* ── 회의실 배정 — 확정된 시간에 맞는 빈 방을 골라 배정 (배정 전까지 확정 통보 불가) ── */

function recordModal(rec){
  const wrapped=!!rec.wrap;

    </div>`).join("");
  /* 참석 = 등급(필참/선택/공유만)별 그룹 행. 이름만 표기(직급 제거 — 소속·직급은 호버 툴팁),
     하이브리드는 사람마다 현장/원격을 함께 적는다. 공유만은 참석이 아니라 기록 수신 */
  const whoChip=w=>{
    const me=w.id===ME.id,c=CONTACTS.find(x=>x.id===w.id);
    const attTag=rec.format==="hybrid"&&w.att&&w.att!=="record"?`<em class="att-tag">${ATT_DEF[w.att].nm}</em>`:"";
    return`<span class="ev-att" title="${me?`${ME.dept} · ${ME.team} · ${ME.rank}`:c?`${c.dept} · ${c.team} · ${c.rank}`:""}">${av(w.id,20)}<span>${me?`${ME.id} (나)`:w.id}</span>${attTag}</span>`;
  };
  const gradeOf=w=>(ROLE_DEF[w.role]||ROLE_DEF.info).grade;
  const gradeRows=[["req","필참"],["opt","선택"],["fyi","공유만"]].map(([g,l])=>{
    const ppl=rec.who.filter(w=>gradeOf(w)===g);
    return ppl.length?`<div class="kv"><span>${l}</span><b><span class="ev-atts">${ppl.map(whoChip).join("")}</span></b><em>${ppl.length}명</em></div>`:"";
  }).join("");
  const carry=rec.agendas.filter(a=>a.status==="carry").length;
  /* 정리 전 기록의 상세에는 항상 '회의 정리하기'가 있다 — 누구든 열람한 사람이 이어서 정리할 수 있는 프로세스 */
  const acts=wrapped
    ?`<button class="btn btn-g" id="recCopy">설정 복사해 새 회의</button><button class="btn btn-p" id="recFollow">후속 회의 만들기${carry?` — 이월 ${carry}건`:""}</button>`
    :`<button class="btn btn-g" id="recCopy">설정 복사해 새 회의</button><button class="btn btn-p" id="recWrapGo">회의 정리하기</button>`;
  const peopleHtml=meetingPeopleHtml(rec.who.map(w=>w.id));
  const card=invitationCard({title:rec.title,purposes:[rec.purpose],timeLabel:recordWhenText(rec),locLine:displayLocation(rec.format,rec.loc),agendas:rec.agendas.map(a=>a.t),peopleHtml});
  const wrapMeta=wrapped?`${rec.wrap.by} 정리 · ${fullDateLabel(keyDate(rec.wrap.at))}`:"아직 정리되지 않음";
  const extra=`<section class="meeting-record-body"><div class="meeting-record-head"><span>회의 결과</span><span class="meeting-record-meta">${wrapMeta}</span></div>${blocks}</section>`;
  return meetingModalFrame({bgId:"recBg",closeId:"recClose",label:"회의 기록",card,extra,actions:acts});
}

/* ── 내 일정 추가 (ARCHITECTURE.md §4 POST /v1/events · FLOW.md §7.8 2계층) ──
   이 모달은 3계층 중 "개인 업무" 생성기 — 항상 하드 차단(회의 후보 제외)을 만든다.
   · 조율 동작은 분류(개인/외부)와 무관하게 동일: 하드 차단 + 동료에겐 사유 없이 '바쁨'.
   · 분류는 내 캘린더 색 라벨일 뿐(동료 비공개).
   · 반복되는 집중 시간·회의 제외대는 이 폼이 아니라 "회의 제외 시간"에서 관리. */
const AD_DAY_END=19*60;                         // 종료가 넘어설 수 없는 상한(19:00)
const addSt={open:false,title:"",cat:"personal",d:TODAY,start:13*60,end:14*60,hard:false,editing:null,recur:"once",days:[],editRule:null};
function normalizeAddTime(){
  if(!hasFutureOnDay(addSt.d,30,30,9*60,AD_DAY_END))addSt.d=firstFutureDay(30,30,9*60,AD_DAY_END);
  const s=minFutureStart(addSt.d,30,9*60),latest=AD_DAY_END-30;
  addSt.start=Math.max(s,Math.min(addSt.start,latest));
  if(addSt.end<=addSt.start)addSt.end=Math.min(addSt.start+60,AD_DAY_END);
  addSt.end=Math.max(addSt.start+30,Math.min(addSt.end,AD_DAY_END));
}
function openAdd(d,h,hard=false,title=""){
  if(!hasFutureInRange(30,30,9*60,AD_DAY_END)){toast("앞으로 4주 안에 추가할 수 있는 시간이 없습니다.");return;}
  const start=h!=null?Math.min(Math.max(h,9)*60,AD_DAY_END-60):null;
  if(d!=null&&start!=null&&pastStart(d,start)){toast("이미 지난 시간에는 일정을 추가하거나 막아둘 수 없습니다. 현재 이후의 시간을 선택해 주세요.");return;}
  addSt.open=true;addSt.editing=null;addSt.editRule=null;addSt.recur="once";addSt.days=[];
  addSt.title=title;addSt.cat=hard?"focus":"personal";addSt.d=d!=null?d:TODAY;
  addSt.start=start!=null?start:13*60;
  addSt.end=Math.min(addSt.start+60,AD_DAY_END);addSt.hard=hard;normalizeAddTime();render();
}
function blockSlot(d,h){
  const s=Math.min(Math.max(h,9)*60,AD_DAY_END-60),e=Math.min(s+60,AD_DAY_END),ov=adOverlap(d,s,e);
  if(pastStart(d,s)){toast("이미 지난 시간은 막아둘 수 없습니다. 현재 이후의 빈 시간을 선택해 주세요.");return;}
  if(ov){toast(`<strong>${adEventLabel(ov)}</strong>와 겹쳐요 — 비어 있는 시간을 눌러 막아두세요.`);return;}
  const t="회의 막기";
  MY_EVENTS.push({d,s:fmtT(s),e:fmtT(e),t,k:"busy",src:"manual",hard:true});
  EVENT_CAT[t]="focus";
  rebuildBusy();
  st.slotView=null;render();
  toast(`<strong>${DAYS[d]} ${fmtT(s)}–${fmtT(e)}</strong>을 막아뒀어요 — 이 시간엔 회의가 잡히지 않아요.`);
}
const adOverlap=(d,s,e)=>MY_EVENTS.find(ev=>ev!==addSt.editing&&ev.d===d&&s<min(ev.e)&&min(ev.s)<e);   // 수정 중인 자기 자신은 겹침에서 제외
const adEventLabel=ev=>`${DAYS[ev.d]} ${ev.s}–${ev.e} · ${ev.t}`;
function adRangeState(){const s=addSt.start,e=addSt.end;if(pastStart(addSt.d,s))return{off:true,why:"이미 지난 시간에는 설정할 수 없어요"};if(e<=s)return{off:true,why:"종료 시간이 시작보다 늦어야 해요"};if(e>AD_DAY_END)return{off:true,why:"하루 상한(19:00)을 넘어갑니다"};const ov=adOverlap(addSt.d,s,e);if(ov)return{off:true,why:`${fmtT(s)}–${fmtT(e)}은 '${ov.t}'와 겹쳐요`,detail:`${ov.t}은 ${adEventLabel(ov)}에 있어요`};return{off:false};}
const adTimeOptions=(selected,from,to)=>{const a=[];for(let t=from;t<=to;t+=30)a.push(`<option value="${t}"${selected===t?" selected":""}>${fmtT(t)}</option>`);return a.join("");};
function addEventModal(){
  const weekly=addSt.recur==="weekly";
  if(!weekly)normalizeAddTime();
  /* 날짜 = 실제 날짜 입력(오늘~4주). 매주 반복은 요일 칩 — 요일 자체가 개념일 때만 칩을 쓴다 */

    :(cur.off?cur.why:"");
  const valid=!why;
  const imps=[[false,"우선순위만 낮춰요"],[true,"막아둬요 — 절대 불가"]].map(([v,l])=>`<button class="chip${addSt.hard===v?" on":""}" data-ad-h="${v?1:0}">${l}</button>`).join("");
  const recurSeg=`<div class="exclude-mode" role="tablist">

    ?`<div class="range-preview"><b style="color:var(--ink)">매주 ${addSt.days.slice().sort((a,b)=>a-b).map(d=>DAYS_S[d]).join("·")||"—"} · ${fmtT(addSt.start)}–${fmtT(end)}</b><br>
        <span style="color:var(--muted)">${addSt.hard?`이 시간엔 회의가 <b style="color:var(--danger)">잡히지 않아요</b>.`:`회의를 막지 않아요 — 겹치면 <b style="color:var(--ink)">우선순위만 낮아져요</b>.`}</span></div>`
    :cur.off
      ?`<div class="range-preview warn">${DAYS[addSt.d]} · <b>${cur.why}</b>${cur.detail?`<br><span>${cur.detail}</span>`:""}</div>`
      :`<div class="range-preview">
          <b style="color:var(--ink)">${DAYS[addSt.d]} · ${fmtT(addSt.start)}–${fmtT(end)}</b> <span style="color:var(--muted)">(${durLabel})</span><br>
          <span style="color:var(--muted)">${addSt.hard
            ?`이 시간엔 회의가 <b style="color:var(--danger)">잡히지 않아요</b>.`
            :`회의를 막지 않아요 — 겹치면 <b style="color:var(--ink)">우선순위만 낮아져요</b>.`}</span>
        </div>`;
  /* 매주 반복 탭 = 반복 일정 관리처(구 '회의 제외 시간' 모달 흡수) — 기존 규칙의 수정·삭제도 여기서 */
  const editIcon=`<svg viewBox="0 0 24 24"><path d="M4 20h4l10.5-10.5a2.8 2.8 0 0 0-4-4L4 16v4Z"/><path d="m13.5 6.5 4 4"/></svg>`;
  const trashIcon=`<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg>`;
  const ruleRows=weekly?MY_PREFS.map((r,i)=>`<div class="pf"><div class="pf-ic ${r.pol==="block"?"block":"avoid"}">${r.pol==="block"?"막음":"후순위"}</div><div class="pf-t">${r.rule}<div class="pf-sub">${r.anchor}</div></div><span class="pf-actions"><button class="pf-action icon" data-pf-edit="${i}" aria-label="${r.rule} 수정" title="수정">${editIcon}</button><button class="pf-action icon danger" data-pf-rm="${i}" aria-label="${r.rule} 삭제" title="삭제">${trashIcon}</button></span></div>`).join(""):"";

function saveAdd(){
  const t=(addSt.title||"").trim();
  if(!t){toast("일정 제목을 입력해 주세요.");return;}
  if(addSt.recur==="weekly"){
    if(!addSt.days.length){toast("반복할 요일을 선택해 주세요.");return;}
    if(addSt.end<=addSt.start){toast("종료 시간이 시작보다 늦어야 해요.");return;}
    const days=addSt.days.slice().sort((a,b)=>a-b),dayLb=days.map(d=>DAYS_S[d]).join("·");
    const next={rule:t,label:t.slice(0,6),anchor:`매주 ${dayLb} · ${fmtT(addSt.start)}–${fmtT(addSt.end)}`,pol:addSt.hard?"block":"avoid",w:addSt.hard?0:2,days,s:addSt.start/60,e:addSt.end/60,scope:"상시"};
    const er=addSt.editRule!=null;
    if(er)MY_PREFS[addSt.editRule]=next;else MY_PREFS.push(next);
    const hd=addSt.hard;
    addSt.open=false;addSt.editRule=null;render();
    toast(`<strong>${t}</strong> ${er?"수정":"저장"} — 매주 반복, ${hd?"이 시간엔 회의가 <strong>잡히지 않아요</strong>":"회의가 겹치면 <strong>우선순위만 낮아져요</strong>"}.`);
    return;
  }
  const end=addSt.end;
  const range=adRangeState();
  if(range.off){toast(range.detail?`${range.why}<br>${range.detail}`:range.why);return;}
  const ov=adOverlap(addSt.d,addSt.start,end);
  if(ov){toast(`<strong>${adEventLabel(ov)}</strong>와 겹쳐요 — 겹치지 않는 시간을 선택해 주세요.`);return;}
  const s=fmtT(addSt.start),e=fmtT(end);
  const editing=addSt.editing;
  if(editing){editing.d=addSt.d;editing.s=s;editing.e=e;editing.t=t;editing.k="busy";editing.src="manual";editing.hard=addSt.hard;}
  else MY_EVENTS.push({d:addSt.d,s,e,t,k:"busy",src:"manual",hard:addSt.hard});
  rebuildBusy();                               /* hard→차단 / soft→순위 보정 프로젝션 갱신 → 이후 후보 계산에 즉시 반영 */
  addSt.open=false;addSt.editing=null;render();
  toast(`<strong>${t}</strong>을(를) ${editing?"수정":"추가"}했어요 — ${DAYS[addSt.d]} ${s}–${e}${addSt.hard?"엔 회의가 <strong>잡히지 않아요</strong>":"에 회의가 겹치면 <strong>우선순위만 낮아져요</strong>"}.`);
}
